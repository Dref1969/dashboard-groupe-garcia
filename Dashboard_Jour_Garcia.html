<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Groupe Garcia — Dashboard Jour</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
:root{--bg:#F0F2F5;--card:#FFF;--hdr:#0F172A;--txt:#0F1419;--sub:#64748B;--mut:#94A3B8;--brd:#E2E8F0;--blue:#2563EB;--purple:#7C3AED;--green:#059669;--orange:#D97706;--red:#DC2626;--cyan:#0891B2;--r:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',-apple-system,sans-serif;background:var(--bg);color:var(--txt);font-size:13px;-webkit-font-smoothing:antialiased}
.hdr{background:var(--hdr);color:#fff;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:10px 20px;gap:12px;flex-wrap:wrap}
.hdr-left{display:flex;align-items:center;gap:16px}
.logo{font-size:16px;font-weight:800;letter-spacing:1px}.logo span{font-weight:400;opacity:.5;font-size:13px;margin-left:8px}
.hdr-info{font-size:11px;color:#94A3B8}
.nav{background:#fff;border-bottom:1px solid var(--brd);display:flex;overflow-x:auto;padding:0 16px;position:sticky;top:41px;z-index:99}
.nav button{background:none;border:none;border-bottom:2px solid transparent;padding:10px 14px;font-family:inherit;font-size:12px;font-weight:600;color:var(--sub);cursor:pointer;white-space:nowrap;transition:all .15s}
.nav button:hover{color:var(--txt)}.nav button.active{color:var(--blue);border-bottom-color:var(--blue)}
.mn{max-width:1200px;margin:0 auto;padding:16px}
.section{display:none}.section.active{display:block}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:900px){.g3,.g4{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.g2,.g3,.g4{grid-template-columns:1fr}}
.cd{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:16px;position:relative;overflow:hidden}
.cd.kpi{padding:14px 16px}
.cd h3{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--sub);font-weight:700;margin-bottom:4px}
.cd .val{font-size:24px;font-weight:800;letter-spacing:-.5px}
.cd .sub{font-size:11px;color:var(--sub);margin-top:2px}
.cd .tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:12px;margin-top:4px}
.tag.green{background:#ECFDF5;color:var(--green)}.tag.red{background:#FEF2F2;color:var(--red)}.tag.orange{background:#FFFBEB;color:var(--orange)}
.stitle{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;font-weight:700;color:var(--sub);margin:16px 0 10px;display:flex;align-items:center;gap:8px}
.stitle::before{content:'';width:12px;height:2px;background:var(--blue);border-radius:2px}
.cd canvas{max-height:220px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{text-align:left;padding:8px 10px;font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--brd);white-space:nowrap}
tbody td{padding:8px 10px;border-bottom:1px solid #F1F5F9;white-space:nowrap}
tbody tr:hover{background:#F8FAFC}
tbody tr:last-child td{border-bottom:none}
.rk{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:10px;font-weight:700;color:#fff}
.rk.g{background:linear-gradient(135deg,#FFD700,#FFA500)}.rk.s{background:linear-gradient(135deg,#C0C0C0,#A0A0A0)}.rk.b{background:linear-gradient(135deg,#CD7F32,#A0522D)}.rk.n{background:#E2E8F0;color:var(--sub)}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
.bh{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:16px 20px;margin-bottom:12px;display:flex;align-items:center;gap:16px}
.bh .icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff}
.bh .info h2{font-size:18px;font-weight:800}.bh .info p{font-size:12px;color:var(--sub)}
#splash{position:fixed;inset:0;z-index:9999;background:#0F172A;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity .6s,visibility .6s}
#splash.hide{opacity:0;visibility:hidden}
.sp-logo{opacity:0;transform:translateY(20px);animation:spU .8s ease .2s forwards}
.sp-logo-text{font-size:28px;font-weight:800;color:#fff;letter-spacing:2px;text-align:center}
.sp-logo-sub{font-size:14px;color:#64748B;font-weight:500;margin-top:6px;text-align:center}
.sp-line{width:0;height:2px;background:linear-gradient(90deg,#2563EB,#7C3AED);margin-top:24px;border-radius:2px;animation:spL 1.2s ease .6s forwards}
.sp-kpis{display:flex;gap:32px;margin-top:28px;opacity:0;transform:translateY(12px);animation:spU .6s ease 1.2s forwards}
.sp-kpi{text-align:center}.sp-kpi-val{font-size:22px;font-weight:800;color:#fff}.sp-kpi-label{font-size:10px;color:#64748B;text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
@keyframes spU{to{opacity:1;transform:translateY(0)}}
@keyframes spL{to{width:180px}}
.hdr,.nav,.mn{opacity:0;transform:translateY(8px);transition:opacity .4s,transform .4s}
.hdr.show,.nav.show,.mn.show{opacity:1;transform:translateY(0)}
.ftr{text-align:center;font-size:11px;color:var(--sub);margin-top:20px;padding:12px;border-top:1px solid var(--brd)}
/* Challenge cards */
.ch-card{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:20px;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s}
.ch-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.06)}
.ch-card .ch-accent{position:absolute;top:0;left:0;right:0;height:3px}
.ch-card .ch-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.ch-card .ch-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;flex-shrink:0}
.ch-card .ch-title{font-size:13px;font-weight:800;letter-spacing:.3px}
.ch-card .ch-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:12px}
.ch-badge.won{background:#ECFDF5;color:var(--green)}.ch-badge.lost{background:#FEF2F2;color:var(--red)}.ch-badge.pending{background:#EFF6FF;color:var(--blue)}
.ch-card .ch-desc{font-size:11px;color:var(--sub);line-height:1.6;margin-bottom:14px}
.ch-card .ch-target{display:flex;align-items:baseline;gap:6px;margin-bottom:6px}
.ch-card .ch-target .cur{font-size:22px;font-weight:800;letter-spacing:-.5px}
.ch-card .ch-target .sep{font-size:12px;color:var(--sub);font-weight:500}
.ch-card .ch-target .obj{font-size:14px;font-weight:700;color:var(--sub)}
.ch-bar-wrap{height:8px;background:#F1F5F9;border-radius:4px;overflow:hidden;margin-bottom:4px}
.ch-bar{height:100%;border-radius:4px;transition:width .6s ease}
.ch-card .ch-pct{font-size:10px;font-weight:700;text-align:right}
.ch-card .ch-rules{margin-top:14px;padding-top:12px;border-top:1px solid #F1F5F9}
.ch-card .ch-rules p{font-size:10px;color:var(--sub);line-height:1.6}
.ch-card .ch-period{font-size:10px;color:var(--mut);margin-top:8px;display:flex;align-items:center;gap:4px}
.ch-reward{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:var(--green);background:#ECFDF5;padding:3px 10px;border-radius:8px;margin-bottom:10px}
.ch-participants{margin-top:12px}
.ch-participant{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #F1F5F9}
.ch-participant:last-child{border-bottom:none}
.ch-participant .name{font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px}
.ch-participant .result{font-size:12px;font-weight:700}

@media print{.hdr,.nav{position:static}.mn{padding:8px}#splash{display:none}}
</style>
</head>
<body>

<div id="splash">
  <div class="sp-logo">
    <div class="sp-logo-text">GROUPE GARCIA</div>
    <div class="sp-logo-sub">Dashboard Jour — 9 Avril 2026</div>
  </div>
  <div class="sp-line"></div>
  <div class="sp-kpis">
    <div class="sp-kpi"><div class="sp-kpi-val">6</div><div class="sp-kpi-label">Boutiques</div></div>
    <div class="sp-kpi"><div class="sp-kpi-val">0 €</div><div class="sp-kpi-label">Marge Jour</div></div>
    <div class="sp-kpi"><div class="sp-kpi-val">0</div><div class="sp-kpi-label">Mobiles</div></div>
  </div>
</div>

<div class="hdr" id="hdr">
  <div class="hdr-left">
    <div class="logo">GROUPE GARCIA <span>Dashboard Jour</span></div>
    <div class="hdr-info">Mercredi 9 Avril 2026 — Données 3GWIN temps réel (màj 06:16)</div>
  </div>
</div>

<div class="nav" id="nav"></div>
<div class="mn" id="mn"></div>
<div class="ftr">Données 3GWIN JOUR du 09/04/2026 — Scrapé à 06:16 — Groupe Garcia © 2026</div>

<script>
Chart.register(ChartDataLabels);

// ═══════════════════════════════════════
//  DONNÉES JOUR — 09/04/2026
//  Scrapées le 09/04/2026 à 06:16
// ═══════════════════════════════════════

const BOUTIQUES = {
  ALR:{nom:"Angers",color:"#2563EB"},
  TLR:{nom:"Amboise",color:"#7C3AED"},
  CLR:{nom:"Châteaudun",color:"#0891B2"},
  CHOLET:{nom:"Cholet",color:"#DC2626"},
  RLR:{nom:"Romorantin",color:"#059669"},
  VLR:{nom:"Vendôme",color:"#D97706"}
};

const MAGS = [
  {code:"ALR",nom:"Angers",color:"#2563EB",marge:0,mob:0,box:0,assu:0,cyber:0,g3a:0,access:0,abo:0},
  {code:"TLR",nom:"Amboise",color:"#7C3AED",marge:0,mob:0,box:0,assu:0,cyber:0,g3a:0,access:0,abo:0},
  {code:"CLR",nom:"Châteaudun",color:"#0891B2",marge:0,mob:0,box:0,assu:0,cyber:0,g3a:0,access:0,abo:0},
  {code:"CHOLET",nom:"Cholet",color:"#DC2626",marge:0,mob:0,box:0,assu:0,cyber:0,g3a:0,access:0,abo:0},
  {code:"RLR",nom:"Romorantin",color:"#059669",marge:0,mob:0,box:0,assu:0,cyber:0,g3a:0,access:0,abo:0},
  {code:"VLR",nom:"Vendôme",color:"#D97706",marge:0,mob:0,box:0,assu:0,cyber:0,g3a:0,access:0,abo:0},
];

const VENDEURS = [
  {nom:"AXEL",bou:"ALR",marge:0,mob:0,g3a:0,cyber:0,assu:0,access:0,box:0},
  {nom:"PAULINE",bou:"ALR",marge:0,mob:0,g3a:0,cyber:0,assu:0,access:0,box:0},
  {nom:"HASSENE",bou:"TLR",marge:0,mob:0,g3a:0,cyber:0,assu:0,access:0,box:0},
  {nom:"VICTOR",bou:"TLR",marge:0,mob:0,g3a:0,cyber:0,assu:0,access:0,box:0},
  {nom:"JULIE TLR",bou:"TLR",marge:0,mob:0,g3a:0,cyber:0,assu:0,access:0,box:0},
  {nom:"ILIAN",bou:"CLR",marge:0,mob:0,g3a:0,cyber:0,assu:0,access:0,box:0},
  {nom:"LOUANE",bou:"CLR",marge:0,mob:0,g3a:0,cyber:0,assu:0,access:0,box:0},
  {nom:"RACHEL",bou:"CLR",marge:0,mob:0,g3a:0,cyber:0,assu:0,access:0,box:0},
  {nom:"ANAIS",bou:"CHOLET",marge:0,mob:0,g3a:0,cyber:0,assu:0,access:0,box:0},
  {nom:"LUCAS",bou:"CHOLET",marge:0,mob:0,g3a:0,cyber:0,assu:0,access:0,box:0},
  {nom:"EMILIE",bou:"RLR",marge:0,mob:0,g3a:0,cyber:0,assu:0,access:0,box:0},
  {nom:"WILL",bou:"RLR",marge:0,mob:0,g3a:0,cyber:0,assu:0,access:0,box:0},
  {nom:"MEHDY",bou:"VLR",marge:0,mob:0,g3a:0,cyber:0,assu:0,access:0,box:0},
  {nom:"HAVAL",bou:"VLR",marge:0,mob:0,g3a:0,cyber:0,assu:0,access:0,box:0},
];

// ═══════════════════════════════════════
//  HISTORIQUE CHALLENGES (09/04 → 30/04/2026)
//  Chaque entrée = résultat d'une journée
//  MAJ : ajouter une ligne par jour scrapé
// ═══════════════════════════════════════
const CHALLENGE_HIST = [
  // { date:"09/04", top3:["NOM1","NOM2","NOM3"], top3_gagnes:["NOM1"], amboise_marge:XXX, amboise_won:true/false, louane_marge:XXX, louane_won:true/false, groupe_marge:XXXX, groupe_won:true/false }
  // Entrées ajoutées en fin de journée lors de chaque MAJ
];

// ═══════════════════════════════════════
//  COMPUTED
// ═══════════════════════════════════════
const T = {marge:0,mob:0,box:0,assu:0,cyber:0,g3a:0,access:0};
MAGS.forEach(b=>{T.marge+=b.marge;T.mob+=b.mob;T.box+=b.box;T.assu+=b.assu;T.cyber+=b.cyber;T.g3a+=b.g3a;T.access+=b.access});
T.txAssu=T.mob>0?(T.assu/T.mob*100):0;
T.txG3a=T.mob>0?(T.g3a/T.mob*100):0;
T.txAccess=T.mob>0?T.access/T.mob:0;

const BOU_ORDER=["ALR","TLR","CLR","CHOLET","RLR","VLR"];
let CT="synthese",CHS=[];

function fmt(n){return new Intl.NumberFormat('fr-FR',{maximumFractionDigits:0}).format(Math.round(n||0))}
function fmtD(n,d){return new Intl.NumberFormat('fr-FR',{minimumFractionDigits:d||0,maximumFractionDigits:d||0}).format(n||0)}
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"})[c])}
function rkCls(i){return i<3?['g','s','b'][i]:'n'}

// ═══════════════════════════════════════
//  NAV
// ═══════════════════════════════════════
function buildNav(){
  const nav=document.getElementById('nav');
  const tabs=[{id:'synthese',label:'Synthèse'}];
  BOU_ORDER.forEach(c=>{if(BOUTIQUES[c])tabs.push({id:c.toLowerCase(),label:BOUTIQUES[c].nom})});
  tabs.push({id:'vendeurs',label:'Collaborateurs'});
  tabs.push({id:'challenges',label:'Challenges'});
  nav.innerHTML=tabs.map(t=>`<button${t.id===CT?' class="active"':''} onclick="showTab('${t.id}')">${t.label}</button>`).join('');
}

function showTab(id){
  CT=id;
  document.querySelectorAll('.nav button').forEach(b=>{
    const label=b.textContent;
    const match=(id==='synthese'&&label==='Synthèse')||(id==='vendeurs'&&label==='Collaborateurs')||(id==='challenges'&&label==='Challenges')||(BOUTIQUES[id.toUpperCase()]&&BOUTIQUES[id.toUpperCase()].nom===label);
    b.classList.toggle('active',match);
  });
  render();
}

// ═══════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════
function render(){
  CHS.forEach(c=>c.destroy());CHS=[];
  const mn=document.getElementById('mn');
  if(CT==='synthese')renderSynthese(mn);
  else if(CT==='vendeurs')renderVendeurs(mn);
  else if(CT==='challenges')renderChallenges(mn);
  else renderBoutique(mn,CT.toUpperCase());
}

function renderSynthese(el){
  const bSort=[...MAGS].sort((a,b)=>b.marge-a.marge);
  el.innerHTML=`
  <div class="g4" style="margin-bottom:12px">
    <div class="cd kpi"><h3>MARGE DU JOUR</h3><div class="val">${fmt(T.marge)} €</div><div class="sub">6 boutiques • 09/04/2026</div></div>
    <div class="cd kpi"><h3>MOBILES DU JOUR</h3><div class="val">${T.mob}</div><div class="sub">vendus aujourd'hui</div></div>
    <div class="cd kpi"><h3>BOX DU JOUR</h3><div class="val">${T.box}</div><div class="sub">raccordements</div></div>
    <div class="cd kpi"><h3>SFR CYBER</h3><div class="val">${T.cyber}</div><div class="sub">sécurité</div></div>
  </div>
  <div class="g3" style="margin-bottom:12px">
    <div class="cd kpi"><h3>TX ASSURANCE</h3><div class="val">${fmtD(T.txAssu,1)}%</div><div class="sub">${T.assu} / ${T.mob} mob</div>
      <div class="tag ${T.txAssu>=50?'green':T.txAssu>=30?'orange':'red'}">${T.txAssu>=50?'✓ Objectif':'À améliorer'}</div></div>
    <div class="cd kpi"><h3>TX G3A</h3><div class="val">${fmtD(T.txG3a,1)}%</div><div class="sub">${T.g3a} / ${T.mob} mob</div>
      <div class="tag ${T.txG3a>=50?'green':T.txG3a>=30?'orange':'red'}">${T.txG3a>=50?'✓ Objectif':'À améliorer'}</div></div>
    <div class="cd kpi"><h3>ACCESS / MOB</h3><div class="val">${fmtD(T.txAccess,1)} €</div><div class="sub">CA: ${fmt(T.access)} €</div></div>
  </div>
  <div class="stitle">MARGE DU JOUR PAR BOUTIQUE</div>
  <div class="g2" style="margin-bottom:12px">
    <div class="cd"><h3>MARGE PAR BOUTIQUE</h3><canvas id="cMarge"></canvas></div>
    <div class="cd"><h3>MOBILES & BOX PAR BOUTIQUE</h3><canvas id="cMob"></canvas></div>
  </div>
  <div class="stitle">CLASSEMENT DES BOUTIQUES — JOURNÉE DU 09/04</div>
  <div class="cd" style="margin-bottom:12px">
    <table>
      <thead><tr><th>#</th><th>BOUTIQUE</th><th>MARGE</th><th>MOB</th><th>BOX</th><th>CYBER</th><th>ASSU</th><th>G3A</th><th>ACCESS</th></tr></thead>
      <tbody id="tblBou"></tbody>
    </table>
  </div>
  <div class="stitle">CLASSEMENT DES VENDEURS — JOURNÉE DU 09/04</div>
  <div class="cd">
    <table>
      <thead><tr><th>#</th><th>VENDEUR</th><th>BOUTIQUE</th><th>MARGE</th><th>MOB</th><th>G3A</th><th>CYBER</th><th>ASSU</th><th>ACCESS</th><th>BOX</th></tr></thead>
      <tbody id="tblVend"></tbody>
    </table>
  </div>`;

  const tbody=document.getElementById('tblBou');
  bSort.forEach((b,i)=>{
    tbody.innerHTML+=`<tr>
      <td><span class="rk ${rkCls(i)}">${i+1}</span></td>
      <td><span class="dot" style="background:${b.color}"></span>${b.nom}</td>
      <td><strong>${fmt(b.marge)} €</strong></td>
      <td>${b.mob}</td><td>${b.box}</td><td>${b.cyber}</td><td>${b.assu}</td><td>${b.g3a}</td><td>${fmt(b.access)} €</td>
    </tr>`;
  });
  tbody.innerHTML+=`<tr style="font-weight:700;background:#F8FAFC"><td></td><td>TOTAL JOUR</td>
    <td>${fmt(T.marge)} €</td><td>${T.mob}</td><td>${T.box}</td><td>${T.cyber}</td><td>${T.assu}</td><td>${T.g3a}</td><td>${fmt(T.access)} €</td></tr>`;

  const vtbody=document.getElementById('tblVend');
  const vSort=[...VENDEURS].sort((a,b)=>b.marge-a.marge);
  vSort.forEach((v,i)=>{
    const bInfo=BOUTIQUES[v.bou]||{nom:v.bou,color:'#999'};
    vtbody.innerHTML+=`<tr>
      <td><span class="rk ${rkCls(i)}">${i+1}</span></td>
      <td><strong>${esc(v.nom)}</strong></td>
      <td><span class="dot" style="background:${bInfo.color}"></span>${bInfo.nom}</td>
      <td>${fmt(v.marge)} €</td><td>${v.mob}</td><td>${v.g3a}</td><td>${v.cyber}</td><td>${v.assu}</td><td>${fmt(v.access)} €</td><td>${v.box}</td>
    </tr>`;
  });

  const labels=MAGS.map(b=>b.nom),colors=MAGS.map(b=>b.color);
  CHS.push(makeBar('cMarge',labels,MAGS.map(b=>b.marge),colors,'€'));

  CHS.push(new Chart(document.getElementById('cMob'),{
    type:'bar',data:{labels,datasets:[
      {label:'Mob',data:MAGS.map(b=>b.mob),backgroundColor:'#2563EBCC',borderRadius:3},
      {label:'Box',data:MAGS.map(b=>b.box),backgroundColor:'#7C3AEDCC',borderRadius:3}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{usePointStyle:true,padding:8,font:{size:10,family:'Plus Jakarta Sans'}}},datalabels:{font:{weight:700,size:10}}},scales:{x:{grid:{display:false},ticks:{font:{size:10}}},y:{beginAtZero:true,grid:{color:'#F1F5F9'}}}}
  }));
}

function renderBoutique(el,code){
  const mag=MAGS.find(b=>b.code===code);
  if(!mag){el.innerHTML='';return}
  const vendeurs=[...VENDEURS.filter(v=>v.bou===code)].sort((a,b)=>b.marge-a.marge);
  const txA=mag.mob>0?(mag.assu/mag.mob*100):0,txG=mag.mob>0?(mag.g3a/mag.mob*100):0,txAcc=mag.mob>0?mag.access/mag.mob:0;

  el.innerHTML=`
  <div class="bh">
    <div class="icon" style="background:${mag.color}">${mag.nom.charAt(0)}</div>
    <div class="info"><h2>${mag.nom}</h2><p>${code} — Journée du 09/04/2026</p></div>
  </div>
  <div class="g4" style="margin-bottom:12px">
    <div class="cd kpi"><h3>MARGE JOUR</h3><div class="val">${fmt(mag.marge)} €</div></div>
    <div class="cd kpi"><h3>MOBILES</h3><div class="val">${mag.mob}</div><div class="sub">${mag.box} box</div></div>
    <div class="cd kpi"><h3>CYBER</h3><div class="val">${mag.cyber}</div></div>
    <div class="cd kpi"><h3>G3A</h3><div class="val">${mag.g3a}</div><div class="sub">${mag.assu} assu</div></div>
  </div>
  ${vendeurs.length?`
  <div class="g3" style="margin-bottom:12px">
    <div class="cd kpi"><h3>TX ASSURANCE</h3><div class="val">${fmtD(txA,1)}%</div>
      <div class="tag ${txA>=50?'green':txA>=30?'orange':'red'}">${txA>=50?'✓':'⚠'}</div></div>
    <div class="cd kpi"><h3>TX G3A</h3><div class="val">${fmtD(txG,1)}%</div>
      <div class="tag ${txG>=50?'green':txG>=30?'orange':'red'}">${txG>=50?'✓':'⚠'}</div></div>
    <div class="cd kpi"><h3>ACCESS / MOB</h3><div class="val">${fmtD(txAcc,1)} €</div></div>
  </div>
  <div class="g2" style="margin-bottom:12px">
    <div class="cd"><h3>MARGE PAR VENDEUR</h3><canvas id="cBMarge"></canvas></div>
    <div class="cd"><h3>ITEMS PAR VENDEUR</h3><canvas id="cBPerf"></canvas></div>
  </div>
  <div class="stitle">VENDEURS — ${mag.nom.toUpperCase()}</div>
  <div class="cd">
    <table>
      <thead><tr><th>#</th><th>VENDEUR</th><th>MARGE</th><th>MOB</th><th>G3A</th><th>CYBER</th><th>ASSU</th><th>ACCESS</th><th>BOX</th></tr></thead>
      <tbody id="tblBV"></tbody>
    </table>
  </div>`:'<div class="cd" style="text-align:center;padding:40px;color:var(--sub)">Aucune activité aujourd\'hui</div>'}`;

  if(!vendeurs.length)return;
  const tbody=document.getElementById('tblBV');
  vendeurs.forEach((v,i)=>{
    tbody.innerHTML+=`<tr>
      <td><span class="rk ${rkCls(i)}">${i+1}</span></td>
      <td><strong>${esc(v.nom)}</strong></td>
      <td>${fmt(v.marge)} €</td><td>${v.mob}</td><td>${v.g3a}</td><td>${v.cyber}</td><td>${v.assu}</td><td>${fmt(v.access)} €</td><td>${v.box}</td>
    </tr>`;
  });

  const vLabels=vendeurs.map(v=>v.nom);
  const palette=['#2563EB','#7C3AED','#0891B2','#DC2626','#059669','#D97706'];
  const vColors=vendeurs.map((_,i)=>palette[i%palette.length]);

  CHS.push(new Chart(document.getElementById('cBMarge'),{
    type:'doughnut',data:{labels:vLabels,datasets:[{data:vendeurs.map(v=>v.marge),backgroundColor:vColors.map(c=>c+'CC'),borderColor:'#fff',borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'55%',plugins:{legend:{position:'right',labels:{usePointStyle:true,padding:10,font:{size:11,family:'Plus Jakarta Sans'}}},datalabels:{color:'#fff',font:{weight:700,size:11},formatter:(v,ctx)=>{const t=ctx.dataset.data.reduce((a,b)=>a+b,0);return t>0?(v/t*100).toFixed(0)+'%':''}}}}
  }));

  CHS.push(new Chart(document.getElementById('cBPerf'),{
    type:'bar',data:{labels:vLabels,datasets:[
      {label:'Mob',data:vendeurs.map(v=>v.mob),backgroundColor:'#2563EBCC',borderRadius:3},
      {label:'Cyber',data:vendeurs.map(v=>v.cyber),backgroundColor:'#7C3AEDCC',borderRadius:3},
      {label:'Assu',data:vendeurs.map(v=>v.assu),backgroundColor:'#059669CC',borderRadius:3},
      {label:'G3A',data:vendeurs.map(v=>v.g3a),backgroundColor:'#D97706CC',borderRadius:3}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{usePointStyle:true,padding:8,font:{size:10,family:'Plus Jakarta Sans'}}},datalabels:{font:{weight:700,size:9}}},scales:{x:{grid:{display:false},ticks:{font:{size:10}}},y:{beginAtZero:true,grid:{color:'#F1F5F9'}}}}
  }));
}

function renderChallenges(el){
  // ── Exclusions : managers et CDV ne jouent PAS le challenge vendeur ──
  const EXCLUS_VENDEUR=["HASSENE","LOUANE","ROMAIN GP"];
  const vSort=[...VENDEURS].filter(v=>!EXCLUS_VENDEUR.includes(v.nom)).sort((a,b)=>b.marge-a.marge);
  const top3=vSort.slice(0,3);
  const margeGroupe=T.marge;
  const margeTLR=(MAGS.find(m=>m.code==='TLR')||{marge:0}).marge;
  const louane=VENDEURS.find(v=>v.nom==='LOUANE')||{marge:0};
  const margeLouane=louane.marge||0;

  const ch2aWon=margeTLR>=700;
  const ch2aPct=Math.min(100,margeTLR/700*100);
  const ch2bWon=margeLouane>=1000;
  const ch2bPct=Math.min(100,margeLouane/1000*100);
  const ch3Won=margeGroupe>=4000;
  const ch3Pct=Math.min(100,margeGroupe/4000*100);

  // ── Cumuls depuis CHALLENGE_HIST ──
  const vendeurWins={};
  let amboiseWins=0, louaneWins=0, romainWins=0;
  CHALLENGE_HIST.forEach(d=>{
    (d.top3_gagnes||[]).forEach(nom=>{vendeurWins[nom]=(vendeurWins[nom]||0)+1});
    if(d.amboise_won) amboiseWins++;
    if(d.louane_won) louaneWins++;
    if(d.groupe_won) romainWins++;
  });
  const nbJours=CHALLENGE_HIST.length;
  const totalPrimeVendeurs=Object.values(vendeurWins).reduce((a,b)=>a+b,0)*20;
  const totalPrimeAmboise=amboiseWins*20;
  const totalPrimeLouane=louaneWins*20;
  const totalPrimeRomain=romainWins*20;
  const totalPrimeGlobal=totalPrimeVendeurs+totalPrimeAmboise+totalPrimeLouane+totalPrimeRomain;

  // Tri vendeurs par gains décroissants
  const vendeurCumulArr=Object.entries(vendeurWins).sort((a,b)=>b[1]-a[1]);

  el.innerHTML=`
  <div class="stitle">CHALLENGES EN COURS — DU 09/04 AU 30/04/2026</div>

  <div class="g4" style="margin-bottom:16px">
    <div class="cd kpi"><h3>JOURS ENREGISTRÉS</h3><div class="val">${nbJours}</div><div class="sub">depuis le 08/04</div></div>
    <div class="cd kpi"><h3>TOTAL PRIMES</h3><div class="val" style="color:var(--green)">${fmt(totalPrimeGlobal)} €</div><div class="sub">tous challenges confondus</div></div>
    <div class="cd kpi"><h3>MARGE DU JOUR</h3><div class="val">${fmt(margeGroupe)} €</div><div class="sub">obj CDV : 4 000 €</div></div>
    <div class="cd kpi"><h3>PRIME / JOUR</h3><div class="val">20 €</div><div class="sub">par challenge gagné</div></div>
  </div>

  <!-- ══════ CUMUL DES PRIMES À DATE ══════ -->
  <div class="stitle">CUMUL DES PRIMES À DATE</div>
  <div class="cd" style="margin-bottom:16px">
    <table>
      <thead><tr><th>COLLABORATEUR / CHALLENGE</th><th>TYPE</th><th>JOURS GAGNÉS</th><th>PRIME CUMULÉE</th></tr></thead>
      <tbody>
        ${vendeurCumulArr.map((e,i)=>{
          const v=VENDEURS.find(v=>v.nom===e[0]);
          const bInfo=v?BOUTIQUES[v.bou]||{nom:v.bou,color:'#999'}:{nom:'',color:'#999'};
          return `<tr>
            <td><span class="rk ${rkCls(i)}">${i+1}</span> <strong>${esc(e[0])}</strong> <span class="dot" style="background:${bInfo.color}"></span><span style="font-size:10px;color:var(--sub)">${bInfo.nom}</span></td>
            <td>Vendeur</td>
            <td><strong>${e[1]}</strong> / ${nbJours} jours</td>
            <td><strong style="color:var(--green)">${fmt(e[1]*20)} €</strong></td>
          </tr>`;
        }).join('')}
        <tr>
          <td><strong>Hassene — Manager Amboise</strong> <span class="dot" style="background:#7C3AED"></span><span style="font-size:10px;color:var(--sub)">TLR</span></td>
          <td>Manager</td>
          <td><strong>${amboiseWins}</strong> / ${nbJours} jours</td>
          <td><strong style="color:var(--green)">${fmt(totalPrimeAmboise)} €</strong></td>
        </tr>
        <tr>
          <td><strong>Louane — Manageuse Cholet</strong> <span class="dot" style="background:#DC2626"></span><span style="font-size:10px;color:var(--sub)">Cholet</span></td>
          <td>Manageuse</td>
          <td><strong>${louaneWins}</strong> / ${nbJours} jours</td>
          <td><strong style="color:var(--green)">${fmt(totalPrimeLouane)} €</strong></td>
        </tr>
        <tr>
          <td><strong>Romain</strong></td>
          <td>Chef des Ventes</td>
          <td><strong>${romainWins}</strong> / ${nbJours} jours</td>
          <td><strong style="color:var(--green)">${fmt(totalPrimeRomain)} €</strong></td>
        </tr>
        <tr style="font-weight:700;background:#F8FAFC">
          <td colspan="2">TOTAL PRIMES VERSÉES</td>
          <td></td>
          <td style="color:var(--green);font-size:14px">${fmt(totalPrimeGlobal)} €</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- ══════ HISTORIQUE JOUR PAR JOUR ══════ -->
  <div class="stitle">HISTORIQUE JOUR PAR JOUR</div>
  <div class="cd" style="margin-bottom:16px;overflow-x:auto">
    <table>
      <thead><tr><th>DATE</th><th>TOP 3 VENDEURS (GAGNANTS)</th><th>HASSENE (AMBOISE)</th><th>LOUANE (CHOLET)</th><th>ROMAIN (GROUPE)</th><th>PRIMES DU JOUR</th></tr></thead>
      <tbody>
        ${[...CHALLENGE_HIST].reverse().map(d=>{
          const primeJour=((d.top3_gagnes||[]).length*20)+(d.amboise_won?20:0)+(d.louane_won?20:0)+(d.groupe_won?20:0);
          return `<tr>
            <td><strong>${d.date}</strong></td>
            <td>${(d.top3||[]).map(n=>{
              const won=(d.top3_gagnes||[]).includes(n);
              return `<span style="display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;margin:1px 2px;${won?'background:#ECFDF5;color:var(--green)':'background:#FEF2F2;color:var(--red)'}">${esc(n)} ${won?'✓':'✗'}</span>`;
            }).join('')}</td>
            <td><span class="ch-badge ${d.amboise_won?'won':'lost'}">${d.amboise_won?fmt(d.amboise_marge)+' € ✓':'✗ '+fmt(d.amboise_marge)+' €'}</span></td>
            <td><span class="ch-badge ${d.louane_won?'won':'lost'}">${d.louane_won?fmt(d.louane_marge)+' € ✓':'✗ '+fmt(d.louane_marge)+' €'}</span></td>
            <td><span class="ch-badge ${d.groupe_won?'won':'lost'}">${d.groupe_won?fmt(d.groupe_marge)+' € ✓':'✗ '+fmt(d.groupe_marge)+' €'}</span></td>
            <td><strong style="color:${primeJour>0?'var(--green)':'var(--sub)'}">${primeJour>0?'+'+fmt(primeJour)+' €':'0 €'}</strong></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>

  <!-- ══════ CHALLENGES DU JOUR ══════ -->
  <div class="stitle">STATUT DU JOUR — TEMPS RÉEL</div>

  <!-- CHALLENGE 1 : VENDEUR -->
  <div class="ch-card" style="margin-bottom:16px">
    <div class="ch-accent" style="background:linear-gradient(90deg,var(--blue),var(--purple))"></div>
    <div class="ch-header">
      <div style="display:flex;align-items:center;gap:12px">
        <div class="ch-icon" style="background:linear-gradient(135deg,var(--blue),var(--purple))">V</div>
        <div>
          <div class="ch-title">Challenge Vendeur — Top 3 + 400 € min</div>
          <div class="ch-period">20 € / jour</div>
        </div>
      </div>
    </div>
    <div class="ch-participants">
      ${top3.map((v,i)=>{
        const bInfo=BOUTIQUES[v.bou]||{nom:v.bou,color:'#999'};
        const won=v.marge>=400;
        const cumul=vendeurWins[v.nom]||0;
        return `<div class="ch-participant">
          <div class="name"><span class="rk ${rkCls(i)}">${i+1}</span> ${esc(v.nom)} <span class="dot" style="background:${bInfo.color}"></span><span style="font-size:10px;color:var(--sub);font-weight:400">${bInfo.nom}</span></div>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="result" style="color:${won?'var(--green)':'var(--txt)'}">${fmt(v.marge)} €</div>
            <span class="ch-badge ${won?'won':'lost'}">${won?'GAGNÉ':'< 400 €'}</span>
            ${cumul>0?`<span style="font-size:10px;color:var(--green);font-weight:700">cumul: ${cumul*20} €</span>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>
    ${vSort.length>3?`<div style="margin-top:8px;font-size:10px;color:var(--mut)">4e : ${esc(vSort[3].nom)} — ${fmt(vSort[3].marge)} € | 5e : ${esc(vSort[4]?.nom||'-')} — ${fmt(vSort[4]?.marge||0)} €</div>`:''}
  </div>

  <!-- CHALLENGE 2 : MANAGER -->
  <div class="g2" style="margin-bottom:16px">
    <div class="ch-card">
      <div class="ch-accent" style="background:var(--purple)"></div>
      <div class="ch-header">
        <div style="display:flex;align-items:center;gap:12px">
          <div class="ch-icon" style="background:var(--purple)">A</div>
          <div>
            <div class="ch-title">Hassene — Manager Amboise — 700 €</div>
            <div class="ch-period">20 € / jour | cumul: <strong style="color:var(--green)">${fmt(totalPrimeAmboise)} €</strong></div>
          </div>
        </div>
        <span class="ch-badge ${ch2aWon?'won':'pending'}">${ch2aWon?'GAGNÉ':'En cours'}</span>
      </div>
      <div class="ch-target">
        <div class="cur" style="color:${ch2aWon?'var(--green)':'var(--txt)'}">${fmt(margeTLR)} €</div>
        <div class="sep">/</div>
        <div class="obj">700 €</div>
      </div>
      <div class="ch-bar-wrap">
        <div class="ch-bar" style="width:${ch2aPct}%;background:${ch2aWon?'var(--green)':ch2aPct>=70?'var(--orange)':'linear-gradient(90deg,var(--blue),var(--purple))'}"></div>
      </div>
      <div class="ch-pct" style="color:${ch2aWon?'var(--green)':'var(--blue)'}">${fmtD(ch2aPct,0)}%</div>
    </div>

    <div class="ch-card">
      <div class="ch-accent" style="background:var(--red)"></div>
      <div class="ch-header">
        <div style="display:flex;align-items:center;gap:12px">
          <div class="ch-icon" style="background:var(--red)">L</div>
          <div>
            <div class="ch-title">Louane — Manageuse Cholet — 1 000 €</div>
            <div class="ch-period">20 € / jour | cumul: <strong style="color:var(--green)">${fmt(totalPrimeLouane)} €</strong></div>
          </div>
        </div>
        <span class="ch-badge ${ch2bWon?'won':'pending'}">${ch2bWon?'GAGNÉ':'En cours'}</span>
      </div>
      <div class="ch-target">
        <div class="cur" style="color:${ch2bWon?'var(--green)':'var(--txt)'}">${fmt(margeLouane)} €</div>
        <div class="sep">/</div>
        <div class="obj">1 000 €</div>
      </div>
      <div class="ch-bar-wrap">
        <div class="ch-bar" style="width:${ch2bPct}%;background:${ch2bWon?'var(--green)':ch2bPct>=70?'var(--orange)':'var(--red)'}"></div>
      </div>
      <div class="ch-pct" style="color:${ch2bWon?'var(--green)':'var(--red)'}">${fmtD(ch2bPct,0)}%</div>
    </div>
  </div>

  <!-- CHALLENGE 3 : CDV -->
  <div class="ch-card" style="margin-bottom:16px">
    <div class="ch-accent" style="background:linear-gradient(90deg,var(--green),var(--cyan))"></div>
    <div class="ch-header">
      <div style="display:flex;align-items:center;gap:12px">
        <div class="ch-icon" style="background:linear-gradient(135deg,var(--green),var(--cyan))">R</div>
        <div>
          <div class="ch-title">Romain CDV — 4 000 € groupe</div>
          <div class="ch-period">20 € / jour | cumul: <strong style="color:var(--green)">${fmt(totalPrimeRomain)} €</strong></div>
        </div>
      </div>
      <span class="ch-badge ${ch3Won?'won':'pending'}">${ch3Won?'GAGNÉ':'En cours'}</span>
    </div>
    <div class="ch-target">
      <div class="cur" style="color:${ch3Won?'var(--green)':'var(--txt)'}">${fmt(margeGroupe)} €</div>
      <div class="sep">/</div>
      <div class="obj">4 000 €</div>
    </div>
    <div class="ch-bar-wrap">
      <div class="ch-bar" style="width:${ch3Pct}%;background:${ch3Won?'var(--green)':ch3Pct>=70?'var(--orange)':'linear-gradient(90deg,var(--green),var(--cyan))'}"></div>
    </div>
    <div class="ch-pct" style="color:${ch3Won?'var(--green)':'var(--cyan)'}">${fmtD(ch3Pct,0)}%</div>
    <div class="ch-participants" style="margin-top:10px">
      ${[...MAGS].sort((a,b)=>b.marge-a.marge).map(m=>`
        <div class="ch-participant">
          <div class="name"><span class="dot" style="background:${m.color}"></span>${m.nom}</div>
          <div class="result">${fmt(m.marge)} €</div>
        </div>
      `).join('')}
    </div>
  </div>
  `;
}

function makeBar(id,labels,data,colors,suffix){
  return new Chart(document.getElementById(id),{
    type:'bar',
    data:{labels,datasets:[{data,backgroundColor:colors.map(c=>c+'CC'),borderRadius:4,borderSkipped:false}]},
    options:{
      responsive:true,maintainAspectRatio:false,indexAxis:'y',
      plugins:{legend:{display:false},datalabels:{anchor:'end',align:'end',font:{weight:700,size:11,family:'Plus Jakarta Sans'},color:'#0F1419',formatter:v=>fmt(v)+(suffix?' '+suffix:'')}},
      scales:{x:{display:false,grid:{display:false}},y:{grid:{display:false},ticks:{font:{size:11,weight:600,family:'Plus Jakarta Sans'}}}}
    }
  });
}
