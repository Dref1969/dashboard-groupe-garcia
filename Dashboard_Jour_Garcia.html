<style>
:root{--bg:#F0F2F5;--card:#FFF;--hdr:#0F172A;--txt:#0F1419;--sub:#64748B;--mut:#94A3B8;--brd:#E2E8F0;--blue:#2563EB;--purple:#7C3AED;--green:#059669;--orange:#D97706;--red:#DC2626;--cyan:#0891B2;--r:10px}

body{font-family:'Plus Jakarta Sans',-apple-system,sans-serif;background:var(--bg);color:var(--txt);font-size:13px;-webkit-font-smoothing:antialiased;overflow-x:hidden}

<script>
Chart.register(ChartDataLabels);

// ═══════════════════════════════════════
//  DONNÉES JOUR — Chargées depuis Google Sheets
//  Onglet Donnees_Jour du Sheet Principal
// ═══════════════════════════════════════

const SHEET_ID = "1su6J88rzRF9hnZXwOsD8gkSDQpDl_XI1Ifjcoost6rY";
const TAB_NAME = "Donnees_Jour";

const BOUTIQUES = {
  ALR:{nom:"Angers",color:"#2563EB"},
  TLR:{nom:"Amboise",color:"#7C3AED"},
  CLR:{nom:"Châteaudun",color:"#0891B2"},
  CHOLET:{nom:"Cholet",color:"#DC2626"},
  RLR:{nom:"Romorantin",color:"#059669"},
  VLR:{nom:"Vendôme",color:"#D97706"}
};

let MAGS = [];
let VENDEURS = [];
let CHALLENGE_HIST = [];
let DATA_DATE = "";
let DATA_HEURE = "";
let LAST_ERROR = null;

// ═══════════════════════════════════════
//  SPLASH PROGRESS
// ═══════════════════════════════════════
function splashProgress(pct, msg){
  const bar=document.getElementById('spBar');
  const status=document.getElementById('spStatus');
  if(bar) bar.style.width=pct+'%';
  if(status) status.textContent=msg||'';
}

// ═══════════════════════════════════════
//  CACHE localStorage (stale-while-revalidate)
// ═══════════════════════════════════════
const CACHE_PREFIX='garcia_jour_';
const CACHE_TTL=5*60*1000; // 5 min : données considérées "fraîches"

function cacheGet(key){
  try{
    const raw=localStorage.getItem(CACHE_PREFIX+key);
    if(!raw) return null;
    const {data,ts}=JSON.parse(raw);
    return {data,ts,fresh:Date.now()-ts<CACHE_TTL};
  }catch(e){return null}
}
function cacheSet(key,data){
  try{localStorage.setItem(CACHE_PREFIX+key,JSON.stringify({data,ts:Date.now()}))}catch(e){}
}

// ═══════════════════════════════════════
//  FETCH WITH RETRY (exponential backoff)
// ═══════════════════════════════════════
async function fetchRetry(url, retries=3, delay=1000){
  for(let i=0;i<=retries;i++){
    try{
      const r=await fetch(url);
      if(!r.ok) throw new Error("HTTP "+r.status);
      return await r.text();
    }catch(e){
      if(i===retries) throw e;
      await new Promise(ok=>setTimeout(ok,delay*(i+1)));
    }
  }
}

// ═══════════════════════════════════════
//  PARSE CSV (robuste)
// ═══════════════════════════════════════
function parseCSV(text){
  const lines=text.split('\n').filter(l=>l.trim());
  if(lines.length<2) return [];
  const hdr=lines[0].split(',').map(h=>h.replace(/^"|"$/g,'').trim());
  return lines.slice(1).map(line=>{
    const vals=[];let cur='',inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){inQ=!inQ}
      else if(c===','&&!inQ){vals.push(cur.replace(/^"|"$/g,'').trim());cur=''}
      else{cur+=c}
    }
    vals.push(cur.replace(/^"|"$/g,'').trim());
    const obj={};
    hdr.forEach((h,i)=>{obj[h]=vals[i]||''});
    return obj;
  });
}

function initEmptyMags(){
  MAGS=[];
  Object.keys(BOUTIQUES).forEach(code=>{
    MAGS.push({code,nom:BOUTIQUES[code].nom,color:BOUTIQUES[code].color,marge:0,mob:0,box:0,assu:0,cyber:0,g3a:0,access:0,abo:0});
  });
}

async function fetchJourData(){
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(TAB_NAME)}`;
  const text=await fetchRetry(url);
  const rows=parseCSV(text);

  // Mise en cache des données brutes parsées
  cacheSet('jour',rows);

  const meta=rows.find(r=>r.Type==="META");
  if(meta){
    DATA_DATE=meta.Date||"";
    DATA_HEURE=meta.Heure||"";
  }

  MAGS=rows.filter(r=>r.Type==="MAG").map(r=>({
    code:r.Code||"",
    nom:r.Nom||"",
    color:(BOUTIQUES[r.Code]||{}).color||"#888",
    marge:parseFloat(r.Marge)||0,
    mob:parseInt(r.Mob)||0,
    box:parseInt(r.Box)||0,
    cyber:parseInt(r.Cyber)||0,
    assu:parseInt(r.Assu)||0,
    g3a:parseInt(r.G3A)||0,
    access:parseFloat(r.Access)||0,
    margeAssu:parseFloat(r.MargeAssu)||0,
    margeServices:parseFloat(r.MargeServices)||0,
    abo:parseInt(r.Abo)||0
  }));

  if(MAGS.length===0) initEmptyMags();
  MAGS.sort((a,b)=>b.marge-a.marge);

  VENDEURS=rows.filter(r=>r.Type==="VENDEUR").map(r=>({
    nom:r.Code||"",
    bou:r.Nom||"",
    marge:parseFloat(r.Marge)||0,
    mob:parseInt(r.Mob)||0,
    box:parseInt(r.Box)||0,
    cyber:parseInt(r.Cyber)||0,
    assu:parseInt(r.Assu)||0,
    g3a:parseInt(r.G3A)||0,
    access:parseFloat(r.Access)||0,
    margeAssu:parseFloat(r.MargeAssu)||0,
    margeServices:parseFloat(r.MargeServices)||0,
    abo:parseInt(r.Abo)||0
  }));
  VENDEURS.sort((a,b)=>b.marge-a.marge);
}

// Store des factures detaillees (vraie marge par vendeur + modeles vendus)
let FACTURES_SUMMARY=[]; // per vendeur
let FACTURES_MOBILES=[]; // detail mobile par mobile

async function fetchFacturesJour(){
  try{
    const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent('Factures_Jour')}`;
    const text=await fetchRetry(url);
    const rows=parseCSV(text);
    FACTURES_SUMMARY=rows.filter(r=>r.Type==="SUMMARY").map(r=>({
      vendeur:r.Vendeur||"",
      boutique:r.Boutique||"",
      nbFactures:parseInt(r.NbFactures)||0,
      nbFactMobile:parseInt(r.NbFactMobile)||0,
      nbMobiles:parseInt(r.NbMobiles)||0,
      margeTotale:parseFloat((r.MargeTotale||"0").replace(",","."))||0,
      margeFactMobile:parseFloat((r.MargeFactMobile||"0").replace(",","."))||0,
      margeParMobile:parseFloat((r.MargeParMobile||"0").replace(",","."))||0,
      margeParFacture:parseFloat((r.MargeParFacture||"0").replace(",","."))||0
    }));
    FACTURES_MOBILES=rows.filter(r=>r.Type==="MOBILE").map(r=>({
      vendeur:r.Vendeur||"",
      boutique:r.Boutique||"",
      numFac:r.NumFac||"",
      modele:r.Modele||"",
      margeMobileSeul:parseFloat((r.MargeMobileSeul||"0").replace(",","."))||0,
      margeFactureTotale:parseFloat((r.MargeFactureTotale||"0").replace(",","."))||0,
      margeAllouee:parseFloat((r.MargeAllouee||"0").replace(",","."))||0
    }));
    cacheSet('factures',{summary:FACTURES_SUMMARY,mobiles:FACTURES_MOBILES});
  }catch(e){
    FACTURES_SUMMARY=[];
    FACTURES_MOBILES=[];
  }
}

async function fetchChallengeHist(){
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent('Historique_Challenges')}`;
  const text=await fetchRetry(url);
  const rows=parseCSV(text);
  CHALLENGE_HIST=rows.map(r=>({
    date:r.Date||"",
    top3:(r.Top3||"").split(",").filter(s=>s.trim()),
    top3_gagnes:(r.Top3_Gagnes||"").split(",").filter(s=>s.trim()),
    amboise_marge:parseFloat((r.Amboise_Marge||"0").replace(",","."))||0,
    amboise_won:(r.Amboise_Won||"").toUpperCase()==="OUI",
    louane_marge:parseFloat((r.Louane_Marge||"0").replace(",","."))||0,
    louane_won:(r.Louane_Won||"").toUpperCase()==="OUI",
    groupe_marge:parseFloat((r.Groupe_Marge||"0").replace(",","."))||0,
    groupe_won:(r.Groupe_Won||"").toUpperCase()==="OUI"
  })).filter(r=>r.date);

  // Mise en cache des challenges parsés
  cacheSet('challenges',CHALLENGE_HIST);
}

// ═══════════════════════════════════════
//  COMPUTED (recalculé après chargement)
// ═══════════════════════════════════════
const T = {marge:0,mob:0,box:0,assu:0,cyber:0,g3a:0,access:0};
function computeTotals(){
  T.marge=0;T.mob=0;T.box=0;T.assu=0;T.cyber=0;T.g3a=0;T.access=0;
  MAGS.forEach(b=>{T.marge+=b.marge;T.mob+=b.mob;T.box+=b.box;T.assu+=b.assu;T.cyber+=b.cyber;T.g3a+=b.g3a;T.access+=b.access});
  T.txAssu=T.mob>0?(T.assu/T.mob*100):0;
  T.txG3a=T.mob>0?(T.g3a/T.mob*100):0;
  T.txAccess=T.mob>0?T.access/T.mob:0;
}

const BOU_ORDER=["ALR","TLR","CLR","CHOLET","RLR","VLR"];
let CT="synthese",CHS=[];

function fmt(n){return new Intl.NumberFormat('fr-FR',{maximumFractionDigits:0}).format(Math.round(n||0))}
function fmtD(n,d){return new Intl.NumberFormat('fr-FR',{minimumFractionDigits:d||0,maximumFractionDigits:d||0}).format(n||0)}
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"})[c])}
function rkCls(i){return i<3?['g','s','b'][i]:'n'}

// ═══════════════════════════════════════
//  NAV
// ═══════════════════════════════════════
function buildNav(){
  const nav=document.getElementById('nav');
  const tabs=[{id:'synthese',label:'Synthèse'}];
  BOU_ORDER.forEach(c=>{if(BOUTIQUES[c])tabs.push({id:c.toLowerCase(),label:BOUTIQUES[c].nom})});
  tabs.push({id:'vendeurs',label:'Collaborateurs'});
  tabs.push({id:'challenges',label:'Challenges'});
  nav.innerHTML=tabs.map(t=>`<button${t.id===CT?' class="active"':''} onclick="showTab('${t.id}')">${t.label}</button>`).join('');
}

function showTab(id){
  if(id===CT) return;
  CT=id;
  document.querySelectorAll('.nav button').forEach(b=>{
    const label=b.textContent;
    const match=(id==='synthese'&&label==='Synthèse')||(id==='vendeurs'&&label==='Collaborateurs')||(id==='challenges'&&label==='Challenges')||(BOUTIQUES[id.toUpperCase()]&&BOUTIQUES[id.toUpperCase()].nom===label);
    b.classList.toggle('active',match);
  });
  const mn=document.getElementById('mn');
  mn.classList.add('fading');
  setTimeout(()=>{render();mn.classList.remove('fading');},150);
}

// ═══════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════
function render(){
  CHS.forEach(c=>{try{c.destroy()}catch(e){}});CHS=[];
  const mn=document.getElementById('mn');
  if(CT==='synthese')renderSynthese(mn);
  else if(CT==='vendeurs')renderVendeurs(mn);
  else if(CT==='challenges')renderChallenges(mn);
  else renderBoutique(mn,CT.toUpperCase());
}

function safeChart(id,cfg){
  const el=document.getElementById(id);
  if(!el) return null;
  try{const c=new Chart(el,cfg);CHS.push(c);return c;}catch(e){console.warn('Chart error:',e);return null;}
}

function errBanner(){
  if(!LAST_ERROR) return '';
  const msg=LAST_ERROR.includes('fetch')?'Connexion impossible à Google Sheets — vérifiez votre connexion internet':esc(LAST_ERROR);
  return `<div class="err-banner">⚠ ${msg} <button class="retry-btn" onclick="manualRefresh()">Réessayer</button></div>`;
}

let IS_REFRESHING=false;

async function manualRefresh(){
  if(IS_REFRESHING) return;
  IS_REFRESHING=true;
  LAST_ERROR=null;

  // Animation bouton
  const btn=document.getElementById('refreshBtn');
  const icon=document.getElementById('refreshIcon');
  if(btn){btn.style.color='#fff';btn.style.borderColor='rgba(255,255,255,.5)';}
  if(icon) icon.style.animation='spin .8s linear infinite';

  // Indicateur discret dans le header
  const hdrInfo=document.querySelector('.hdr-info');
  const prevText=hdrInfo?hdrInfo.textContent:'';
  if(hdrInfo) hdrInfo.textContent='Actualisation en cours...';

  try{
    // Fetch en PARALLÈLE
    await Promise.all([fetchJourData(), fetchChallengeHist(), fetchFacturesJour()]);
    computeTotals();
    updateDates();
    render();
    LAST_ERROR=null;
  }catch(e){
    LAST_ERROR=e.message;
    if(hdrInfo) hdrInfo.textContent=prevText;
    render();
  }finally{
    IS_REFRESHING=false;
    if(btn){btn.style.color='#94A3B8';btn.style.borderColor='rgba(255,255,255,.2)';}
    if(icon) icon.style.animation='none';
  }
}

// Refresh silencieux (sans animation lourde)
async function silentRefresh(){
  if(IS_REFRESHING) return;
  IS_REFRESHING=true;
  try{
    // Fetch en PARALLÈLE
    await Promise.all([fetchJourData(), fetchChallengeHist(), fetchFacturesJour()]);
    computeTotals();
    updateDates();
    render();
    LAST_ERROR=null;
  }catch(e){
    console.warn("Refresh échoué:",e.message);
  }finally{
    IS_REFRESHING=false;
  }
}

function renderBoutique(el,code){
  const mag=MAGS.find(b=>b.code===code);
  if(!mag){el.innerHTML='';return}
  const vendeurs=[...VENDEURS.filter(v=>v.bou===code)].sort((a,b)=>b.marge-a.marge);
  const txA=mag.mob>0?(mag.assu/mag.mob*100):0,txG=mag.mob>0?(mag.g3a/mag.mob*100):0,txAcc=mag.mob>0?mag.access/mag.mob:0;

  const vRows=vendeurs.map((v,i)=>`<tr>
    <td><span class="rk ${rkCls(i)}">${i+1}</span></td>
    <td><strong>${esc(v.nom)}</strong></td>
    <td>${fmt(v.marge)} €</td><td>${v.mob}</td><td>${v.g3a}</td><td>${v.cyber}</td><td>${v.assu}</td><td>${fmt(v.access)} €</td><td>${v.box}</td>
  </tr>`);

  el.innerHTML=`${errBanner()}
  <div class="bh">
    <div class="icon" style="background:${mag.color}">${mag.nom.charAt(0)}</div>
    <div class="info"><h2>${mag.nom}</h2><p>${code} — Journée du ${DATA_DATE||"--/--/----"}</p></div>
  </div>
  <div class="g4" style="margin-bottom:12px">
    <div class="cd kpi"><h3>MARGE JOUR</h3><div class="val">${fmt(mag.marge)} €</div></div>
    <div class="cd kpi"><h3>MOBILES</h3><div class="val">${mag.mob}</div><div class="sub">${mag.box} box</div></div>
    <div class="cd kpi"><h3>CYBER</h3><div class="val">${mag.cyber}</div></div>
    <div class="cd kpi"><h3>G3A</h3><div class="val">${mag.g3a}</div><div class="sub">${mag.assu} assu</div></div>
  </div>
  ${vendeurs.length?`
  <div class="g3" style="margin-bottom:12px">
    <div class="cd kpi"><h3>TX ASSURANCE</h3>
      <div class="val">${mag.mob>0?fmtD(txA,1)+'%':mag.assu+' assu'}</div>
      <div class="sub">${mag.assu} assu / ${mag.mob} mob</div>
      ${mag.mob>0?`<div class="tag ${txA>=50?'green':txA>=30?'orange':'red'}">${txA>=50?'✓':'⚠'}</div>`:'<div class="tag orange">Fidélisation</div>'}</div>
    <div class="cd kpi"><h3>TX G3A</h3>
      <div class="val">${mag.mob>0?fmtD(txG,1)+'%':mag.g3a+' g3a'}</div>
      <div class="sub">${mag.g3a} g3a / ${mag.mob} mob</div>
      ${mag.mob>0?`<div class="tag ${txG>=50?'green':txG>=30?'orange':'red'}">${txG>=50?'✓':'⚠'}</div>`:''}</div>
    <div class="cd kpi"><h3>${mag.mob>0?'ACCESS / MOB':'ACCESS'}</h3>
      <div class="val">${mag.mob>0?fmtD(txAcc,1)+' €':fmt(mag.access)+' €'}</div>
      <div class="sub">${mag.mob>0?`CA: ${fmt(mag.access)} €`:`sans vente mobile`}</div></div>
  </div>
  <div class="g2" style="margin-bottom:12px">
    <div class="cd"><h3>MARGE PAR VENDEUR</h3><canvas id="cBMarge"></canvas></div>
    <div class="cd"><h3>MARGE MOYENNE PAR MOBILE VENDU</h3><canvas id="cBPerf"></canvas></div>
  </div>
  ${(()=>{
    const mobilesBoutique=FACTURES_MOBILES.filter(f=>f.boutique.toUpperCase()===mag.nom.toUpperCase());
    if(mobilesBoutique.length===0) return '';

      if(fact && fact.nbMobiles>0) return fact.margeParMobile;
      if(v.mob>0) return ((v.margeAssu||0)+(v.access||0)+(v.margeServices||0)+((v.g3a||0)*50))/v.mob;

    });
    safeChart('cBPerf',{

        {label:'€ / mobile',data:vAvgData,backgroundColor:vColors.map(c=>c+'CC'),borderRadius:3}

function renderChallenges(el){
  // ── Exclusions : managers et CDV ne jouent PAS le challenge vendeur ──
  const EXCLUS_VENDEUR=["HASSENE","LOUANE","ROMAIN GP"];
  const vSort=[...VENDEURS].filter(v=>!EXCLUS_VENDEUR.includes(v.nom)).sort((a,b)=>b.marge-a.marge);
  const top3=vSort.slice(0,3);
  const margeGroupe=T.marge;
  const margeTLR=(MAGS.find(m=>m.code==='TLR')||{marge:0}).marge;
  const margeCholet=(MAGS.find(m=>m.code==='CHOLET')||{marge:0}).marge;

  const ch2aWon=margeTLR>=700;
  const ch2aPct=Math.min(100,margeTLR/700*100);
  const ch2bWon=margeCholet>=1000;
  const ch2bPct=Math.min(100,margeCholet/1000*100);
  const ch3Won=margeGroupe>=4000;
  const ch3Pct=Math.min(100,margeGroupe/4000*100);

  // ── Cumuls depuis CHALLENGE_HIST ──
  const vendeurWins={};
  let amboiseWins=0, louaneWins=0, romainWins=0;
  CHALLENGE_HIST.forEach(d=>{
    (d.top3_gagnes||[]).forEach(nom=>{vendeurWins[nom]=(vendeurWins[nom]||0)+1});
    if(d.amboise_won) amboiseWins++;
    if(d.louane_won) louaneWins++;
    if(d.groupe_won) romainWins++;
  });
  const nbJours=CHALLENGE_HIST.length;
  const totalPrimeVendeurs=Object.values(vendeurWins).reduce((a,b)=>a+b,0)*20;
  const totalPrimeAmboise=amboiseWins*20;
  const totalPrimeLouane=louaneWins*20;
  const totalPrimeRomain=romainWins*20;
  const totalPrimeGlobal=totalPrimeVendeurs+totalPrimeAmboise+totalPrimeLouane+totalPrimeRomain;

  // Tri vendeurs par gains décroissants
  const vendeurCumulArr=Object.entries(vendeurWins).sort((a,b)=>b[1]-a[1]);

  el.innerHTML=`
  <div class="stitle">CHALLENGES EN COURS — AVRIL 2026</div>

  <div class="g4" style="margin-bottom:16px">
    <div class="cd kpi"><h3>JOURS ENREGISTRÉS</h3><div class="val">${nbJours}</div><div class="sub">depuis le 08/04</div></div>
    <div class="cd kpi"><h3>TOTAL PRIMES</h3><div class="val" style="color:var(--green)">${fmt(totalPrimeGlobal)} €</div><div class="sub">tous challenges confondus</div></div>
    <div class="cd kpi"><h3>MARGE DU JOUR</h3><div class="val">${fmt(margeGroupe)} €</div><div class="sub">obj CDV : 4 000 €</div></div>
    <div class="cd kpi"><h3>PRIME / JOUR</h3><div class="val">20 €</div><div class="sub">par challenge gagné</div></div>
  </div>

  <!-- ══════ CUMUL DES PRIMES À DATE ══════ -->
  <div class="stitle">CUMUL DES PRIMES À DATE</div>
  <div class="cd" style="margin-bottom:16px">
    <table>
      <thead><tr><th>COLLABORATEUR / CHALLENGE</th><th>TYPE</th><th>JOURS GAGNÉS</th><th>PRIME CUMULÉE</th></tr></thead>
      <tbody>
        ${vendeurCumulArr.map((e,i)=>{
          const v=VENDEURS.find(v=>v.nom===e[0]);
          const bInfo=v?BOUTIQUES[v.bou]||{nom:v.bou,color:'#999'}:{nom:'',color:'#999'};
          return `<tr>
            <td><span class="rk ${rkCls(i)}">${i+1}</span> <strong>${esc(e[0])}</strong> <span class="dot" style="background:${bInfo.color}"></span><span style="font-size:10px;color:var(--sub)">${bInfo.nom}</span></td>
            <td>Vendeur</td>
            <td><strong>${e[1]}</strong> / ${nbJours} jours</td>
            <td><strong style="color:var(--green)">${fmt(e[1]*20)} €</strong></td>
          </tr>`;
        }).join('')}
        <tr>
          <td><strong>Hassene — Manager Amboise</strong> <span class="dot" style="background:#7C3AED"></span><span style="font-size:10px;color:var(--sub)">TLR</span></td>
          <td>Manager</td>
          <td><strong>${amboiseWins}</strong> / ${nbJours} jours</td>
          <td><strong style="color:var(--green)">${fmt(totalPrimeAmboise)} €</strong></td>
        </tr>
        <tr>
          <td><strong>Louane — Manageuse Cholet</strong> <span class="dot" style="background:#DC2626"></span><span style="font-size:10px;color:var(--sub)">Cholet</span></td>
          <td>Manageuse</td>
          <td><strong>${louaneWins}</strong> / ${nbJours} jours</td>
          <td><strong style="color:var(--green)">${fmt(totalPrimeLouane)} €</strong></td>
        </tr>
        <tr>
          <td><strong>Romain</strong></td>
          <td>Chef des Ventes</td>
          <td><strong>${romainWins}</strong> / ${nbJours} jours</td>

          <td colspan="2">TOTAL PRIMES VERSÉES</td>
          <td></td>
          <td style="color:var(--green);font-size:14px">${fmt(totalPrimeGlobal)} €</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- ══════ HISTORIQUE JOUR PAR JOUR ══════ -->
  <div class="stitle">HISTORIQUE JOUR PAR JOUR</div>
  <div class="cd" style="margin-bottom:16px;overflow-x:auto">
    <table>
      <thead><tr><th>DATE</th><th>TOP 3 VENDEURS (GAGNANTS)</th><th>HASSENE (AMBOISE)</th><th>LOUANE (CHOLET)</th><th>ROMAIN (GROUPE)</th><th>PRIMES DU JOUR</th></tr></thead>
      <tbody>
        ${[...CHALLENGE_HIST].reverse().map(d=>{
          const primeJour=((d.top3_gagnes||[]).length*20)+(d.amboise_won?20:0)+(d.louane_won?20:0)+(d.groupe_won?20:0);
          return `<tr>
            <td><strong>${d.date}</strong></td>
            <td>${(d.top3||[]).map(n=>{
              const won=(d.top3_gagnes||[]).includes(n);
              return `<span style="display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;margin:1px 2px;${won?'background:#ECFDF5;color:var(--green)':'background:#FEF2F2;color:var(--red)'}">${esc(n)} ${won?'✓':'✗'}</span>`;
            }).join('')}</td>
            <td><span class="ch-badge ${d.amboise_won?'won':'lost'}">${d.amboise_won?fmt(d.amboise_marge)+' € ✓':'✗ '+fmt(d.amboise_marge)+' €'}</span></td>
            <td><span class="ch-badge ${d.louane_won?'won':'lost'}">${d.louane_won?fmt(d.louane_marge)+' € ✓':'✗ '+fmt(d.louane_marge)+' €'}</span></td>
            <td><span class="ch-badge ${d.groupe_won?'won':'lost'}">${d.groupe_won?fmt(d.groupe_marge)+' € ✓':'✗ '+fmt(d.groupe_marge)+' €'}</span></td>
            <td><strong style="color:${primeJour>0?'var(--green)':'var(--sub)'}">${primeJour>0?'+'+fmt(primeJour)+' €':'0 €'}</strong></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>

  <!-- ══════ CHALLENGES DU JOUR ══════ -->
  <div class="stitle">STATUT DU JOUR — TEMPS RÉEL</div>

  <!-- CHALLENGE 1 : VENDEUR -->
  <div class="ch-card" style="margin-bottom:16px">
    <div class="ch-accent" style="background:linear-gradient(90deg,var(--blue),var(--purple))"></div>
    <div class="ch-header">
      <div style="display:flex;align-items:center;gap:12px">
        <div class="ch-icon" style="background:linear-gradient(135deg,var(--blue),var(--purple))">V</div>
        <div>
          <div class="ch-title">Challenge Vendeur — Top 3 + 400 € min</div>
          <div class="ch-period">20 € / jour</div>
        </div>
      </div>
    </div>
    <div class="ch-participants">
      ${top3.map((v,i)=>{
        const bInfo=BOUTIQUES[v.bou]||{nom:v.bou,color:'#999'};
        const won=v.marge>=400;
        const cumul=vendeurWins[v.nom]||0;
        return `<div class="ch-participant">
          <div class="name"><span class="rk ${rkCls(i)}">${i+1}</span> ${esc(v.nom)} <span class="dot" style="background:${bInfo.color}"></span><span style="font-size:10px;color:var(--sub);font-weight:400">${bInfo.nom}</span></div>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="result" style="color:${won?'var(--green)':'var(--txt)'}">${fmt(v.marge)} €</div>
            <span class="ch-badge ${won?'won':'lost'}">${won?'GAGNÉ':'< 400 €'}</span>
            ${cumul>0?`<span style="font-size:10px;color:var(--green);font-weight:700">cumul: ${cumul*20} €</span>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>
    ${vSort.length>3?`<div style="margin-top:8px;font-size:10px;color:var(--mut)">4e : ${esc(vSort[3].nom)} — ${fmt(vSort[3].marge)} € | 5e : ${esc(vSort[4]?.nom||'-')} — ${fmt(vSort[4]?.marge||0)} €</div>`:''}
  </div>

  <!-- CHALLENGE 2 : MANAGER -->
  <div class="g2" style="margin-bottom:16px">
    <div class="ch-card">
      <div class="ch-accent" style="background:var(--purple)"></div>
      <div class="ch-header">
        <div style="display:flex;align-items:center;gap:12px">
          <div class="ch-icon" style="background:var(--purple)">A</div>
          <div>
            <div class="ch-title">Hassene — Manager Amboise — 700 €</div>
            <div class="ch-period">20 € / jour | cumul: <strong style="color:var(--green)">${fmt(totalPrimeAmboise)} €</strong></div>
          </div>
        </div>
        <span class="ch-badge ${ch2aWon?'won':'pending'}">${ch2aWon?'GAGNÉ':'En cours'}</span>
      </div>
      <div class="ch-target">
        <div class="cur" style="color:${ch2aWon?'var(--green)':'var(--txt)'}">${fmt(margeTLR)} €</div>
        <div class="sep">/</div>
        <div class="obj">700 €</div>
      </div>
      <div class="ch-bar-wrap">
        <div class="ch-bar" style="width:${ch2aPct}%;background:${ch2aWon?'var(--green)':ch2aPct>=70?'var(--orange)':'linear-gradient(90deg,var(--blue),var(--purple))'}"></div>
      </div>
      <div class="ch-pct" style="color:${ch2aWon?'var(--green)':'var(--blue)'}">${fmtD(ch2aPct,0)}%</div>
    </div>

    <div class="ch-card">
      <div class="ch-accent" style="background:var(--red)"></div>
      <div class="ch-header">
        <div style="display:flex;align-items:center;gap:12px">
          <div class="ch-icon" style="background:var(--red)">L</div>
          <div>
            <div class="ch-title">Louane — Manageuse Cholet — 1 000 €</div>
            <div class="ch-period">20 € / jour | cumul: <strong style="color:var(--green)">${fmt(totalPrimeLouane)} €</strong></div>
          </div>
        </div>
        <span class="ch-badge ${ch2bWon?'won':'pending'}">${ch2bWon?'GAGNÉ':'En cours'}</span>
      </div>
      <div class="ch-target">
        <div class="cur" style="color:${ch2bWon?'var(--green)':'var(--txt)'}">${fmt(margeCholet)} €</div>
        <div class="sep">/</div>
        <div class="obj">1 000 €</div>
      </div>
      <div class="ch-bar-wrap">
        <div class="ch-bar" style="width:${ch2bPct}%;background:${ch2bWon?'var(--green)':ch2bPct>=70?'var(--orange)':'var(--red)'}"></div>
      </div>
      <div class="ch-pct" style="color:${ch2bWon?'var(--green)':'var(--red)'}">${fmtD(ch2bPct,0)}%</div>
    </div>
  </div>

  <!-- CHALLENGE 3 : CDV -->
  <div class="ch-card" style="margin-bottom:16px">
    <div class="ch-accent" style="background:linear-gradient(90deg,var(--green),var(--cyan))"></div>
    <div class="ch-header">
      <div style="display:flex;align-items:center;gap:12px">
        <div class="ch-icon" style="background:linear-gradient(135deg,var(--green),var(--cyan))">R</div>
        <div>
          <div class="ch-title">Romain CDV — 4 000 € groupe</div>
          <div class="ch-period">20 € / jour | cumul: <strong style="color:var(--green)">${fmt(totalPrimeRomain)} €</strong></div>
        </div>
      </div>
      <span class="ch-badge ${ch3Won?'won':'pending'}">${ch3Won?'GAGNÉ':'En cours'}</span>
    </div>
    <div class="ch-target">
      <div class="cur" style="color:${ch3Won?'var(--green)':'var(--txt)'}">${fmt(margeGroupe)} €</div>
      <div class="sep">/</div>
      <div class="obj">4 000 €</div>
    </div>
    <div class="ch-bar-wrap">
      <div class="ch-bar" style="width:${ch3Pct}%;background:${ch3Won?'var(--green)':ch3Pct>=70?'var(--orange)':'linear-gradient(90deg,var(--green),var(--cyan))'}"></div>
    </div>
    <div class="ch-pct" style="color:${ch3Won?'var(--green)':'var(--cyan)'}">${fmtD(ch3Pct,0)}%</div>
    <div class="ch-participants" style="margin-top:10px">
      ${[...MAGS].sort((a,b)=>b.marge-a.marge).map(m=>`
        <div class="ch-participant">
          <div class="name"><span class="dot" style="background:${m.color}"></span>${m.nom}</div>
          <div class="result">${fmt(m.marge)} €</div>
        </div>
      `).join('')}
    </div>
  </div>
  `;
}

// ═══════════════════════════════════════
//  INIT — Charge les données puis rend le dashboard
// ═══════════════════════════════════════
const JOURS_FR=["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];
const MOIS_FR=["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];

function updateDates(){
  const now=new Date();
  const jourSemaine=JOURS_FR[now.getDay()];
  const dateStr=DATA_DATE||`${String(now.getDate()).padStart(2,'0')}/${String(now.getMonth()+1).padStart(2,'0')}/${now.getFullYear()}`;
  const heureStr=DATA_HEURE||`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const parts=dateStr.split('/');
  const jour=parseInt(parts[0]);const mois=parseInt(parts[1])-1;const annee=parts[2]||now.getFullYear();
  const moisNom=MOIS_FR[mois]||"";
  const splashSub=document.querySelector('.sp-logo-sub');
  if(splashSub) splashSub.textContent=`Dashboard Jour — ${jour} ${moisNom} ${annee}`;
  const spKpis=document.querySelector('.sp-kpis');
  if(spKpis) spKpis.innerHTML=`
    <div class="sp-kpi"><div class="sp-kpi-val">6</div><div class="sp-kpi-label">Boutiques</div></div>
    <div class="sp-kpi"><div class="sp-kpi-val">${fmt(T.marge)} €</div><div class="sp-kpi-label">Marge Jour</div></div>
    <div class="sp-kpi"><div class="sp-kpi-val">${T.mob}</div><div class="sp-kpi-label">Mobiles</div></div>`;
  const hdrInfo=document.querySelector('.hdr-info');
  if(hdrInfo) hdrInfo.textContent=`${jourSemaine} ${jour} ${moisNom} ${annee} — Données 3GWIN temps réel (màj ${heureStr})`;
  const ftr=document.querySelector('.ftr');
  if(ftr) ftr.textContent=`Données 3GWIN JOUR du ${dateStr} — Scrapé à ${heureStr} — Groupe Garcia © ${annee}`;
}

function hideSplash(){
  const splash=document.getElementById('splash');
  splash.classList.add('hide');
  document.getElementById('hdr').classList.add('show');
  document.getElementById('nav').classList.add('show');
  document.getElementById('mn').classList.add('show');
  setTimeout(()=>{splash.style.display='none'},700);
}

async function init(){
  const t0=Date.now();

  // ── Phase 0 : Affichage INSTANTANÉ depuis le cache ──
  const cachedJour=cacheGet('jour');
  const cachedChall=cacheGet('challenges');
  let usedCache=false;

  if(cachedJour && cachedJour.data){
    splashProgress(50,'Données en cache — affichage instantané...');
    try{
      const rows=cachedJour.data;
      const meta=rows.find(r=>r.Type==="META");
      if(meta){DATA_DATE=meta.Date||"";DATA_HEURE=meta.Heure||"";}
      MAGS=rows.filter(r=>r.Type==="MAG").map(r=>({
        code:r.Code||"",nom:r.Nom||"",color:(BOUTIQUES[r.Code]||{}).color||"#888",
        marge:parseFloat(r.Marge)||0,mob:parseInt(r.Mob)||0,box:parseInt(r.Box)||0,
        cyber:parseInt(r.Cyber)||0,assu:parseInt(r.Assu)||0,g3a:parseInt(r.G3A)||0,
        access:parseFloat(r.Access)||0,abo:parseInt(r.Abo)||0
      }));
      if(MAGS.length===0) initEmptyMags();
      MAGS.sort((a,b)=>b.marge-a.marge);
      VENDEURS=rows.filter(r=>r.Type==="VENDEUR").map(r=>({
        nom:r.Code||"",bou:r.Nom||"",marge:parseFloat(r.Marge)||0,mob:parseInt(r.Mob)||0,
        box:parseInt(r.Box)||0,cyber:parseInt(r.Cyber)||0,assu:parseInt(r.Assu)||0,
        g3a:parseInt(r.G3A)||0,access:parseFloat(r.Access)||0,abo:parseInt(r.Abo)||0
      }));
      VENDEURS.sort((a,b)=>b.marge-a.marge);
      if(cachedChall && cachedChall.data){
        CHALLENGE_HIST=cachedChall.data;
      }
      computeTotals();updateDates();buildNav();render();
      usedCache=true;
      splashProgress(70,'Rafraîchissement en arrière-plan...');
    }catch(e){console.warn("Cache parse error:",e)}
  }

  // ── Phase 1 : Fetch PARALLÈLE des deux onglets ──
  if(!usedCache) splashProgress(20,'Chargement des données...');
  try{
    const [jourResult, challResult, facturesResult] = await Promise.allSettled([
      fetchJourData(),
      fetchChallengeHist(),
      fetchFacturesJour()
    ]);

    if(jourResult.status==='fulfilled'){
      LAST_ERROR=null;
      if(!usedCache) splashProgress(80,'Données boutiques OK');
    } else {
      console.warn("Erreur Google Sheets:",jourResult.reason?.message);
      if(!usedCache){
        LAST_ERROR="Impossible de charger les données — vérifiez la connexion";
        if(MAGS.length===0) initEmptyMags();
      }
    }

    if(challResult.status==='rejected'){
      console.warn("Erreur historique challenges:",challResult.reason?.message);
    }
  }catch(e){
    console.warn("Erreur globale fetch:",e.message);
    if(!usedCache){
      LAST_ERROR="Impossible de charger les données — vérifiez la connexion";
      if(MAGS.length===0) initEmptyMags();
    }
  }

  // ── Phase 2 : calcul + rendu (final) ──
  splashProgress(95,'Rendu du dashboard...');
  computeTotals();
  updateDates();
  buildNav();
  render();
  splashProgress(100,'Prêt !');

  // Splash raccourci si on avait le cache
  const elapsed=Date.now()-t0;
  const minSplash=usedCache?400:1200;
  setTimeout(hideSplash, Math.max(0,minSplash-elapsed));

  // ── REFRESH INTELLIGENT ──
  let LAST_REFRESH=Date.now();
  const MIN_REFRESH_GAP=30000; // 30s minimum entre 2 refreshs

  document.addEventListener('visibilitychange',()=>{
    if(document.visibilityState==='visible' && Date.now()-LAST_REFRESH>MIN_REFRESH_GAP){
      LAST_REFRESH=Date.now();
      silentRefresh();
    }
  });

  window.addEventListener('focus',()=>{
    if(Date.now()-LAST_REFRESH>MIN_REFRESH_GAP){
      LAST_REFRESH=Date.now();
      silentRefresh();
    }
  });
}
init();
</script>
</body>
</html>
