<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Groupe Garcia — Dashboard Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#F0F2F5;--card:#FFF;--hdr:#0F172A;--txt:#0F1419;--sub:#64748B;--mut:#94A3B8;--brd:#E2E8F0;--blue:#2563EB;--purple:#7C3AED;--green:#059669;--orange:#D97706;--red:#DC2626;--cyan:#0891B2;--r:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',-apple-system,sans-serif;background:var(--bg);color:var(--txt);font-size:13px;-webkit-font-smoothing:antialiased}
.hdr{background:var(--hdr);color:#fff;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:10px 20px;gap:12px;flex-wrap:wrap}
.hdr-left{display:flex;align-items:center;gap:16px}
.logo{font-size:16px;font-weight:800;letter-spacing:1px}
.logo span{font-weight:400;opacity:.5;font-size:13px;margin-left:8px}
.hdr-info{font-size:11px;color:#94A3B8}
.hdr-btns{display:flex;gap:6px}
.hb{padding:5px 12px;background:rgba(255,255,255,.08);color:#CBD5E1;border:1px solid rgba(255,255,255,.1);border-radius:6px;font-weight:600;cursor:pointer;font-size:11px;font-family:inherit;transition:all .15s}
.hb:hover{background:rgba(255,255,255,.15);color:#fff}
.hb.on{background:var(--purple);color:#fff;border-color:var(--purple)}
.dm{background:#FBBF24;color:#78350F;font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px;margin-left:8px}
.nav{background:#fff;border-bottom:1px solid var(--brd);display:flex;overflow-x:auto;scrollbar-width:none;padding:0 16px}
.nav::-webkit-scrollbar{display:none}
.tb{padding:10px 16px;border:none;background:0;color:var(--sub);font-size:12px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;font-family:inherit;white-space:nowrap;transition:all .15s}
.tb:hover{color:var(--txt)}
.tb.on{color:var(--blue);border-bottom-color:var(--blue)}
.mn{padding:20px;max-width:1200px;margin:0 auto;padding-bottom:60px}
.cd{background:var(--card);border-radius:var(--r);padding:16px;margin-bottom:12px;border:1px solid var(--brd)}
.kpi-label{font-size:11px;color:var(--sub);font-weight:500;margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.kpi-val{font-size:24px;font-weight:800;line-height:1.1}
.kpi-sub{font-size:11px;color:var(--mut);margin-top:3px}
.kpi-sm .kpi-val{font-size:18px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:12px}
.sec{font-size:13px;font-weight:700;color:var(--txt);margin:20px 0 10px;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:8px}
.sec::before{content:"";display:block;width:3px;height:14px;background:var(--blue);border-radius:2px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:8px 6px;font-size:10px;font-weight:600;color:var(--mut);text-transform:uppercase;border-bottom:2px solid var(--brd);letter-spacing:.3px}
td{padding:9px 6px;border-bottom:1px solid #F1F5F9}
.tl{text-align:left}.tc{text-align:center}
tr[onclick]{cursor:pointer}tr[onclick]:hover{background:#F8FAFC}
.trt{background:#F8FAFC;font-weight:700}
.rg{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;font-size:10px;font-weight:700;color:#fff}
.r1{background:var(--green)}.r2{background:var(--orange)}.r3{background:#B0B8C4}
.pl{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700}
.p1{background:#DCFCE7;color:#047857}.p2{background:#FEF3C7;color:#B45309}.p3{background:#FEE2E2;color:#B91C1C}
.ev{display:inline-block;padding:1px 6px;border-radius:5px;font-size:10px;font-weight:600}
.eu{background:#DCFCE7;color:#047857}.ed{background:#FEE2E2;color:#B91C1C}
.dt{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}
.bar{height:5px;background:#F1F5F9;border-radius:3px;overflow:hidden;margin-top:4px}
.barf{height:100%;border-radius:3px;transition:width .5s}
.bh{border-radius:var(--r);padding:20px;margin-bottom:14px;color:#fff}
.bh h2{font-size:18px;font-weight:800;margin-bottom:8px}
.bh-stats{display:flex;gap:24px;flex-wrap:wrap}
.bh-stat span{font-size:10px;opacity:.65;text-transform:uppercase;letter-spacing:.3px}
.bh-stat div{font-size:22px;font-weight:800;margin-top:2px}
.vh{border-radius:var(--r);padding:18px;margin-bottom:14px;color:#fff}
.vh-top{display:flex;justify-content:space-between;align-items:start}
.vh-name{font-size:22px;font-weight:800}
.vh-role{font-size:11px;opacity:.7}
.vh-rg{background:rgba(255,255,255,.15);border-radius:8px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800}
.vh-stats{display:flex;gap:18px;margin-top:12px;flex-wrap:wrap}
.vh-stat span{opacity:.65;font-size:10px;text-transform:uppercase;letter-spacing:.3px}
.vh-stat div{font-size:16px;font-weight:700;margin-top:1px}
.cc{background:#F0FDF4;border-left:3px solid var(--green);border:1px solid #BBF7D0}
.cc .cc-amt{font-size:26px;font-weight:800;color:var(--green)}
.cc .cc-det{font-size:11px;color:var(--sub)}
.ac{border-left:3px solid var(--red);border-radius:0 var(--r) var(--r) 0}
.aw{border-left:3px solid var(--orange);border-radius:0 var(--r) var(--r) 0}
.ir{padding:10px 0;border-bottom:1px solid #F1F5F9}.ir:last-child{border:none}
.chart-wrap{position:relative;height:220px;margin-top:8px}
.vb{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#fff;border:1px solid var(--brd);border-radius:8px;cursor:pointer;font-family:inherit;text-align:left;transition:all .15s}
.vb:hover{border-color:var(--blue);box-shadow:0 2px 8px rgba(37,99,235,.1)}
.bk{padding:6px 14px;background:#fff;color:var(--txt);border:1px solid var(--brd);border-radius:6px;font-weight:600;cursor:pointer;font-size:12px;font-family:inherit;margin-bottom:10px}
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
@media(max-width:768px){.g3,.g4{grid-template-columns:1fr 1fr}.g5{grid-template-columns:repeat(3,1fr)}}
@media(max-width:480px){.g3,.g2,.g4{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-left"><div class="logo">GROUPE GARCIA<span>Dashboard Manager</span></div><div class="hdr-info" id="hi"></div></div>
  <div class="hdr-btns"><button class="hb" id="bn" onclick="tN()">Comparer N-1</button><button class="hb" onclick="location.reload()">Actualiser</button></div>
</header>
<nav class="nav" id="nv"></nav>
<main class="mn" id="mc"></main>
<script>
const B=[{c:"ALR",n:"Angers",cl:"#2563EB"},{c:"TLR",n:"Amboise",cl:"#7C3AED"},{c:"CLR",n:"Châteaudun",cl:"#0891B2"},{c:"CHOLET",n:"Cholet",cl:"#DC2626"},{c:"RLR",n:"Romorantin",cl:"#059669"},{c:"VLR",n:"Vendôme",cl:"#D97706"}];
const VB={HASSENE:"TLR","JULIE TLR":"TLR",AXEL:"ALR",PAULINE:"ALR",RACHEL:"CLR",ILIAN:"CLR",ANAIS:"CHOLET",LUCAS:"CHOLET",LOUANE:"CHOLET",EMMY:"CHOLET","CHLOE R":"CHOLET",WILL:"RLR",EMILIE:"RLR",NATHAN:"RLR",MEHDY:"VLR","ROMAIN GP":"VLR"};
const BM=[{m:2e3,x:3e3,p:.02},{m:3e3,x:4e3,p:.03},{m:4e3,x:5e3,p:.05},{m:5e3,x:6e3,p:.06},{m:6e3,x:7e3,p:.07},{m:7e3,x:8e3,p:.08},{m:8e3,x:9e3,p:.09},{m:9e3,x:1e9,p:.1}];
const RI=[{k:"mob",l:"Mobiles",ob:20},{k:"alba",l:"Alba",ob:.5},{k:"cyber",l:"SFR Cyber",ob:15},{k:"txA",l:"Tx assurance",ob:40,pc:1},{k:"txC",l:"Tx accessoires",ob:30,cu:1}];
const RJ={ANAIS:19,AXEL:22,"CHLOE R":11,EMILIE:20,EMMY:6,HASSENE:22,ILIAN:13,"JULIE TLR":10,LUCAS:21,LOUANE:21,MEHDY:22,NATHAN:13,PAULINE:17,RACHEL:9,"ROMAIN GP":21,WILL:22};
const JO=22,RO={};Object.keys(RJ).forEach(n=>{const r=RJ[n]/JO;RO[n]={mob:+(20*r).toFixed(1),alba:.5,cyber:+(15*r).toFixed(1),txA:40,txC:30}});

const $=n=>new Intl.NumberFormat("fr-FR",{maximumFractionDigits:0}).format(n||0);
const $E=n=>$(n)+" €";const $D=(n,d=2)=>(n||0).toFixed(d);
function cC(m){if(m<2e3)return 0;let c=0;for(const b of BM)if(m>b.m)c+=(Math.min(m,b.x)-b.m)*b.p;return c}
function gP(n){if(!n||n<=0)return 0;if(n>=4.9)return 100;if(n>=4.7)return 50;if(n>=4.5)return 25;if(n>=4.3)return-50;return-100}
function cN(n){return n>=4.7?"#059669":n>=4.5?"#D97706":"#DC2626"}
function rC(r){return r<=3?"r1":r<=8?"r2":"r3"}
function pC(a){return a>=4?"p1":a>=3?"p2":"p3"}
function eH(v){if(v==null)return"";return`<span class="ev ${v>=0?"eu":"ed"}">${v>=0?"+":""}${(v*100).toFixed(1)}%</span>`}
function bH(v,c){return`<div class="bar"><div class="barf" style="width:${Math.min(100,(v||0)*100)}%;background:${c}"></div></div>`}
function fV(i){return i.pc?$D(i.r,1)+"%":i.cu?$D(i.r,1)+"€":i.r}
function fO(i){return i.pc?i.o+"%":i.cu?i.o+"€":Math.round(i.o)}
function fR(i){const r=Math.abs(i.rf);return i.pc?$D(r,1)+" pts":i.cu?$D(r,1)+"€":Math.ceil(r)}

let D,N1=0,CT="synthese",SV=null,charts=[];

function gD(){
  const j=14,rw=[
    {nm:"AXEL",mg:5420,mb:14,al:0,cy:10,as:7,ma:14,ac:380},
    {nm:"PAULINE",mg:3890,mb:9,al:1,cy:7,as:4,ma:9,ac:210},
    {nm:"HASSENE",mg:6100,mb:16,al:1,cy:12,as:9,ma:16,ac:450},
    {nm:"JULIE TLR",mg:2850,mb:7,al:0,cy:5,as:3,ma:7,ac:150},
    {nm:"RACHEL",mg:2200,mb:5,al:0,cy:3,as:2,ma:5,ac:120},
    {nm:"ILIAN",mg:4100,mb:10,al:0,cy:8,as:5,ma:10,ac:280},
    {nm:"ANAIS",mg:4750,mb:12,al:1,cy:9,as:6,ma:12,ac:320},
    {nm:"LUCAS",mg:5800,mb:15,al:1,cy:11,as:8,ma:15,ac:410},
    {nm:"LOUANE",mg:3200,mb:8,al:0,cy:6,as:4,ma:8,ac:180},
    {nm:"EMMY",mg:1900,mb:4,al:0,cy:3,as:2,ma:4,ac:90},
    {nm:"CHLOE R",mg:2600,mb:6,al:0,cy:4,as:3,ma:6,ac:140},
    {nm:"WILL",mg:7200,mb:18,al:1,cy:14,as:10,ma:18,ac:520},
    {nm:"EMILIE",mg:4300,mb:11,al:0,cy:8,as:5,ma:11,ac:290},
    {nm:"NATHAN",mg:3500,mb:8,al:0,cy:6,as:4,ma:8,ac:200},
    {nm:"MEHDY",mg:5100,mb:13,al:1,cy:10,as:7,ma:13,ac:360},
    {nm:"ROMAIN GP",mg:4600,mb:11,al:1,cy:9,as:6,ma:11,ac:310}];
  const vs=rw.map(v=>{const b=VB[v.nm]||"ALR",jt=RJ[v.nm]||22;return{...v,bq:b,jc:j,jt:JO,jw:jt,ta:v.ma>0?(v.as/v.ma)*100:0,tx:v.mb>0?v.ac/v.mb:0}});
  const n1=vs.map(v=>({...v,mg:Math.round(v.mg*(.85+Math.random()*.3)),mb:Math.max(0,Math.round(v.mb*(.8+Math.random()*.4))),cy:Math.max(0,Math.round(v.cy*(.75+Math.random()*.5)))}));
  return{vs,n1,
    gd:{ALR:{nt:4.72,pt:28},TLR:{nt:4.85,pt:35},CLR:{nt:4.41,pt:18},CHOLET:{nt:4.63,pt:42},RLR:{nt:4.91,pt:31},VLR:{nt:4.78,pt:25}},
    gl:{ALR:{nt:4.6,tt:847,ms:12},TLR:{nt:4.8,tt:623,ms:8},CLR:{nt:4.3,tt:412,ms:5},CHOLET:{nt:4.7,tt:1024,ms:15},RLR:{nt:4.5,tt:538,ms:9},VLR:{nt:4.4,tt:391,ms:6}},
    vi:{ALR:320,TLR:280,CLR:195,CHOLET:510,RLR:245,VLR:210},
    viN1:{ALR:295,TLR:260,CLR:210,CHOLET:480,RLR:230,VLR:195}};
}

function eD(d){
  const{vs,n1,gd,gl,vi,viN1}=d;
  const en=vs.map(v=>{
    const jc=v.jc||1,mj=jc>0?v.mg/jc:0,jr=Math.max(0,v.jw-jc),pj=v.mg+mj*jr;
    const ob=RO[v.nm]||{};
    const its=RI.map(it=>{const o=ob[it.k]??it.ob;let r;if(it.k==="txA")r=v.ta;else if(it.k==="txC")r=v.tx;else r=v[it.k==="mob"?"mb":it.k==="cyber"?"cy":it.k==="alba"?"al":it.k]||0;return{...it,o,r,ok:r>=o,rf:o-r}});
    const ia=its.filter(i=>i.ok).length,co=ia/5,cb=cC(pj),gn=gd[v.bq]?.nt||0,pg=gP(gn),cf=Math.max(0,cb*co+pg);
    const v1=n1.find(x=>x.nm===v.nm);
    return{...v,mj,pj,its,ia,co,cb,cf,pg,gn,v1};
  });
  const rk=[...en].sort((a,b)=>b.mj-a.mj);rk.forEach((v,i)=>v.rk=i+1);
  const pb={};
  B.forEach(b=>{
    const bv=rk.filter(v=>v.bq===b.c),mg=bv.reduce((s,v)=>s+v.mg,0),pj=bv.reduce((s,v)=>s+v.pj,0);
    const vv=vi[b.c]||0,pm=vv>0?mg/vv:0,mn=bv.reduce((s,v)=>s+(v.v1?.mg||0),0);
    const vvN1=viN1[b.c]||0,pmN1=vvN1>0?mn/vvN1:0;
    const mobN=bv.reduce((s,v)=>s+v.mb,0),mobN1=bv.reduce((s,v)=>s+(v.v1?.mb||0),0);
    const cyN=bv.reduce((s,v)=>s+v.cy,0),cyN1=bv.reduce((s,v)=>s+(v.v1?.cy||0),0);
    const ia=RI.map(it=>{const tr=bv.reduce((s,v)=>s+(v.its.find(i=>i.k===it.k)?.r||0),0),to=bv.reduce((s,v)=>s+(v.its.find(i=>i.k===it.k)?.o||0),0);return it.pc||it.cu?{...it,tr:tr/Math.max(1,bv.length),to:it.ob}:{...it,tr,to}});
    pb[b.c]={...b,bv,mg,pj,vv,pm,mn,vvN1,pmN1,mobN,mobN1,cyN,cyN1,ia,g:gd[b.c],gl:gl[b.c],ev:mn>0?(mg-mn)/mn:0};
  });
  const mG=rk.reduce((s,v)=>s+v.mg,0),pG=rk.reduce((s,v)=>s+v.pj,0),mN=rk.reduce((s,v)=>s+(v.v1?.mg||0),0);
  const vG=Object.values(vi).reduce((s,v)=>s+v,0),vGN1=Object.values(viN1).reduce((s,v)=>s+v,0);
  const pmG=vG>0?mG/vG:0,pmGN1=vGN1>0?mN/vGN1:0;
  const gM=Object.values(gd).reduce((s,g)=>s+g.nt,0)/6;
  const gT=Object.values(gl).reduce((s,g)=>s+g.tt,0),gMo=Object.values(gl).reduce((s,g)=>s+g.ms,0);
  const iG=RI.map(it=>{const t=rk.reduce((s,v)=>s+(v.its.find(i=>i.k===it.k)?.r||0),0),to=rk.reduce((s,v)=>s+(v.its.find(i=>i.k===it.k)?.o||0),0);return it.pc||it.cu?{...it,tr:t/Math.max(1,rk.length),to:it.ob}:{...it,tr:t,to}});
  const mobGN=rk.reduce((s,v)=>s+v.mb,0),mobGN1=rk.reduce((s,v)=>s+(v.v1?.mb||0),0);
  const cyGN=rk.reduce((s,v)=>s+v.cy,0),cyGN1=rk.reduce((s,v)=>s+(v.v1?.cy||0),0);
  return{rk,pb,mG,pG,mN,vG,vGN1,pmG,pmGN1,jc:rk[0]?.jc||14,jt:rk[0]?.jt||22,gM,gT,gMo,iG,gd,gl,vi,viN1,mobGN,mobGN1,cyGN,cyGN1};
}

function bT(){
  const ts=[{id:"synthese",l:"Synthèse"},...B.map(b=>({id:b.c,l:b.n})),{id:"goodays",l:"Satisfaction"},{id:"suivi",l:"Collaborateurs"}];
  document.getElementById("nv").innerHTML=ts.map(t=>`<button class="tb${t.id===CT?" on":""}" onclick="sT('${t.id}')">${t.l}</button>`).join("");
}
function sT(id){CT=id;SV=null;bT();R()}
function sV(nm){SV=nm;R()}
function bV(){SV=null;R()}
function tN(){N1=!N1;document.getElementById("bn").className="hb"+(N1?" on":"");R()}
function dC(){charts.forEach(c=>{try{c.destroy()}catch(e){}});charts=[]}

function R(){if(!D)return;dC();const C=eD(D),m=document.getElementById("mc");
  if(SV){const v=C.rk.find(x=>x.nm===SV);if(v)m.innerHTML=rV(v,C);return}
  m.innerHTML=CT==="synthese"?rS(C):CT==="goodays"?rG(C):CT==="suivi"?rU(C):rB(CT,C);
  if(CT==="synthese")setTimeout(()=>drawSynthCharts(C),60);
}

function co(opts){return{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:"bottom",labels:{font:{size:10,family:"Plus Jakarta Sans"},boxWidth:10,padding:10,...(opts.legendOpts||{})}},...(opts.plugins||{})},scales:{y:{beginAtZero:true,ticks:{font:{size:10},callback:v=>v>=1000?(v/1000)+"k €":v,...(opts.yTicks||{})},grid:{color:"#F1F5F9"},...(opts.yScale||{})},x:{ticks:{font:{size:10},...(opts.xTicks||{})},grid:{display:false}}}}}

/* ═══════ SYNTHESE ═══════ */
function rS(C){
  const eG=C.mN>0?(C.mG-C.mN)/C.mN:0,mj=C.mG/Math.max(1,C.rk.length)/Math.max(1,C.jc);
  const evFlux=C.vGN1>0?(C.vG-C.vGN1)/C.vGN1:0;
  return`
<div class="g4">
  <div class="cd kpi"><div class="kpi-label">Marge groupe</div><div class="kpi-val" style="color:var(--blue)">${$E(C.mG)}</div>${N1?`<div class="kpi-sub">N-1 : ${$E(C.mN)} ${eH(eG)}</div>`:""}</div>
  <div class="cd kpi"><div class="kpi-label">Projection fin de mois</div><div class="kpi-val" style="color:var(--purple)">${$E(C.pG)}</div></div>
  <div class="cd kpi"><div class="kpi-label">Panier moyen</div><div class="kpi-val" style="color:var(--cyan)">${$D(C.pmG)} €</div>${N1?`<div class="kpi-sub">N-1 : ${$D(C.pmGN1)} € ${eH(C.pmGN1>0?(C.pmG-C.pmGN1)/C.pmGN1:0)}</div>`:""}</div>
  <div class="cd kpi"><div class="kpi-label">Marge / jour moyenne</div><div class="kpi-val" style="color:var(--green)">${$E(mj)}</div></div>
</div>
<div class="g3">
  <div class="cd kpi"><div class="kpi-label">Flux visiteurs</div><div class="kpi-val">${$(C.vG)}</div>${N1?`<div class="kpi-sub">N-1 : ${$(C.vGN1)} ${eH(evFlux)}</div>`:""}</div>
  <div class="cd kpi"><div class="kpi-label">Satisfaction Goodays</div><div class="kpi-val" style="color:${cN(C.gM)}">${$D(C.gM)}<span style="font-size:14px;font-weight:500;color:var(--mut)"> / 5</span></div></div>
  <div class="cd kpi"><div class="kpi-label">Avis Google (total)</div><div class="kpi-val">${$(C.gT)}</div><div class="kpi-sub">+${C.gMo} ce mois</div></div>
</div>

<div class="cd" style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span class="kpi-label" style="margin:0">Avancement du mois</span><span style="font-size:12px;font-weight:700">J${C.jc} / ${C.jt}</span></div>${bH(C.jc/C.jt,"var(--blue)")}</div>

<div class="g2">
  <div class="cd"><div class="kpi-label" style="margin-bottom:8px">Marge par boutique — N vs N-1</div><div class="chart-wrap"><canvas id="chMarge"></canvas></div></div>
  <div class="cd"><div class="kpi-label" style="margin-bottom:8px">Panier moyen par boutique — Avril 2026 vs 2025</div><div class="chart-wrap"><canvas id="chPanier"></canvas></div></div>
</div>

<div class="sec">Items prioritaires — Groupe</div>
<div class="g2">
  <div class="cd"><div class="kpi-label" style="margin-bottom:8px">Mobiles par boutique — N vs N-1</div><div class="chart-wrap"><canvas id="chMob"></canvas></div></div>
  <div class="cd"><div class="kpi-label" style="margin-bottom:8px">SFR Cyber par boutique — N vs N-1</div><div class="chart-wrap"><canvas id="chCyber"></canvas></div></div>
</div>

<div class="cd"><div class="kpi-label" style="margin-bottom:10px">Détail items prioritaires vs N-1</div>
<div class="tw"><table>
<thead><tr><th class="tl">Item</th><th class="tc">Réalisé N</th><th class="tc">Objectif</th><th class="tc">Atteinte</th><th class="tc">N-1</th><th class="tc">Évolution</th></tr></thead><tbody>
${C.iG.map(it=>{
  const valN=it.pc?$D(it.tr,1)+"%":it.cu?$D(it.tr,1)+"€":$(it.tr);
  const obj=it.pc?it.to+"%":it.cu?it.to+"€":$(it.to);
  const p=it.to>0?it.tr/it.to:0;const ok=p>=1;
  let n1Val,evol;
  if(it.k==="mob"){n1Val=$(C.mobGN1);evol=C.mobGN1>0?(C.mobGN-C.mobGN1)/C.mobGN1:0}
  else if(it.k==="cyber"){n1Val=$(C.cyGN1);evol=C.cyGN1>0?(C.cyGN-C.cyGN1)/C.cyGN1:0}
  else{n1Val="—";evol=null}
  return`<tr><td class="tl" style="font-weight:700">${it.l}</td><td class="tc" style="font-weight:700;color:${ok?"var(--green)":"var(--red)"}">${valN}</td><td class="tc">${obj}</td><td class="tc"><span class="pl ${ok?"p1":"p3"}">${(p*100).toFixed(0)}%</span></td><td class="tc">${n1Val}</td><td class="tc">${evol!=null?eH(evol):"—"}</td></tr>`}).join("")}
</tbody></table></div></div>`}

function drawSynthCharts(C){
  const labels=B.map(b=>b.n);
  const chOpts={borderRadius:4,barPercentage:.55};
  // Marge N vs N-1
  const c1=new Chart(document.getElementById("chMarge"),{type:"bar",data:{labels,datasets:[
    {label:"Avril 2026",data:B.map(b=>C.pb[b.c].mg),backgroundColor:B.map(b=>b.cl),...chOpts},
    {label:"Avril 2025",data:B.map(b=>C.pb[b.c].mn),backgroundColor:"#CBD5E1",...chOpts}
  ]},options:co({yTicks:{callback:v=>(v/1000).toFixed(0)+"k"}})});charts.push(c1);

  // Panier moyen N vs N-1
  const c2=new Chart(document.getElementById("chPanier"),{type:"bar",data:{labels,datasets:[
    {label:"Avril 2026",data:B.map(b=>Math.round(C.pb[b.c].pm*100)/100),backgroundColor:"#0891B2",...chOpts},
    {label:"Avril 2025",data:B.map(b=>Math.round(C.pb[b.c].pmN1*100)/100),backgroundColor:"#CBD5E1",...chOpts}
  ]},options:co({yTicks:{callback:v=>v+"€"}})});charts.push(c2);

  // Mobiles N vs N-1
  const c3=new Chart(document.getElementById("chMob"),{type:"bar",data:{labels,datasets:[
    {label:"Avril 2026",data:B.map(b=>C.pb[b.c].mobN),backgroundColor:"#2563EB",...chOpts},
    {label:"Avril 2025",data:B.map(b=>C.pb[b.c].mobN1),backgroundColor:"#CBD5E1",...chOpts}
  ]},options:co({})});charts.push(c3);

  // Cyber N vs N-1
  const c4=new Chart(document.getElementById("chCyber"),{type:"bar",data:{labels,datasets:[
    {label:"Avril 2026",data:B.map(b=>C.pb[b.c].cyN),backgroundColor:"#7C3AED",...chOpts},
    {label:"Avril 2025",data:B.map(b=>C.pb[b.c].cyN1),backgroundColor:"#CBD5E1",...chOpts}
  ]},options:co({})});charts.push(c4);
}

/* ═══════ BOUTIQUE ═══════ */
function rB(code,C){const d=C.pb[code];if(!d)return"";return`
<div class="bh" style="background:${d.cl}"><h2>SFR ${d.n}</h2><div class="bh-stats"><div class="bh-stat"><span>Marge</span><div>${$E(d.mg)}</div></div><div class="bh-stat"><span>Projection</span><div>${$E(d.pj)}</div></div><div class="bh-stat"><span>Panier</span><div>${$D(d.pm)} €</div></div><div class="bh-stat"><span>Flux</span><div>${$(d.vv)}</div></div></div>${N1?`<div style="margin-top:6px">${eH(d.ev)}</div>`:""}</div>
<div class="g2"><div class="cd kpi"><div class="kpi-label">Satisfaction Goodays</div><div class="kpi-val" style="color:${cN(d.g?.nt)}">${d.g?.nt?.toFixed(2)||"—"}<span style="font-size:14px;font-weight:500;color:var(--mut)"> / 5</span></div><div class="kpi-sub">${d.g?.pt||0} participations</div></div><div class="cd kpi"><div class="kpi-label">Avis Google</div><div class="kpi-val">${$(d.gl?.tt)}</div><div class="kpi-sub">Note ${d.gl?.nt?.toFixed(1)} · +${d.gl?.ms} ce mois</div></div></div>
<div class="sec">Items prioritaires</div>
<div class="g5">${d.ia.map(it=>{const p=it.to>0?it.tr/it.to:0,ok=p>=1,cl=ok?"var(--green)":p>.7?"var(--orange)":"var(--red)";return`<div class="cd kpi kpi-sm" style="text-align:center"><div class="kpi-label">${it.l}</div><div class="kpi-val" style="color:${cl}">${it.pc?$D(it.tr,1)+"%":it.cu?$D(it.tr,1)+"€":$(it.tr)}</div>${bH(Math.min(p,1),cl)}</div>`}).join("")}</div>
<div class="sec">Classement vendeurs</div>
<div class="cd"><div class="tw"><table><thead><tr><th class="tl">#</th><th class="tl">Vendeur</th><th class="tc">M/J</th><th class="tc">Marge</th><th class="tc">Projection</th>${RI.map(it=>`<th class="tc">${it.l.replace("Tx ","")}</th>`).join("")}<th class="tc">Items</th><th class="tc">Commission</th></tr></thead><tbody>
${d.bv.sort((a,b)=>b.mj-a.mj).map(v=>`<tr onclick="sV('${v.nm}')"><td class="tl"><span class="rg ${rC(v.rk)}">${v.rk}</span></td><td class="tl" style="font-weight:700">${v.nm}<div style="font-size:10px;color:var(--mut);font-weight:400">${v.jw}j</div></td><td class="tc" style="font-weight:700;color:var(--green)">${$(v.mj)} €</td><td class="tc">${$E(v.mg)}</td><td class="tc">${$E(v.pj)}</td>${v.its.map(i=>`<td class="tc" style="color:${i.ok?"var(--green)":"var(--red)"};font-weight:600">${fV(i)}<div style="font-size:9px;color:var(--mut);font-weight:400">/ ${fO(i)}</div></td>`).join("")}<td class="tc"><span class="pl ${pC(v.ia)}">${v.ia}/5</span></td><td class="tc" style="font-weight:700">${$E(v.cf)}</td></tr>`).join("")}
</tbody></table></div></div>
${(()=>{const al=d.bv.filter(v=>v.ia<3).sort((a,b)=>a.ia-b.ia);if(!al.length)return'';return`<div class="sec">Plans d'action</div>${al.map(v=>`<div class="cd ${v.ia===0?"ac":"aw"}"><div style="font-weight:700;margin-bottom:5px">${v.nm} — ${v.ia}/5 items · ${$E(v.mj)}/jour</div>${v.its.filter(i=>!i.ok).map(i=>`<div style="font-size:12px;color:#475569;line-height:1.7"><span style="color:var(--red);font-weight:600">${i.l}</span> : ${fV(i)} / ${fO(i)} — reste ${fR(i)}</div>`).join("")}</div>`).join("")}`})()} `}

/* ═══════ GOODAYS ═══════ */
function rG(C){const so=B.map(b=>({...b,...C.pb[b.c]})).sort((a,b)=>(b.g?.nt||0)-(a.g?.nt||0));return`
<div class="sec">Classement satisfaction Goodays</div>
<div class="cd">${so.map((b,i)=>{const n=b.g?.nt||0,pr=gP(n);return`<div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #F1F5F9"><div style="width:24px;text-align:center;font-weight:700;color:var(--mut);font-size:12px">${i+1}</div><span class="dt" style="background:${b.cl}"></span><div style="flex:1"><div style="font-weight:700;font-size:13px">${b.n}</div><div style="font-size:11px;color:var(--mut)">${b.g?.pt||0} participations</div></div><div style="width:55px;text-align:right;font-weight:800;font-size:17px;color:${cN(n)}">${n.toFixed(2)}</div><div style="width:65px;text-align:right"><span class="pl ${pr>=0?"p1":"p3"}">${pr>0?"+":""}${pr} €</span></div></div>`}).join("")}
<div style="display:flex;align-items:center;gap:12px;padding:14px 8px;background:#F8FAFC;border-radius:6px;margin-top:6px"><div style="width:24px"></div><div style="flex:1;font-weight:800">Moyenne groupe</div><div style="width:55px;text-align:right;font-weight:800;font-size:18px;color:var(--blue)">${$D(C.gM)}</div><div style="width:65px"></div></div></div>
<div class="sec">Barème primes</div>
<div class="cd"><div class="g5">${[{n:"≥ 4.9",p:"+100 €",c:"var(--green)"},{n:"≥ 4.7",p:"+50 €",c:"var(--green)"},{n:"≥ 4.5",p:"+25 €",c:"var(--orange)"},{n:"< 4.5",p:"-50 €",c:"var(--red)"},{n:"< 4.3",p:"-100 €",c:"var(--red)"}].map(b=>`<div style="padding:10px;border-radius:8px;background:#F8FAFC;text-align:center;border:1px solid var(--brd)"><div style="font-weight:600;font-size:12px;color:var(--sub)">${b.n}</div><div style="font-weight:800;color:${b.c};font-size:15px;margin-top:4px">${b.p}</div></div>`).join("")}</div></div>
<div class="sec">Avis Google — Historique</div>
<div class="cd"><div class="tw"><table><thead><tr><th class="tl">Boutique</th><th class="tc">Note</th><th class="tc">Total avis</th><th class="tc">Ce mois</th></tr></thead><tbody>
${B.map(b=>{const g=C.gl[b.c];return`<tr><td class="tl"><span class="dt" style="background:${b.cl}"></span>${b.n}</td><td class="tc" style="font-weight:700">${g?.nt?.toFixed(1)||"—"}</td><td class="tc" style="font-weight:700;font-size:15px">${$(g?.tt||0)}</td><td class="tc">+${g?.ms||0}</td></tr>`}).join("")}
<tr class="trt"><td class="tl">Total</td><td class="tc">—</td><td class="tc" style="font-size:16px">${$(C.gT)}</td><td class="tc">+${C.gMo}</td></tr></tbody></table></div></div>`}

/* ═══════ SUIVI ═══════ */
function rU(C){return`
<div class="sec">Sélectionner un collaborateur</div>
${B.map(b=>{const bv=C.pb[b.c]?.bv||[];if(!bv.length)return"";return`<div style="margin-bottom:16px"><div style="font-size:12px;font-weight:700;color:${b.cl};margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px"><span class="dt" style="background:${b.cl}"></span>${b.n}</div><div style="display:flex;gap:6px;flex-wrap:wrap">${bv.sort((a,b)=>b.mj-a.mj).map(v=>`<button class="vb" onclick="sV('${v.nm}')"><span class="rg ${rC(v.rk)}">${v.rk}</span><div><div style="font-weight:700;font-size:13px">${v.nm}</div><div style="font-size:11px;color:var(--sub)">${$E(v.mj)}/j · ${v.ia}/5</div></div></button>`).join("")}</div></div>`}).join("")}
<div class="sec">Classement global</div>
<div class="cd"><div class="tw"><table><thead><tr><th class="tl">#</th><th class="tl">Vendeur</th><th class="tc">Boutique</th><th class="tc">Marge/jour</th><th class="tc">Marge</th><th class="tc">Projection</th><th class="tc">Items</th><th class="tc">Commission</th></tr></thead><tbody>
${C.rk.map(v=>`<tr onclick="sV('${v.nm}')"><td class="tl"><span class="rg ${rC(v.rk)}">${v.rk}</span></td><td class="tl" style="font-weight:700">${v.nm}</td><td class="tc" style="font-size:11px">${B.find(b=>b.c===v.bq)?.n}</td><td class="tc" style="font-weight:700;color:var(--green)">${$E(v.mj)}</td><td class="tc">${$E(v.mg)}</td><td class="tc">${$E(v.pj)}</td><td class="tc"><span class="pl ${pC(v.ia)}">${v.ia}/5</span></td><td class="tc" style="font-weight:700">${$E(v.cf)}</td></tr>`).join("")}</tbody></table></div></div>`}

/* ═══════ VENDEUR ═══════ */
function rV(v,C){const b=B.find(x=>x.c===v.bq),bd=C.pb[v.bq],ve=Math.round((C.vi[v.bq]||0)/Math.max(1,bd?.bv?.length||1)),pm=ve>0?v.mg/ve:0;return`
<button class="bk" onclick="bV()">← Retour</button>
<div class="vh" style="background:${b?.cl||"#2563EB"}"><div class="vh-top"><div><div class="vh-role">${b?.n} · Vendeur</div><div class="vh-name">${v.nm}</div></div><div class="vh-rg">#${v.rk}</div></div><div class="vh-stats"><div class="vh-stat"><span>Jours</span><div>${v.jc} / ${v.jw}</div></div><div class="vh-stat"><span>Rang</span><div>${v.rk} / ${C.rk.length}</div></div><div class="vh-stat"><span>Items</span><div>${v.ia} / 5</div></div></div></div>
<div class="g4">
  <div class="cd kpi"><div class="kpi-label">Marge / jour</div><div class="kpi-val" style="color:var(--green)">${$E(v.mj)}</div></div>
  <div class="cd kpi"><div class="kpi-label">Marge réalisée</div><div class="kpi-val" style="color:var(--blue)">${$E(v.mg)}</div>${N1&&v.v1?`<div class="kpi-sub">N-1 : ${$E(v.v1.mg)} ${eH((v.mg-v.v1.mg)/Math.max(1,v.v1.mg))}</div>`:""}</div>
  <div class="cd kpi"><div class="kpi-label">Projection</div><div class="kpi-val" style="color:var(--purple)">${$E(v.pj)}</div></div>
  <div class="cd kpi"><div class="kpi-label">Panier moyen</div><div class="kpi-val" style="color:var(--cyan)">${$D(pm)} €</div><div class="kpi-sub">~${$(ve)} visites</div></div>
</div>
<div class="cd cc"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px"><div><div class="kpi-label">Commission projetée</div><div class="cc-amt">${$E(v.cf)}</div><div class="cc-det">Base ${$E(v.cb)} × ${(v.co*100).toFixed(0)}% prérequis ${v.pg?`${v.pg>0?"+":""}${v.pg} € Goodays`:""}</div></div><div style="text-align:center"><div style="font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.3px">Prérequis</div><div style="font-size:22px;font-weight:800;color:${v.ia>=4?"var(--green)":v.ia>=3?"var(--orange)":"var(--red)"}">${v.ia}/5</div></div></div></div>
<div class="sec">Items prioritaires</div>
<div class="cd">${v.its.map(i=>{const p=i.o>0?Math.min(1,i.r/i.o):0,cl=i.ok?"var(--green)":p>.7?"var(--orange)":"var(--red)";return`<div class="ir"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="font-weight:700;font-size:13px">${i.l}</span><span style="font-weight:700;color:${i.ok?"var(--green)":"var(--red)"}">${fV(i)} <span style="color:var(--mut);font-weight:400">/ ${fO(i)}</span> <span style="margin-left:4px">${i.ok?"✓":"✗"}</span></span></div>${bH(p,cl)}${!i.ok?`<div style="font-size:11px;color:var(--red);margin-top:3px">Reste à faire : ${fR(i)}</div>`:""}</div>`}).join("")}</div>
<div class="sec">Satisfaction Goodays</div>
<div class="cd"><div style="display:flex;align-items:center;gap:16px"><svg width="64" height="64" style="transform:rotate(-90deg);flex-shrink:0"><circle cx="32" cy="32" r="26" fill="none" stroke="#F1F5F9" stroke-width="5"/><circle cx="32" cy="32" r="26" fill="none" stroke="${cN(v.gn).replace("var(--green)","#059669").replace("var(--orange)","#D97706").replace("var(--red)","#DC2626")}" stroke-width="5" stroke-dasharray="${2*Math.PI*26}" stroke-dashoffset="${2*Math.PI*26*(1-v.gn/5)}" stroke-linecap="round"/></svg><div><div style="font-size:20px;font-weight:800;color:${cN(v.gn).replace("var(--green)","#059669").replace("var(--orange)","#D97706").replace("var(--red)","#DC2626")}">${$D(v.gn)} / 5</div><div class="kpi-sub">${bd?.g?.pt||0} participations · ${b?.n}</div><div style="margin-top:3px;font-size:12px;color:${v.pg>=0?"var(--green)":"var(--red)"};font-weight:600">Prime : ${v.pg>0?"+":""}${v.pg} €</div></div></div></div>
${(()=>{const fl=v.its.filter(i=>!i.ok);if(!fl.length)return`<div class="cd" style="border-left:3px solid var(--green);text-align:center;color:var(--green);font-weight:600;padding:18px">Tous les objectifs sont atteints</div>`;return`<div class="sec">Plan d'action</div><div class="cd ac">${fl.map(i=>`<div style="padding:6px 0;border-bottom:1px solid #F1F5F9;font-size:12px;line-height:1.6"><span style="color:var(--red);font-weight:700">${i.l}</span> — reste ${fR(i)}</div>`).join("")}${v.mj<300?'<div style="padding:6px 0;font-size:12px;color:var(--orange)">Marge/jour faible — maximiser chaque acte</div>':""}</div>`})()}`}

D=gD();
const ms=new Date().toLocaleDateString("fr-FR",{month:"long",year:"numeric"});
document.getElementById("hi").innerHTML=ms.charAt(0).toUpperCase()+ms.slice(1)+` · Jour ${D.vs[0]?.jc||14}/${JO} · ${new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})}<span class="dm">DÉMO</span>`;
bT();R();
</script>
</body>
</html>
