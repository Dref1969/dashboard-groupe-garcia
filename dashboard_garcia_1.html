<style>
:root{--bg:#F0F2F5;--card:#FFF;--hdr:#0F172A;--txt:#0F1419;--sub:#64748B;--mut:#94A3B8;--brd:#E2E8F0;--blue:#2563EB;--purple:#7C3AED;--green:#059669;--orange:#D97706;--red:#DC2626;--cyan:#0891B2;--r:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',-apple-system,sans-serif;background:var(--bg);color:var(--txt);font-size:13px;-webkit-font-smoothing:antialiased}
.hdr{background:var(--hdr);color:#fff;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:10px 20px;gap:12px;flex-wrap:wrap}
.hdr-left{display:flex;align-items:center;gap:16px}.logo{font-size:16px;font-weight:800;letter-spacing:1px}.logo span{font-weight:400;opacity:.5;font-size:13px;margin-left:8px}.hdr-info{font-size:11px;color:#94A3B8}.hdr-btns{display:flex;gap:6px}
.hb{padding:5px 12px;background:rgba(255,255,255,.08);color:#CBD5E1;border:1px solid rgba(255,255,255,.1);border-radius:6px;font-weight:600;cursor:pointer;font-size:11px;font-family:inherit;transition:all .15s}.hb:hover{background:rgba(255,255,255,.15);color:#fff}.hb.on{background:var(--purple);color:#fff;border-color:var(--purple)}
.dm{background:#FBBF24;color:#78350F;font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px;margin-left:8px}

.nav{background:#fff;border-bottom:1px solid var(--brd);display:flex;overflow-x:auto;scrollbar-width:none;padding:0 16px}.nav::-webkit-scrollbar{display:none}
.tb{padding:10px 16px;border:none;background:0;color:var(--sub);font-size:12px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;font-family:inherit;white-space:nowrap;transition:all .15s}.tb:hover{color:var(--txt)}.tb.on{color:var(--blue);border-bottom-color:var(--blue)}

.kpi-label{font-size:11px;color:var(--sub);font-weight:500;margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}.kpi-val{font-size:24px;font-weight:800;line-height:1.1}.kpi-sub{font-size:11px;color:var(--mut);margin-top:3px}.kpi-sm .kpi-val{font-size:18px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:10px}.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:10px}
.sec{font-size:13px;font-weight:700;color:var(--txt);margin:20px 0 10px;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:8px}.sec::before{content:"";display:block;width:3px;height:14px;background:var(--blue);border-radius:2px}
table{width:100%;border-collapse:collapse;font-size:12px}th{padding:8px 6px;font-size:10px;font-weight:600;color:var(--mut);text-transform:uppercase;border-bottom:2px solid var(--brd);letter-spacing:.3px}td{padding:9px 6px;border-bottom:1px solid #F1F5F9}.tl{text-align:left}.tc{text-align:center}tr[onclick]{cursor:pointer}tr[onclick]:hover{background:#F8FAFC}.trt{background:#F8FAFC;font-weight:700}
.rg{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;font-size:10px;font-weight:700;color:#fff}.r1{background:var(--green)}.r2{background:var(--orange)}.r3{background:#B0B8C4}
.pl{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700}.p1{background:#DCFCE7;color:#047857}.p2{background:#FEF3C7;color:#B45309}.p3{background:#FEE2E2;color:#B91C1C}
.ev{display:inline-block;padding:1px 6px;border-radius:5px;font-size:10px;font-weight:600}.eu{background:#DCFCE7;color:#047857}.ed{background:#FEE2E2;color:#B91C1C}
.dt{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}
.bar{height:5px;background:#F1F5F9;border-radius:3px;overflow:hidden;margin-top:4px}.barf{height:100%;border-radius:3px;transition:width .5s}
.bh{border-radius:var(--r);padding:20px;margin-bottom:14px;color:#fff}.bh h2{font-size:18px;font-weight:800;margin-bottom:8px}.bh-stats{display:flex;gap:24px;flex-wrap:wrap}.bh-stat span{font-size:10px;opacity:.65;text-transform:uppercase;letter-spacing:.3px}.bh-stat div{font-size:22px;font-weight:800;margin-top:2px}
.vh{border-radius:var(--r);padding:18px;margin-bottom:14px;color:#fff}.vh-top{display:flex;justify-content:space-between;align-items:start}.vh-name{font-size:22px;font-weight:800}.vh-role{font-size:11px;opacity:.7}.vh-rg{background:rgba(255,255,255,.15);border-radius:8px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800}.vh-stats{display:flex;gap:18px;margin-top:12px;flex-wrap:wrap}.vh-stat span{opacity:.65;font-size:10px;text-transform:uppercase;letter-spacing:.3px}.vh-stat div{font-size:16px;font-weight:700;margin-top:1px}
.cc{background:#F0FDF4;border-left:3px solid var(--green);border:1px solid #BBF7D0}.cc .cc-amt{font-size:26px;font-weight:800;color:var(--green)}.cc .cc-det{font-size:11px;color:var(--sub)}
.ac{border-left:3px solid var(--red);border-radius:0 var(--r) var(--r) 0}.aw{border-left:3px solid var(--orange);border-radius:0 var(--r) var(--r) 0}

.bk{padding:6px 14px;background:#fff;color:var(--txt);border:1px solid var(--brd);border-radius:6px;font-weight:600;cursor:pointer;font-size:12px;font-family:inherit;margin-bottom:10px}

.sp-logo{opacity:0;transform:translateY(20px);animation:spU .8s ease .2s forwards}.sp-logo-text{font-size:28px;font-weight:800;color:#fff;letter-spacing:2px;text-align:center}.sp-logo-sub{font-size:14px;color:#64748B;font-weight:500;margin-top:6px;text-align:center}

.sp-kpis{display:flex;gap:32px;margin-top:28px;opacity:0;transform:translateY(12px);animation:spU .6s ease 1.2s forwards}.sp-kpi{text-align:center}.sp-kpi-val{font-size:22px;font-weight:800;color:#fff}.sp-kpi-label{font-size:10px;color:#64748B;text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.sp-status{margin-top:28px;opacity:0;animation:spU .5s ease 1.8s forwards}.sp-status span{font-size:11px;color:#64748B}.sp-dots{display:inline-flex;gap:4px;margin-left:6px;vertical-align:middle}.sp-dot{width:5px;height:5px;border-radius:50%;background:#3B82F6;opacity:.3;animation:spP .8s ease infinite}.sp-dot:nth-child(2){animation-delay:.15s}.sp-dot:nth-child(3){animation-delay:.3s}
@keyframes spU{to{opacity:1;transform:translateY(0)}}@keyframes spL{to{width:180px}}@keyframes spP{0%,100%{opacity:.3}50%{opacity:1}}
.hdr,.nav,.mn{opacity:0;transform:translateY(12px);transition:opacity .5s,transform .5s}body.loaded .hdr{opacity:1;transform:none;transition-delay:.05s}body.loaded .nav{opacity:1;transform:none;transition-delay:.15s}body.loaded .mn{opacity:1;transform:none;transition-delay:.25s}
@media(max-width:768px){.g3,.g4{grid-template-columns:1fr 1fr}.g5{grid-template-columns:repeat(3,1fr)}}
@media(max-width:480px){.g3,.g2,.g4{grid-template-columns:1fr}}

<body>
<div id="splash"><div class="sp-logo"><div class="sp-logo-text">GROUPE GARCIA</div><div class="sp-logo-sub">Dashboard Manager</div></div><div class="sp-line"></div><div class="sp-kpis"><div class="sp-kpi"><div class="sp-kpi-val" id="spM">—</div><div class="sp-kpi-label">Marge groupe</div></div><div class="sp-kpi"><div class="sp-kpi-val" id="spB">—</div><div class="sp-kpi-label">Boutiques</div></div><div class="sp-kpi"><div class="sp-kpi-val" id="spV">—</div><div class="sp-kpi-label">Vendeurs</div></div></div><div class="sp-status"><span>Chargement des données</span><span class="sp-dots"><span class="sp-dot"></span><span class="sp-dot"></span><span class="sp-dot"></span></span></div></div>
<header class="hdr"><div class="hdr-left"><div class="logo">GROUPE GARCIA<span>Dashboard Manager</span></div><div class="hdr-info" id="hi"></div></div><div class="hdr-btns"><button class="hb" onclick="location.reload()">Actualiser</button></div></header>

<script>
const SID="1su6J88rzRF9hnZXwOsD8gkSDQpDl_XI1Ifjcoost6rY";
const B=[{c:"ALR",n:"Angers",cl:"#2563EB"},{c:"TLR",n:"Amboise",cl:"#7C3AED"},{c:"CLR",n:"Châteaudun",cl:"#0891B2"},{c:"CHOLET",n:"Cholet",cl:"#DC2626"},{c:"RLR",n:"Romorantin",cl:"#059669"},{c:"VLR",n:"Vendôme",cl:"#D97706"}];
const BM=[{m:2e3,x:3e3,p:.02},{m:3e3,x:4e3,p:.03},{m:4e3,x:5e3,p:.05},{m:5e3,x:6e3,p:.06},{m:6e3,x:7e3,p:.07},{m:7e3,x:8e3,p:.08},{m:8e3,x:9e3,p:.09},{m:9e3,x:1e9,p:.1}];

const $=n=>new Intl.NumberFormat("fr-FR",{maximumFractionDigits:0}).format(n||0);
const $E=n=>$(n)+" €";const $D=(n,d=2)=>(n||0).toFixed(d);
function cC(m){if(m<2e3)return 0;let c=0;for(const b of BM)if(m>b.m)c+=(Math.min(m,b.x)-b.m)*b.p;return c}
function gP(n){if(!n||n<=0)return 0;if(n>=4.9)return 100;if(n>=4.7)return 50;if(n>=4.5)return 25;if(n>=4.3)return-50;return-100}
function cN(n){return n>=4.7?"#059669":n>=4.5?"#D97706":"#DC2626"}
function rC(r){return r<=3?"r1":r<=8?"r2":"r3"}
function pC(a){return a>=4?"p1":a>=3?"p2":"p3"}
function eH(v){if(v==null)return"";return`<span class="ev ${v>=0?"eu":"ed"}">${v>=0?"+":""}${(v*100).toFixed(1)}%</span>`}
function bH(v,c){return`<div class="bar"><div class="barf" style="width:${Math.min(100,(v||0)*100)}%;background:${c}"></div></div>`}

let D=null,ITEMS=[],CT="synthese",SV=null,charts=[],isDemo=false,lastMAJ="";
Chart.register(ChartDataLabels);

/* ═══ CSV PARSER ═══ */
function parseCSV(t){const ls=t.split("\n").filter(l=>l.trim());if(ls.length<2)return[];const pr=l=>{const r=[];let c="",q=0;for(let i=0;i<l.length;i++){const ch=l[i];if(ch==='"'){if(q&&l[i+1]==='"'){c+='"';i++}else q=!q}else if(ch===','&&!q){r.push(c.trim());c=""}else c+=ch}r.push(c.trim());return r};const h=pr(ls[0]);return ls.slice(1).map(l=>{const v=pr(l),o={};h.forEach((k,i)=>o[k]=v[i]||"");return o})}
function pNum(s){if(!s)return 0;return parseFloat(s.replace(",","."))||0}

/* ═══ CACHE localStorage ═══ */
const CACHE_PREFIX='garcia_mgr_';
const CACHE_TTL=5*60*1000;
function cacheGet(key){try{const raw=localStorage.getItem(CACHE_PREFIX+key);if(!raw)return null;const{data,ts}=JSON.parse(raw);return{data,ts,fresh:Date.now()-ts<CACHE_TTL}}catch(e){return null}}
function cacheSet(key,data){try{localStorage.setItem(CACHE_PREFIX+key,JSON.stringify({data,ts:Date.now()}))}catch(e){}}

/* ═══ FETCH GOOGLE SHEET ═══ */
async function fetchTab(tab){const u=`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tab)}`;const r=await fetch(u);if(!r.ok)throw new Error(r.status);return parseCSV(await r.text())}

async function loadReal(){
  // TOUS les onglets en PARALLÈLE (6 appels simultanés au lieu de 6 séquentiels)
  const results=await Promise.allSettled([
    fetchTab("Données_Commissions"), // 0
    fetchTab("Items_Mois"),          // 1
    fetchTab("Config"),              // 2
    fetchTab("Donnees_N1"),          // 3
    fetchTab("Goodays"),             // 4
    fetchTab("DILAX")                // 5
  ]);

  // Extraction des résultats (avec fallback si échec)
  const rows=results[0].status==='fulfilled'?results[0].value:[];
  const items=results[1].status==='fulfilled'?results[1].value:[];
  const cfg=results[2].status==='fulfilled'?results[2].value:[];
  const n1r=results[3].status==='fulfilled'?results[3].value:null;
  const gr=results[4].status==='fulfilled'?results[4].value:null;
  const dr=results[5].status==='fulfilled'?results[5].value:null;

  if(results[0].status==='rejected') console.warn("Données_Commissions:",results[0].reason);
  if(results[3].status==='rejected') console.log("N-1 fallback:",results[3].reason);
  if(results[4].status==='rejected') console.log("Goodays fallback:",results[4].reason);
  if(results[5].status==='rejected') console.log("DILAX fallback:",results[5].reason);

  // Parse items prioritaires
  ITEMS=items.map(r=>({
    nom:r["Nom de l'item"]||"",
    obj:pNum(r["Objectif"]),
    unite:r["Unité"]||"",
    poids:r["Poids (% rému)"]||""
  }));
  // Parse config
  lastMAJ=cfg[0]?.["Dernière MAJ"]||"";
  const moisEnCours=cfg[0]?.["Mois en cours"]||"";
  // Parse vendeurs
  const vs=rows.filter(r=>r["Vendeur"]).map(r=>{
    const mg=pNum(r["Marge"]),mb=pNum(r["Mobiles"]),g3=pNum(r["G3A"]),cy=pNum(r["Cyber"]);
    const as=pNum(r["Assurance"]),ma=pNum(r["MobAssu"]),ac=pNum(r["CAccessoires"]);
    const jc=pNum(r["JourOuvre"]),jt=pNum(r["JoursOuvresTotal"]),jw=pNum(r["JoursTravailles"]);
    const ta=ma>0?(as/ma)*100:0,tx=mb>0?ac/mb:0;
    return{nm:r["Vendeur"],bq:r["CodeBoutique"],role:r["Role"]||"Vendeur",mg,mb,g3,cy,as,ma,ac,jc,jt:jt||21,jw:jw||22,ta,tx};
  });
  // N-1 depuis onglet Donnees_N1 (déjà chargé en parallèle)
  let n1=vs.map(v=>({...v,mg:0,mb:0,cy:0}));
  if(n1r){const n1Map={};n1r.forEach(r=>{n1Map[r["Boutique"]]={mg:pNum(r["Marge"]),mb:pNum(r["Mobiles"]),bx:pNum(r["Box"]),as:pNum(r["Assurance"]),cy:pNum(r["Cyber"])}});
  n1=vs.map(v=>{const d=n1Map[v.bq]||{};return{...v,mg:d.mg||0,mb:d.mb||0,cy:d.cy||0,as:d.as||0,bx:d.bx||0}});}
  // Goodays (déjà chargé en parallèle)
  let gd={},gl={};
  if(gr){gr.forEach(r=>{const b=r["Boutique"];const ns=pNum(r["NoteSat"]),ps=pNum(r["PartSat"]),ng=pNum(r["NoteGoogle"]),ag=pNum(r["AvisGoogle"]);
  gd[b]={nt:ns,pt:ps};gl[b]={nt:ng,tt:ag,ms:ag}});}else{gd={ALR:{nt:0,pt:0},TLR:{nt:0,pt:0},CLR:{nt:0,pt:0},CHOLET:{nt:0,pt:0},RLR:{nt:0,pt:0},VLR:{nt:0,pt:0}};gl={ALR:{nt:0,tt:0,ms:0},TLR:{nt:0,tt:0,ms:0},CLR:{nt:0,tt:0,ms:0},CHOLET:{nt:0,tt:0,ms:0},RLR:{nt:0,tt:0,ms:0},VLR:{nt:0,tt:0,ms:0}};}
  // DILAX (déjà chargé en parallèle)
  let vi={ALR:0,TLR:0,CLR:0,CHOLET:0,RLR:0,VLR:0};
  let viN1={ALR:0,TLR:0,CLR:0,CHOLET:0,RLR:0,VLR:0};
  if(dr){dr.forEach(r=>{const c=r["Code"];const v=pNum(r["Visiteurs"]);if(c&&vi.hasOwnProperty(c))vi[c]=v;});}
  // Visiteurs N-1 depuis le même onglet Donnees_N1 (réutilisé, pas de 2e fetch)
  if(n1r){n1r.forEach(r=>{const b=r["Boutique"];const vn=pNum(r["VisiteursN1"]);if(b&&viN1.hasOwnProperty(b))viN1[b]=vn;});}

  const result={vs,n1,gd,gl,vi,viN1,moisEnCours};
  // Mise en cache
  cacheSet('data',result);
  return result;
}

/* ═══ BUILD ITEMS MAPPING ═══ */
function getItemsRI(){
  // Mappe les items du Sheet vers les clés internes
  return ITEMS.map(it=>{
    if(it.nom.match(/mobiles/i))return{k:"mob",l:it.nom,ob:it.obj,field:"mb"};
    if(it.nom.match(/garantie|g3a|3.me/i))return{k:"g3a",l:it.nom,ob:it.obj,field:"g3",pc:it.unite==="%"?1:0};
    if(it.nom.match(/cyber/i))return{k:"cyber",l:it.nom,ob:it.obj,field:"cy"};
    if(it.nom.match(/assurance/i))return{k:"txA",l:it.nom,ob:it.obj,pc:1};
    if(it.nom.match(/accessoire/i))return{k:"txC",l:it.nom,ob:it.obj,cu:1};
    return{k:it.nom,l:it.nom,ob:it.obj};
  });
}

/* ═══ ENRICH ═══ */
function eD(d){
  const{vs,n1,gd,gl,vi,viN1}=d;
  const RI=getItemsRI();
  const en=vs.map(v=>{
    const jc=v.jc||1,mj=jc>0?v.mg/jc:0,jr=Math.max(0,v.jw-jc),pj=v.mg+mj*jr;
    const ratio=v.jw/(v.jt||21);
    const its=RI.map(it=>{
      let o=it.ob;
      // Proratiser les objectifs volumiques par jours travaillés
      if(!it.pc&&!it.cu)o=Math.round(it.ob*ratio*100)/100;
      let r;
      if(it.k==="txA")r=v.ta;
      else if(it.k==="txC")r=v.tx;
      else if(it.k==="g3a")r=v.mb>0?Math.round(v.g3/v.mb*10000)/100:0;
      else if(it.field)r=v[it.field]||0;
      else r=0;
      return{...it,o,r,ok:r>=o,rf:o-r};
    });
    const ia=its.filter(i=>i.ok).length,co=ia/5,cb=cC(pj),gn=gd[v.bq]?.nt||0,pg=gP(gn),cf=Math.max(0,cb*co+pg);
    const v1=n1.find(x=>x.bq===v.bq);
    return{...v,mj,pj,its,ia,co,cb,cf,pg,gn,v1};
  });
  const rk=[...en].sort((a,b)=>b.mj-a.mj);rk.forEach((v,i)=>v.rk=i+1);
  const pb={};
  B.forEach(b=>{
    const bv=rk.filter(v=>v.bq===b.c);if(!bv.length)return;
    const mg=bv.reduce((s,v)=>s+v.mg,0),pj=bv.reduce((s,v)=>s+v.pj,0);
    const vv=vi[b.c]||0,pm=vv>0?mg/vv:0,mn=bv[0]?.v1?.mg||0;
    const vvN1=viN1[b.c]||0,pmN1=vvN1>0?mn/vvN1:0;
    const mobN=bv.reduce((s,v)=>s+v.mb,0),mobN1=bv[0]?.v1?.mb||0;
    const cyN=bv.reduce((s,v)=>s+v.cy,0),cyN1=bv[0]?.v1?.cy||0;
    const g3N=bv.reduce((s,v)=>s+v.g3,0),acN=bv.reduce((s,v)=>s+v.ac,0);
    const ia=RI.map(it=>{const tr=bv.reduce((s,v)=>s+(v.its.find(i=>i.k===it.k)?.r||0),0),to=bv.reduce((s,v)=>s+(v.its.find(i=>i.k===it.k)?.o||0),0);if(it.k==="g3a"){const tg3=bv.reduce((s,v)=>s+v.g3,0),tmb=bv.reduce((s,v)=>s+v.mb,0);return{...it,tr:tmb>0?Math.round(tg3/tmb*10000)/100:0,to:it.ob}}return it.pc||it.cu?{...it,tr:tr/Math.max(1,bv.length),to:it.ob}:{...it,tr,to}});
    pb[b.c]={...b,bv,mg,pj,vv,pm,mn,vvN1,pmN1,mobN,mobN1,cyN,cyN1,g3N,acN,ia,g:gd[b.c],gl:gl[b.c],ev:mn>0?(mg-mn)/mn:0};
  });

/* ═══ INIT ═══ */
async function init(){
  const t0=Date.now();
  let usedCache=false;

  if(cached && cached.data && cached.data.vs){

      if(!ITEMS.length) ITEMS=[{nom:"Mobiles",obj:20,unite:"unités"},{nom:"Garantie 3ème Année",obj:50,unite:"%"},{nom:"SFR Cyber",obj:15,unite:"unités"},{nom:"Taux d'Assurance",obj:40,unite:"%"},{nom:"Taux d'Accessoire",obj:30,unite:"€/vente"}];
      isDemo=false;
      usedCache=true;
    }catch(e){console.warn("Cache parse error:",e)}
  }

  // ── Phase 1 : Fetch réseau (parallélisé) ──
  try{
    D=await loadReal();
    isDemo=false;
  }catch(e){
    console.log("Fallback:",e);

      const n1=vs.map(v=>({...v,mg:Math.round(v.mg*.9),mb:Math.round(v.mb*.85),cy:Math.round(v.cy*.8)}));
      D={vs,n1,gd:{ALR:{nt:4.72,pt:28},RLR:{nt:4.91,pt:31}},gl:{ALR:{nt:4.6,tt:847,ms:12},RLR:{nt:4.5,tt:538,ms:9}},vi:{ALR:320,RLR:245},viN1:{ALR:295,RLR:230}};

  const C=eD(D);

  const spTarget=C.mG;let spCur=0;const spEl=document.getElementById("spM");const spStart=performance.now();
  function spAnim(now){const el=now-spStart;const p=Math.min(el/1400,1);const e=1-Math.pow(1-p,3);spCur=Math.round(spTarget*e);spEl.textContent=$E(spCur);if(p<1)requestAnimationFrame(spAnim)}
  if(usedCache){requestAnimationFrame(spAnim)}else{setTimeout(()=>requestAnimationFrame(spAnim),1200)}

  // Header info
  const moisLabel=D.moisEnCours||new Date().toLocaleDateString("fr-FR",{month:"long",year:"numeric"});
  const majLabel=lastMAJ?` · MAJ ${lastMAJ}`:"";

  document.getElementById("hi").innerHTML=`${moisLabel.charAt(0).toUpperCase()+moisLabel.slice(1)} · J${C.jc}/${C.jt}${majLabel}${badge}`;

  bT();

  // Reveal — splash raccourci si cache utilisé
  const elapsed=Date.now()-t0;
  const splashDelay=usedCache?Math.max(0,400-elapsed):Math.max(0,3200-elapsed);
  setTimeout(()=>{
    document.getElementById("splash").classList.add("hide");
    document.body.classList.add("loaded");
    R();
  },splashDelay);
}

init();
