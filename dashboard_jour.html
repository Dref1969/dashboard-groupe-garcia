<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<title>GROUPE GARCIA — Dashboard Jour</title>
<style>
  :root {
    --bg: #0a0a0a;
    --bg-card: #141414;
    --bg-card-2: #1a1a1a;
    --gold: #d4af37;
    --gold-light: #f0d680;
    --gold-dark: #8b6914;
    --text: #f5f5f5;
    --text-dim: #999;
    --border: #2a2a2a;
    --green: #4ade80;
    --red: #ef4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  .wrap { max-width: 900px; margin: 0 auto; padding: 16px 14px 60px; }
  .header {
    display: flex; flex-direction: column; gap: 4px;
    padding: 18px 16px; margin-bottom: 16px;
    background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
    border: 1px solid var(--gold-dark);
    border-radius: 14px;
    position: relative; overflow: hidden;
  }
  .header::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .h-title { font-size: 13px; letter-spacing: 2px; color: var(--gold); font-weight: 600; }
  .h-main { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .h-date { font-size: 12px; color: var(--text-dim); display: flex; align-items: center; gap: 8px; margin-top: 2px; }
  .h-date .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .refresh-btn {
    position: absolute; top: 16px; right: 16px;
    background: rgba(212, 175, 55, 0.1); border: 1px solid var(--gold-dark);
    color: var(--gold); padding: 6px 12px; border-radius: 8px; font-size: 14px;
    cursor: pointer; font-weight: 700;
  }
  .refresh-btn:active { transform: scale(0.95); }
  .kpi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
  .kpi {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 12px; position: relative; overflow: hidden;
  }
  .kpi-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 4px; }
  .kpi-value { font-size: 22px; font-weight: 800; color: var(--gold-light); letter-spacing: -0.5px; }
  .kpi-sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .kpi.big { grid-column: span 2; padding: 18px 16px; }
  .kpi.big .kpi-value { font-size: 32px; }
  .section { margin-bottom: 18px; }
  .section-title {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--gold); font-weight: 700; padding: 0 4px 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::before { content: ""; width: 16px; height: 1px; background: var(--gold-dark); }
  .bou-list { display: grid; grid-template-columns: 1fr; gap: 8px; }
  .bou {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 14px; display: grid; grid-template-columns: 1fr auto; gap: 4px;
  }
  .bou-name { font-size: 14px; font-weight: 700; }
  .bou-marge { font-size: 18px; font-weight: 800; color: var(--gold-light); text-align: right; }
  .bou-detail {
    grid-column: 1 / -1; font-size: 11px; color: var(--text-dim);
    display: flex; gap: 12px; flex-wrap: wrap; padding-top: 4px;
    border-top: 1px dashed var(--border); margin-top: 4px;
  }
  .bou-detail span strong { color: var(--text); }
  .vend-list { display: flex; flex-direction: column; gap: 6px; }
  .vend {
    display: grid; grid-template-columns: 30px 1fr auto; gap: 10px; align-items: center;
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px;
  }
  .vend-rank {
    width: 26px; height: 26px; border-radius: 50%; background: var(--bg-card-2);
    color: var(--text-dim); font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .vend.r1 .vend-rank { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #000; }
  .vend.r2 .vend-rank { background: #c0c0c0; color: #000; }
  .vend.r3 .vend-rank { background: #cd7f32; color: #fff; }
  .vend-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .vend-name { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .vend-meta { font-size: 10px; color: var(--text-dim); }
  .vend-marge { font-size: 16px; font-weight: 800; color: var(--gold-light); }
  .loading { text-align: center; padding: 40px 20px; color: var(--text-dim); font-size: 13px; }
  .loading::after { content: " •••"; display: inline-block; animation: dots 1.4s infinite; color: var(--gold); }
  @keyframes dots { 0%,20% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
  .error {
    background: rgba(239, 68, 68, 0.1); border: 1px solid var(--red);
    color: var(--red); padding: 14px; border-radius: 10px; font-size: 13px;
    margin: 20px 0;
  }
  .footer {
    text-align: center; font-size: 10px; color: var(--text-dim);
    margin-top: 24px; padding: 12px; border-top: 1px solid var(--border);
  }
  .footer .live { color: var(--green); font-weight: 700; }
  @media (min-width: 600px) {
    .kpi-grid { grid-template-columns: repeat(4, 1fr); }
    .kpi.big { grid-column: span 2; }
    .bou-list { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <button class="refresh-btn" onclick="charger()" title="Actualiser">↻</button>
    <div class="h-title">GROUPE GARCIA</div>
    <div class="h-main">Dashboard Jour</div>
    <div class="h-date">
      <span class="dot"></span>
      <span id="date-jour">Chargement...</span>
    </div>
  </div>
  <div id="content">
    <div class="loading">Connexion à 3GWIN</div>
  </div>
  <div class="footer">
    <span class="live">● LIVE</span> &nbsp;•&nbsp; Données 3GWIN &nbsp;•&nbsp;
    Dernière MAJ : <span id="ts">-</span>
  </div>
</div>

<script>
  const SHEET_ID    = "1su6J88rzRF9hnZXwOsD8gkSDQpDl_XI1Ifjcoost6rY";
  const SHEET_NAME  = "Données_Commissions";

  const BOUTIQUES = {
    "ALR":    "SFR Angers",
    "TLR":    "SFR Amboise",
    "CLR":    "SFR Châteaudun",
    "CHOLET": "SFR Cholet",
    "RLR":    "SFR Romorantin",
    "VLR":    "SFR Vendôme"
  };

  function fmt(n)  { return new Intl.NumberFormat('fr-FR', {maximumFractionDigits: 0}).format(Math.round(n || 0)); }
  function fmtH() {
    const d = new Date();
    return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  }
  function dateFr() {
    const j = ["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];
    const m = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
    const d = new Date();
    return j[d.getDay()] + " " + d.getDate() + " " + m[d.getMonth()] + " " + d.getFullYear();
  }
  function esc(s) {
    return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function num(v) {
    if (v === null || v === undefined || v === "") return 0;
    if (typeof v === "number") return v;
    const s = String(v).replace(/[^\d,.-]/g, "").replace(",", ".");
    const n = parseFloat(s);
    return isNaN(n) ? 0 : n;
  }

  async function lireSheet() {
    const url = "https://docs.google.com/spreadsheets/d/" + SHEET_ID
              + "/gviz/tq?tqx=out:json&sheet=" + encodeURIComponent(SHEET_NAME)
              + "&_=" + Date.now();
    const r = await fetch(url);
    if (!r.ok) throw new Error("HTTP " + r.status);
    const txt = await r.text();
    const m = txt.match(/setResponse\(([\s\S]*)\);?\s*$/);
    if (!m) throw new Error("Format de réponse inattendu");
    return JSON.parse(m[1]);
  }

  function parser(gviz) {
    const cols = gviz.table.cols.map(c => (c.label || c.id || "").toLowerCase().trim());
    const rows = gviz.table.rows;

    function find(...mots) {
      for (const mot of mots) {
        const i = cols.findIndex(c => c.indexOf(mot) !== -1);
        if (i !== -1) return i;
      }
      return -1;
    }
    const ix = {
      vendeur: find("vendeur","nom","prenom"),
      bou:     find("boutique","mag","code"),
      marge:   find("marge"),
      mob:     find("mob","mobile"),
      cyber:   find("cyber"),
      assu:    find("assu","assurance"),
      alba:    find("alba","tracker","g3a"),
      access:  find("access","accessoire"),
      box:     find("box","thd","raccord")
    };

    const vendeurs = [];
    const bouMap = {};

    rows.forEach(row => {
      if (!row || !row.c) return;
      const cell = i => (i >= 0 && row.c[i] && row.c[i].v !== null && row.c[i].v !== undefined) ? row.c[i].v : "";

      const nom = String(cell(ix.vendeur) || "").trim();
      if (!nom || nom.toUpperCase() === "TOTAL") return;

      const v = {
        nom:    nom,
        bou:    String(cell(ix.bou) || "").trim().toUpperCase(),
        marge:  num(cell(ix.marge)),
        mob:    num(cell(ix.mob)),
        cyber:  num(cell(ix.cyber)),
        assu:   num(cell(ix.assu)),
        alba:   num(cell(ix.alba)),
        access: num(cell(ix.access)),
        box:    num(cell(ix.box))
      };
      vendeurs.push(v);

      const code = v.bou || "?";
      if (!bouMap[code]) {
        bouMap[code] = { code: code, nom: BOUTIQUES[code] || code,
