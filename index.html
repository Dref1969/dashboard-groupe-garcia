<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mes Commissions - Groupe Garcia</title>
  <style>
    /* ===== RESET ===== */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a1a;
      min-height: 100vh;
      padding-bottom: 100px;
    }

    /* ===== HEADER STICKY ===== */
    .header {
      background: linear-gradient(135deg, #e60000, #b30000);
      color: white;
      padding: 24px 20px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 15px rgba(230, 0, 0, 0.3);
    }

    .header h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin: 0;
    }

    .header p {
      font-size: 13px;
      opacity: 0.85;
      margin-top: 6px;
    }

    /* ===== CONTAINER ===== */
    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 16px;
    }

    /* ===== CARD ===== */
    .card {
      background: white;
      border-radius: 16px;
      padding: 24px 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border: 1px solid #e8e8e8;
      animation: fadeInUp 0.4s ease-out forwards;
    }

    .card:nth-child(2) { animation-delay: 0.05s; }
    .card:nth-child(3) { animation-delay: 0.1s; }
    .card:nth-child(4) { animation-delay: 0.15s; }
    .card:nth-child(5) { animation-delay: 0.2s; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== CARD TITLES ===== */
    .card-title {
      font-size: 15px;
      font-weight: 700;
      color: #e60000;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title .icon {
      font-size: 18px;
    }

    /* ===== COMMISSION CARD (MAIN) ===== */
    .commission-amount {
      font-size: 52px;
      font-weight: 800;
      color: #e60000;
      text-align: center;
      line-height: 1;
      margin: 20px 0;
    }

    .commission-label {
      text-align: center;
      color: #888;
      font-size: 13px;
      margin-top: 4px;
      letter-spacing: 0.5px;
    }

    .commission-realise {
      text-align: center;
      color: #666;
      font-size: 14px;
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #f0f0f0;
    }

    .commission-realise .amount {
      color: #e60000;
      font-weight: 700;
      font-size: 18px;
    }

    /* ===== JAUGE CIRCULAIRE ===== */
    .gauge-container {
      position: relative;
      width: 160px;
      height: 160px;
      margin: 16px auto 0;
    }

    .gauge-container svg {
      transform: rotate(-90deg);
      width: 100%;
      height: 100%;
    }

    .gauge-circle {
      fill: none;
      stroke-width: 8;
      stroke-linecap: round;
    }

    .gauge-bg {
      stroke: #e8e8e8;
    }

    .gauge-fill {
      stroke: #e60000;
      stroke-dasharray: 427;
      stroke-dashoffset: 427;
      transition: stroke-dashoffset 1.5s ease-out;
    }

    .gauge-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      font-weight: 700;
      color: #e60000;
      font-size: 16px;
    }

    /* ===== MARGE CARD ===== */
    .marge-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #f0f0f0;
    }

    .marge-row:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }

    .marge-label {
      font-size: 13px;
      color: #666;
      flex: 1;
    }

    .marge-value {
      font-size: 16px;
      font-weight: 700;
      color: #e60000;
      text-align: right;
      min-width: 80px;
    }

    .marge-detail {
      font-size: 12px;
      color: #999;
      text-align: right;
    }

    .palier-box {
      background: #f9f9f9;
      border-left: 4px solid #e60000;
      padding: 12px 14px;
      border-radius: 0 8px 8px 0;
      margin-top: 12px;
      font-size: 13px;
      line-height: 1.6;
    }

    .palier-box strong {
      color: #e60000;
      font-weight: 700;
    }

    /* ===== ITEMS CARD ===== */
    .item-row {
      padding: 16px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .item-row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .item-name {
      font-weight: 600;
      font-size: 14px;
      color: #1a1a1a;
    }

    .item-values {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .item-value {
      font-size: 13px;
      color: #666;
    }

    .item-value strong {
      color: #e60000;
      font-weight: 700;
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }

    .badge.atteint {
      background: #d4edda;
      color: #155724;
    }

    .badge.en_cours {
      background: #fff3cd;
      color: #856404;
    }

    .badge.danger {
      background: #f8d7da;
      color: #721c24;
    }

    .badge.projection {
      background: #e3f2fd;
      color: #1565c0;
      font-size: 10px;
      margin-top: 4px;
    }

    /* ===== BARRE DE PROGRESSION ===== */
    .progress-bar {
      height: 8px;
      background: #e8e8e8;
      border-radius: 4px;
      overflow: hidden;
      margin-top: 6px;
    }

    .progress-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      width: 0;
    }

    .progress-fill.atteint {
      background: linear-gradient(90deg, #28a745, #20c997);
    }

    .progress-fill.en_cours {
      background: linear-gradient(90deg, #fd7e14, #ffc107);
    }

    .progress-fill.danger {
      background: linear-gradient(90deg, #dc3545, #e74c3c);
    }

    .progress-subtext {
      font-size: 12px;
      color: #999;
      margin-top: 4px;
      text-align: right;
    }

    /* ===== FOOTER ===== */
    .footer {
      text-align: center;
      padding: 20px;
      color: #999;
      font-size: 12px;
      background: #f9f9f9;
      border-radius: 12px;
      margin-top: 8px;
    }

    /* ===== LOGIN SCREEN ===== */
    .login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 120px);
      padding: 20px;
    }

    .login-card {
      background: white;
      border-radius: 16px;
      padding: 40px 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
      width: 100%;
      max-width: 400px;
    }

    .login-card h2 {
      color: #1a1a1a;
      margin-bottom: 24px;
      font-size: 20px;
    }

    .login-select {
      width: 100%;
      padding: 16px;
      border: 2px solid #e0e0e0;
      border-radius: 14px;
      font-size: 16px;
      background: #fafafa;
      margin-bottom: 20px;
      -webkit-appearance: none;
      appearance: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .login-select:focus {
      outline: none;
      border-color: #e60000;
      background: white;
      box-shadow: 0 0 0 3px rgba(230, 0, 0, 0.1);
    }

    .login-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #e60000, #b30000);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .login-btn:active {
      transform: scale(0.98);
    }

    .login-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    /* ===== LOADING SPINNER ===== */
    .loading-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 120px);
      gap: 20px;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #e8e8e8;
      border-top-color: #e60000;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      color: #666;
      font-size: 14px;
    }

    /* ===== BOUTON RETOUR ===== */
    .back-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #e60000, #b30000);
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(230, 0, 0, 0.3);
      display: none;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      z-index: 99;
    }

    .back-btn:active {
      transform: scale(0.9);
    }

    .back-btn.visible {
      display: flex;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      .header {
        padding: 20px 16px;
      }

      .header h1 {
        font-size: 18px;
      }

      .container {
        padding: 12px;
      }

      .card {
        padding: 20px 16px;
        margin-bottom: 12px;
      }

      .commission-amount {
        font-size: 44px;
      }

      .gauge-container {
        width: 140px;
        height: 140px;
      }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <h1>MES COMMISSIONS</h1>
    <p id="headerSubtitle">Groupe Garcia - Boutiques SFR</p>
  </div>

  <!-- ECRAN DE CONNEXION -->
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <h2>Connexion</h2>
      <p style="color: #666; font-size: 14px; margin-bottom: 20px;">Entrez votre code personnel</p>
      <input type="text" id="inputCode" class="login-select" placeholder="Ex: ANAIS4721" autocomplete="off" autocapitalize="characters" style="text-transform: uppercase; text-align: center; font-weight: 600; font-size: 20px; letter-spacing: 2px;">
      <div id="loginError" style="color: #dc3545; font-size: 13px; margin-bottom: 12px; display: none;"></div>
      <button class="login-btn" id="connectBtn" onclick="voirCommissions()">
        CONNEXION
      </button>
    </div>
  </div>

  <!-- ECRAN DASHBOARD -->
  <div id="dashboard" class="container" style="display:none;"></div>

  <!-- LOADING -->
  <div id="loadingScreen" class="loading-screen">
    <div class="spinner"></div>
    <p class="loading-text">Calcul en cours...</p>
  </div>

  <!-- BOUTON RETOUR -->
  <button class="back-btn" id="backBtn" onclick="retourLogin()" title="Changer de collaborateur">&#x2190;</button>

  <script>
    // ============================================================
    // GROUPE GARCIA - Commissions Projetees
    // Version GitHub Pages - Client-side JavaScript
    // ============================================================

    // ===== CONFIGURATION =====
    const SHEET_ID = "1su6J88rzRF9hnZXwOsD8gkSDQpDl_XI1Ifjcoost6rY";

    // ===== BOUTIQUES =====
    const BOUTIQUES = {
      "ALR": "SFR Angers",
      "TLR": "SFR Amboise",
      "CLR": "SFR Ch\u00e2teaudun",
      "CHOLET": "SFR Cholet",
      "RLR": "SFR Romorantin",
      "VLR": "SFR Vend\u00f4me"
    };

    // ===== BAREME VENDEUR =====
    const PALIERS_VENDEUR = [
      { min: 0,    max: 2000,  pct: 0 },
      { min: 2000, max: 3000,  pct: 0.02 },
      { min: 3000, max: 4000,  pct: 0.03 },
      { min: 4000, max: 5000,  pct: 0.05 },
      { min: 5000, max: 6000,  pct: 0.06 },
      { min: 6000, max: 7000,  pct: 0.07 },
      { min: 7000, max: 8000,  pct: 0.08 },
      { min: 8000, max: 9000,  pct: 0.09 },
      { min: 9000, max: Infinity, pct: 0.10 }
    ];

    // ===== BAREME RPV CHOLET =====
    const PALIERS_RPV = [
      { min: 0,     max: 18000, pct: 0 },
      { min: 18000, max: 20000, pct: 0.01 },
      { min: 20000, max: 22000, pct: 0.012 },
      { min: 22000, max: 23000, pct: 0.024 },
      { min: 23000, max: 24000, pct: 0.026 },
      { min: 24000, max: 26000, pct: 0.028 },
      { min: 26000, max: Infinity, pct: 0.03 }
    ];

    // ===== CODES D'AUTHENTIFICATION =====
    const CODES_VENDEURS = {
      "HASSENE":    "HASSENE1847",
      "JULIE TLR":  "JULIE3291",
      "AXEL":       "AXEL8903",
      "PAULINE":    "PAULINE5274",
      "RACHEL":     "RACHEL6138",
      "ILIAN":      "ILIAN4562",
      "ANAIS":      "ANAIS4721",
      "LUCAS":      "LUCAS7395",
      "LOUANE":     "LOUANE2648",
      "EMMY":       "EMMY9173",
      "CHLOE R":    "CHLOE8426",
      "WILL":       "WILL3857",
      "EMILIE":     "EMILIE6924",
      "NATHAN":     "NATHAN1583",
      "MEHDY":      "MEHDY7246",
      "ROMAIN GP":  "ROMAIN5831"
    };

    // ===== CACHE DES DONNEES =====
    let cachedSheetData = null;

    // ============================================================
    // LECTURE GOOGLE SHEETS (API publique gviz)
    // ============================================================

    /**
     * Charge un onglet du Google Sheet publie en JSON
     * Utilise l'API Google Visualization Query
     */
    function fetchSheet(sheetName) {
      return new Promise(function(resolve, reject) {
        var url = "https://docs.google.com/spreadsheets/d/" + SHEET_ID +
                  "/gviz/tq?tqx=out:json&sheet=" + encodeURIComponent(sheetName);

        fetch(url)
          .then(function(response) { return response.text(); })
          .then(function(text) {
            // La reponse est du JSONP : google.visualization.Query.setResponse({...})
            var jsonStr = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?/);
            if (!jsonStr || !jsonStr[1]) {
              reject(new Error("Format de reponse invalide pour l'onglet " + sheetName));
              return;
            }
            var json = JSON.parse(jsonStr[1]);
            if (json.status === "error") {
              reject(new Error("Erreur Google Sheets: " + (json.errors ? json.errors[0].detailed_message : "inconnu")));
              return;
            }
            // Convertir en tableau de lignes
            var rows = [];
            var table = json.table;
            for (var i = 0; i < table.rows.length; i++) {
              var row = [];
              for (var j = 0; j < table.cols.length; j++) {
                var cell = table.rows[i].c[j];
                row.push(cell ? (cell.v !== null && cell.v !== undefined ? cell.v : "") : "");
              }
              rows.push(row);
            }
            resolve(rows);
          })
          .catch(reject);
      });
    }

    /**
     * Charge toutes les donnees necessaires
     */
    async function loadAllData() {
      var results = await Promise.all([
        fetchSheet("Donn\u00e9es_Commissions"),
        fetchSheet("Items_Mois"),
        fetchSheet("Config"),
        fetchSheet("Mapping_Vendeurs")
      ]);
      return {
        donneesCommissions: results[0],
        itemsMois: results[1],
        config: results[2],
        mappingVendeurs: results[3]
      };
    }

    // ============================================================
    // AUTHENTIFICATION
    // ============================================================

    function verifierCode(codeEntre) {
      var codeSaisi = codeEntre.trim().toUpperCase();

      // D'abord chercher dans le mapping vendeurs (si charge)
      if (cachedSheetData && cachedSheetData.mappingVendeurs) {
        var mapping = cachedSheetData.mappingVendeurs;
        // Chercher la colonne "Code"
        // Les donnees du gviz n'incluent pas les en-tetes dans les rows si c'est la premiere ligne
        // On va chercher dans toutes les lignes
        for (var i = 0; i < mapping.length; i++) {
          for (var j = 0; j < mapping[i].length; j++) {
            if (mapping[i][j] && mapping[i][j].toString().toUpperCase().trim() === codeSaisi) {
              var nomMapping = mapping[i][0] ? mapping[i][0].toString().trim() : "";
              var nomComplet = trouverNomComplet(nomMapping);
              return { success: true, nom: nomComplet || capitaliserNom(nomMapping) };
            }
          }
        }
      }

      // Fallback : verifier dans les codes par defaut
      var noms = Object.keys(CODES_VENDEURS);
      for (var i = 0; i < noms.length; i++) {
        if (CODES_VENDEURS[noms[i]].toUpperCase() === codeSaisi) {
          var nomComplet = trouverNomComplet(noms[i]);
          return { success: true, nom: nomComplet || capitaliserNom(noms[i]) };
        }
      }

      return { success: false, message: "Code invalide. V\u00e9rifiez votre code personnel." };
    }

    function trouverNomComplet(nomMapping) {
      if (!cachedSheetData || !cachedSheetData.donneesCommissions) return null;
      var data = cachedSheetData.donneesCommissions;
      var nomUpper = nomMapping.toUpperCase().trim();

      for (var i = 0; i < data.length; i++) {
        if (data[i][1] && data[i][1].toString().toUpperCase().trim().indexOf(nomUpper) >= 0) {
          return data[i][1].toString().trim();
        }
      }
      // Essayer avec le prenom seul
      var prenom = nomUpper.split(' ')[0];
      for (var i = 0; i < data.length; i++) {
        if (data[i][1] && data[i][1].toString().toUpperCase().trim().indexOf(prenom) >= 0) {
          return data[i][1].toString().trim();
        }
      }
      return null;
    }

    function capitaliserNom(nom) {
      return nom.split(' ').map(function(w) {
        return w.charAt(0).toUpperCase() + w.slice(1).toLowerCase();
      }).join(' ');
    }

    // ============================================================
    // CALCULS DE COMMISSIONS
    // ============================================================

    function getCommissionsData(nomCollab) {
      var data = cachedSheetData.donneesCommissions;
      var collab = null;

      for (var i = 0; i < data.length; i++) {
        if (data[i][1] && data[i][1].toString().trim() === nomCollab) {
          collab = {
            codeBoutique: data[i][0] ? data[i][0].toString().trim() : "",
            nom: data[i][1].toString().trim(),
            role: data[i][2] ? data[i][2].toString().trim() : "Vendeur",
            margeRealisee: parseFloat(data[i][3]) || 0,
            nbMobiles: parseInt(data[i][4]) || 0,
            nbGaranties: parseInt(data[i][5]) || 0,
            nbCyber: parseInt(data[i][6]) || 0,
            nbAssurances: parseInt(data[i][7]) || 0,
            nbMobilesAssurance: parseInt(data[i][8]) || 0,
            caAccessoires: parseFloat(data[i][9]) || 0,
            jourOuvre: parseInt(data[i][10]) || 1,
            nbJoursOuvres: parseInt(data[i][11]) || 22,
            joursTravailles: parseInt(data[i][12]) || parseInt(data[i][11]) || 22
          };
          break;
        }
      }

      if (!collab) return { error: "Collaborateur non trouv\u00e9" };

      // Lire les items
      var itemsData = cachedSheetData.itemsMois;
      var items = [];
      for (var i = 0; i < itemsData.length; i++) {
        if (itemsData[i][0]) {
          items.push({
            nom: itemsData[i][0].toString().trim(),
            objectif: parseFloat(itemsData[i][1]) || 0,
            unite: itemsData[i][2] ? itemsData[i][2].toString().trim() : "",
            poids: itemsData[i][3] ? itemsData[i][3].toString().trim() : "20%"
          });
        }
      }

      // Lire config
      var configData = cachedSheetData.config;
      var moisEnCours = (configData[0] && configData[0][0]) ? configData[0][0].toString().trim() : "Avril 2026";
      var derniereMaj = (configData[0] && configData[0][1]) ? configData[0][1].toString().trim() : new Date().toLocaleString('fr-FR');

      return calculerCommissions(collab, items, moisEnCours, derniereMaj);
    }

    function calculerCommissions(collab, items, moisEnCours, derniereMaj) {
      if (collab.jourOuvre <= 0) collab.jourOuvre = 1;
      if (collab.nbJoursOuvres <= 0) collab.nbJoursOuvres = 22;
      if (!collab.joursTravailles || collab.joursTravailles <= 0) collab.joursTravailles = collab.nbJoursOuvres;

      var joursTravaillesEcoules = Math.min(collab.jourOuvre, collab.joursTravailles);
      var ratio = joursTravaillesEcoules / collab.joursTravailles;
      var coefProjection = collab.joursTravailles / joursTravaillesEcoules;

      var margeProjetee = collab.margeRealisee * coefProjection;
      var paliers = collab.role === "RPV" ? PALIERS_RPV : PALIERS_VENDEUR;
      var commissionRealisee = calculerCommissionMarge(collab.margeRealisee, paliers);
      var commissionProjetee = calculerCommissionMarge(margeProjetee, paliers);

      var prorata = collab.joursTravailles / collab.nbJoursOuvres;
      var itemsResultat = calculerItems(collab, items, coefProjection, prorata);
      var nbItemsAtteints = itemsResultat.filter(function(it) { return it.projectionAtteint; }).length;
      var tauxItems = items.length > 0 ? nbItemsAtteints / items.length : 1;

      var commissionModuleeRealisee = commissionRealisee * tauxItems;
      var commissionModuleeProjetee = commissionProjetee * tauxItems;
      var totalProjete = commissionModuleeProjetee;

      var palierActuel = trouverPalier(margeProjetee, paliers);
      var palierSuivant = trouverPalierSuivant(margeProjetee, paliers);

      return {
        collab: {
          nom: collab.nom,
          boutique: BOUTIQUES[collab.codeBoutique] || collab.codeBoutique,
          codeBoutique: collab.codeBoutique,
          role: collab.role
        },
        mois: moisEnCours,
        derniereMaj: derniereMaj,
        progression: {
          jourOuvre: collab.jourOuvre,
          nbJoursOuvres: collab.nbJoursOuvres,
          joursTravailles: collab.joursTravailles,
          joursTravaillesEcoules: joursTravaillesEcoules,
          ratio: ratio
        },
        marge: {
          realisee: Math.round(collab.margeRealisee),
          projetee: Math.round(margeProjetee),
          palierActuel: palierActuel,
          palierSuivant: palierSuivant,
          manquePourProchainPalier: palierSuivant ? Math.max(0, palierSuivant.min - margeProjetee) : 0
        },
        commission: {
          bruteRealisee: Math.round(commissionRealisee),
          bruteProjetee: Math.round(commissionProjetee),
          moduleeRealisee: Math.round(commissionModuleeRealisee),
          moduleeProjetee: Math.round(commissionModuleeProjetee),
          tauxItems: tauxItems,
          nbItemsAtteints: nbItemsAtteints,
          nbItemsTotal: items.length
        },
        items: itemsResultat,
        total: {
          projete: Math.round(totalProjete),
          detail: "Commission marge modul\u00e9e par items"
        }
      };
    }

    function calculerCommissionMarge(marge, paliers) {
      for (var i = paliers.length - 1; i >= 0; i--) {
        if (marge >= paliers[i].min) {
          return marge * paliers[i].pct;
        }
      }
      return 0;
    }

    function calculerItems(collab, items, coefProjection, prorata) {
      return items.map(function(item) {
        var realise, projete, objectif, objectifBase, pctAtteinte, projectionAtteint;

        switch (item.nom) {
          case "Mobiles":
            realise = collab.nbMobiles;
            projete = Math.round(realise * coefProjection);
            objectifBase = item.objectif;
            objectif = Math.round(objectifBase * prorata);
            pctAtteinte = objectif > 0 ? realise / objectif : 0;
            projectionAtteint = projete >= objectif;
            break;

          case "Garantie 3\u00e8me Ann\u00e9e":
            realise = collab.nbMobiles > 0 ? (collab.nbGaranties / collab.nbMobiles) * 100 : 0;
            var garantiesProj = collab.nbGaranties * coefProjection;
            var mobilesProj = collab.nbMobiles * coefProjection;
            projete = mobilesProj > 0 ? (garantiesProj / mobilesProj) * 100 : 0;
            objectifBase = item.objectif;
            objectif = item.objectif;
            pctAtteinte = objectif > 0 ? realise / objectif : 0;
            projectionAtteint = projete >= objectif;
            realise = Math.round(realise);
            projete = Math.round(projete);
            break;

          case "SFR Cyber":
            realise = collab.nbCyber;
            projete = Math.round(realise * coefProjection);
            objectifBase = item.objectif;
            objectif = Math.round(objectifBase * prorata);
            pctAtteinte = objectif > 0 ? realise / objectif : 0;
            projectionAtteint = projete >= objectif;
            break;

          case "Taux d'Assurance":
            realise = collab.nbMobilesAssurance > 0 ? (collab.nbAssurances / collab.nbMobilesAssurance) * 100 : 0;
            var assurProj = collab.nbAssurances * coefProjection;
            var mobAssurProj = collab.nbMobilesAssurance * coefProjection;
            projete = mobAssurProj > 0 ? (assurProj / mobAssurProj) * 100 : 0;
            objectifBase = item.objectif;
            objectif = item.objectif;
            pctAtteinte = objectif > 0 ? realise / objectif : 0;
            projectionAtteint = projete >= objectif;
            realise = Math.round(realise);
            projete = Math.round(projete);
            break;

          case "Taux d'Accessoire":
            realise = collab.nbMobiles > 0 ? collab.caAccessoires / collab.nbMobiles : 0;
            var caAccProj = collab.caAccessoires * coefProjection;
            var mobAccProj = collab.nbMobiles * coefProjection;
            projete = mobAccProj > 0 ? caAccProj / mobAccProj : 0;
            objectifBase = item.objectif;
            objectif = item.objectif;
            pctAtteinte = objectif > 0 ? realise / objectif : 0;
            projectionAtteint = projete >= objectif;
            realise = Math.round(realise);
            projete = Math.round(projete);
            break;

          default:
            realise = 0;
            projete = 0;
            objectifBase = item.objectif;
            objectif = item.objectif;
            pctAtteinte = 0;
            projectionAtteint = false;
        }

        return {
          nom: item.nom,
          realise: realise,
          projete: projete,
          objectif: objectif,
          objectifBase: objectifBase || objectif,
          unite: item.unite,
          poids: item.poids,
          pctAtteinte: Math.min(pctAtteinte, 1.5),
          projectionAtteint: projectionAtteint,
          statut: pctAtteinte >= 1 ? "atteint" : pctAtteinte >= 0.7 ? "en_cours" : "danger"
        };
      });
    }

    function trouverPalier(marge, paliers) {
      for (var i = paliers.length - 1; i >= 0; i--) {
        if (marge >= paliers[i].min) {
          return { min: paliers[i].min, max: paliers[i].max, pct: Math.round(paliers[i].pct * 100) };
        }
      }
      return paliers[0];
    }

    function trouverPalierSuivant(marge, paliers) {
      for (var i = 0; i < paliers.length; i++) {
        if (marge < paliers[i].max && marge >= paliers[i].min) {
          if (i + 1 < paliers.length) {
            return { min: paliers[i + 1].min, max: paliers[i + 1].max, pct: Math.round(paliers[i + 1].pct * 100) };
          }
          return null;
        }
      }
      return null;
    }

    // ============================================================
    // INTERFACE UTILISATEUR
    // ============================================================

    (function initApp() {
      document.getElementById('inputCode').addEventListener('keyup', function(e) {
        if (e.key === 'Enter') voirCommissions();
        document.getElementById('loginError').style.display = 'none';
      });
      document.getElementById('inputCode').focus();

      // Pre-charger les donnees du Sheet en arriere-plan
      loadAllData()
        .then(function(data) {
          cachedSheetData = data;
          console.log("Donnees chargees depuis Google Sheets");
        })
        .catch(function(err) {
          console.warn("Impossible de pre-charger les donnees:", err);
        });
    })();

    function voirCommissions() {
      var code = document.getElementById('inputCode').value.trim();
      if (!code) {
        afficherErreurLogin("Veuillez saisir votre code personnel");
        return;
      }

      document.getElementById('connectBtn').disabled = true;
      document.getElementById('connectBtn').textContent = 'V\u00c9RIFICATION...';
      document.getElementById('loginError').style.display = 'none';

      // Si les donnees ne sont pas encore chargees, les charger maintenant
      if (!cachedSheetData) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('loadingScreen').style.display = 'flex';

        loadAllData()
          .then(function(data) {
            cachedSheetData = data;
            traiterAuthentification(code);
          })
          .catch(function(err) {
            console.error("Erreur chargement:", err);
            afficherErreurLogin("Erreur de connexion au serveur. V\u00e9rifiez que le Google Sheet est publi\u00e9.");
            resetLoginBtn();
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('loadingScreen').style.display = 'none';
          });
      } else {
        traiterAuthentification(code);
      }
    }

    function traiterAuthentification(code) {
      var result = verifierCode(code);

      if (result.success) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('loadingScreen').style.display = 'flex';
        document.getEl('backBtn').classList.add('visible');

        // Petit delai pour l'animation
        setTimeout(function() {
          var data = getCommissionsData(result.nom);
          if (data.error) {
            afficherErreurLogin("Collaborateur non trouv\u00e9 dans les donn\u00e9es.");
            resetLoginBtn();
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('backBtn').classList.remove('visible');
          } else {
            afficherDashboard(data);
          }
        }, 300);
      } else {
        afficherErreurLogin(result.message);
        resetLoginBtn();
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('loadingScreen').style.display = 'none';
      }
    }

    function afficherErreurLogin(msg) {
      var el = document.getElementById('loginError');
      el.textContent = msg;
      el.style.display = 'block';
      var input = document.getElementById('inputCode');
      input.style.borderColor = '#dc3545';
      setTimeout(function() { input.style.borderColor = '#e0e0e0'; }, 1500);
    }

    function resetLoginBtn() {
      document.getElementById('connectBtn').disabled = false;
      document.getElementById('connectBtn').textContent = 'CONNEXION';
    }

    function afficherDashboard(data) {
      if (data.error) {
        alert("Erreur : " + data.error);
        retourLogin();
        return;
      }

      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('headerSubtitle').textContent =
        data.collab.nom + ' \u2022 ' + data.collab.boutique + ' \u2022 ' + data.mois;

      var dashboard = document.getElementById('dashboard');
      dashboard.style.display = 'block';
      dashboard.innerHTML = construireDashboardHTML(data);

      setTimeout(animerJauges, 100);
    }

    function construireDashboardHTML(data) {
      var c = data.commission;
      var m = data.marge;

      var html = '';

      // CARD 1 : COMMISSION PROJETEE
      var pctProgressionCommission = Math.min((data.total.projete / (data.total.projete * 1.3)) * 100, 100);

      html += '<div class="card">' +
        '<div class="card-title">' +
          '<span class="icon">\uD83D\uDCB0</span> Commission projet\u00e9e' +
        '</div>' +
        '<div style$iv style="text-align: center;">' +
          '<div class="commission-amount">' + data.total.projete + '\u20AC</div>' +
          '<div class="commission-label">Projection fin ' + data.mois.split(' ')[0] + '</div>' +
        '</div>' +
        '<div class="gauge-container">' +
          '<svg width="100" height="100" viewBox="0 0 200 200">' +
            '<circle class="gauge-circle gauge-bg" cx="100" cy="100" r="68"></circle>' +
            '<circle class="gauge-circle gauge-fill" cx="100" cy="100" r="68" data-percentage="' + pctProgressionCommission + '"></circle>' +
          '</svg>' +
          '<div class="gauge-text">' + Math.round(pctProgressionCommission) + '%</div>' +
        '</div>' +
        '<div class="commission-realise">' +
          'R\u00e9alis\u00e9 \u00e0 date : <span class="amount">' + data.commission.moduleeRealisee + '\u20AC</span>' +
          '<div style="font-size: 12px; color: #999; margin-top: 4px;">' +
            'Jour ' + data.progression.jourOuvre + ' / ' + (data.progression.joursTravailles || data.progression.nbJoursOuvres) + ' travaill\u00e9s' +
            (data.progression.joursTravailles && data.progression.joursTravailles < data.progression.nbJoursOuvres
              ? ' <span style="font-size: 11px; color: #bbb;">(sur ' + data.progression.nbJoursOuvres + ' ouvr\u00e9s)</span>'
              : '') +
          '</div>' +
        '</div>' +
      '</div>';

      // CARD 2 : MARGE
      html += '<div class="card">' +
        '<div class="card-title">' +
          '<span class="icon">\uD83D\uDCCA</span> Marge' +
        '</div>' +
        '<div class="marge-row">' +
          '<span class="marge-label">R\u00e9alis\u00e9e</span>' +
          '<span class="marge-value">' + m.realisee + '\u20AC</span>' +
        '</div>' +
        '<div class="marge-row">' +
          '<span class="marge-label">Projet\u00e9e fin de mois</span>' +
          '<span class="marge-value">' + m.projetee + '\u20AC</span>' +
        '</div>' +
        '<div class="marge-row">' +
          '<span class="marge-label">Palier actuel</span>' +
          '<span class="marge-value">' + m.palierActuel.pct + '%</span>' +
          '<span class="marge-detail">' + m.palierActuel.min + '\u20AC - ' + (m.palierActuel.max === Infinity ? '+' : m.palierActuel.max) + '\u20AC</span>' +
        '</div>';

      if (m.palierSuivant) {
        html += '<div class="palier-box">' +
          '<strong>Prochain palier :</strong> ' + m.palierSuivant.pct + '% \u00e0 partir de ' + m.palierSuivant.min + '\u20AC' +
          '<br><strong style="color: #666;">Il manque :</strong> ' + Math.round(m.manquePourProchainPalier) + '\u20AC' +
        '</div>';
      }

      html += '</div>';

      // CARD 3 : ITEMS DU MOIS
      html += '<div class="card">' +
        '<div class="card-title">' +
          '<span class="icon">\u2705</span> Items du mois' +
          '<span style="margin-left: auto; font-size: 13px; font-weight: 600;">' +
            c.nbItemsAtteints + '/' + c.nbItemsTotal + ' atteints' +
          '</span>' +
        '</div>';

      data.items.forEach(function(item) {
        var pctBar = Math.min((item.pctAtteinte / 1.5) * 100, 100);
        var isRatio = item.nom.indexOf('Taux') >= 0 || item.nom.indexOf('Garantie') >= 0;
        var labelRealise = isRatio ? item.realise + item.unite : item.realise + ' ' + item.unite;
        var labelObjectif = isRatio ? item.objectif + item.unite : item.objectif + ' ' + item.unite;
        var labelProjete = isRatio ? item.projete + item.unite : item.projete + ' ' + item.unite;
        var isProratise = item.objectifBase && item.objectifBase !== item.objectif;

        html += '<div class="item-row">' +
          '<div class="item-header">' +
            '<span class="item-name">' + item.nom + '</span>' +
            '<span class="badge ' + item.statut + '">' +
              (item.statut === 'atteint' ? '\u2713 Atteint' : item.statut === 'en_cours' ? '\u25D0 En cours' : '\u2717 Danger') +
            '</span>' +
          '</div>' +
          '<div class="item-values">' +
            '<span class="item-value">R\u00e9alis\u00e9: <strong>' + labelRealise + '</strong></span>' +
            '<span class="item-value">/ <strong>' + labelObjectif + '</strong>' +
              (isProratise ? '<span style="font-size: 11px; color: #bbb; text-decoration: line-through; margin-left: 4px;">' + item.objectifBase + '</span>' : '') +
            '</span>' +
          '</div>' +
          '<div class="progress-bar">' +
            '<div class="progress-fill ' + item.statut + '" data-width="' + pctBar + '"></div>' +
          '</div>' +
          '<div class="progress-subtext">' +
            'En projection: <strong>' + labelProjete + '</strong> ' +
            (item.projectionAtteint
              ? '<span class="badge projection">\u2713 Atteint en fin de mois</span>'
              : '<span class="badge projection" style="background: #fff3cd; color: #856404;">\u26A0 Non atteint en projection</span>') +
          '</div>' +
        '</div>';
      });

      html += '</div>';

      // FOOTER
      html += '<div class="footer">' +
        'Derni\u00e8re mise \u00e0 jour : ' + data.derniereMaj +
        '<br><span style="font-size: 11px; color: #bbb;">v2.0 - Groupe Garcia - GitHub Pages</span>' +
      '</div>';

      return html;
    }

    function animerJauges() {
      document.querySelectorAll('.gauge-fill').forEach(function(circle) {
        var pct = parseFloat(circle.dataset.percentage) || 0;
        var circumference = 2 * Math.PI * 68;
        var offset = circumference - (pct / 100) * circumference;
        circle.style.strokeDashoffset = offset;
      });

      document.querySelectorAll('.progress-fill').forEach(function(bar) {
        var width = bar.dataset.width || '0';
        bar.style.width = width + '%';
      });
    }

    function retourLogin() {
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('backBtn').classList.remove('visible');
      document.getElementById('headerSubtitle').textContent = 'Groupe Garcia - Boutiques SFR';
      document.getElementById('inputCode').value = '';
      document.getElementById('loginError').style.display = 'none';
      resetLoginBtn();
      document.getElementById('inputCode').focus();
    }
  </script>
