<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mes Commissions - Groupe Garcia</title>
  <style>
    /* ===== RESET ===== */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a1a;
      min-height: 100vh;
      padding-bottom: 100px;
    }

    /* ===== HEADER STICKY ===== */
    .header {
      background: linear-gradient(135deg, #e60000, #b30000);
      color: white;
      padding: 24px 20px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 15px rgba(230, 0, 0, 0.3);
    }

    .header h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin: 0;
    }

    .header p {
      font-size: 13px;
      opacity: 0.85;
      margin-top: 6px;
    }

    /* ===== CONTAINER ===== */
    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 16px;
    }

    /* ===== CARD ===== */
    .card {
      background: white;
      border-radius: 16px;
      padding: 24px 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border: 1px solid #e8e8e8;
      animation: fadeInUp 0.4s ease-out forwards;
    }

    .card:nth-child(2) { animation-delay: 0.05s; }
    .card:nth-child(3) { animation-delay: 0.1s; }
    .card:nth-child(4) { animation-delay: 0.15s; }
    .card:nth-child(5) { animation-delay: 0.2s; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== CARD TITLES ===== */
    .card-title {
      font-size: 15px;
      font-weight: 700;
      color: #e60000;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title .icon {
      font-size: 18px;
    }

    /* ===== COMMISSION CARD (MAIN) ===== */
    .commission-amount {
      font-size: 52px;
      font-weight: 800;
      color: #e60000;
      text-align: center;
      line-height: 1;
      margin: 20px 0;
    }

    .commission-label {
      text-align: center;
      color: #888;
      font-size: 13px;
      margin-top: 4px;
      letter-spacing: 0.5px;
    }

    .commission-realise {
      text-align: center;
      color: #666;
      font-size: 14px;
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #f0f0f0;
    }

    .commission-realise .amount {
      color: #e60000;
      font-weight: 700;
      font-size: 18px;
    }

    /* ===== JAUGE CIRCULAIRE ===== */
    .gauge-container {
      position: relative;
      width: 160px;
      height: 160px;
      margin: 16px auto 0;
    }

    .gauge-container svg {
      transform: rotate(-90deg);
      width: 100%;
      height: 100%;
    }

    .gauge-circle {
      fill: none;
      stroke-width: 8;
      stroke-linecap: round;
    }

    .gauge-bg {
      stroke: #e8e8e8;
    }

    .gauge-fill {
      stroke: #e60000;
      stroke-dasharray: 427;
      stroke-dashoffset: 427;
      transition: stroke-dashoffset 1.5s ease-out;
    }

    .gauge-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      font-weight: 700;
      color: #e60000;
      font-size: 16px;
    }

    /* ===== MARGE CARD ===== */
    .marge-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #f0f0f0;
    }

    .marge-row:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }

    .marge-label {
      font-size: 13px;
      color: #666;
      flex: 1;
    }

    .marge-value {
      font-size: 16px;
      font-weight: 700;
      color: #e60000;
      text-align: right;
      min-width: 80px;
    }

    .marge-detail {
      font-size: 12px;
      color: #999;
      text-align: right;
    }

    .palier-box {
      background: #f9f9f9;
      border-left: 4px solid #e60000;
      padding: 12px 14px;
      border-radius: 0 8px 8px 0;
      margin-top: 12px;
      font-size: 13px;
      line-height: 1.6;
    }

    .palier-box strong {
      color: #e60000;
      font-weight: 700;
    }

    /* ===== ITEMS CARD ===== */
    .item-row {
      padding: 16px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .item-row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .item-name {
      font-weight: 600;
      font-size: 14px;
      color: #1a1a1a;
    }

    .item-values {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .item-value {
      font-size: 13px;
      color: #666;
    }

    .item-value strong {
      color: #e60000;
      font-weight: 700;
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }

    .badge.atteint {
      background: #d4edda;
      color: #155724;
    }

    .badge.en_cours {
      background: #fff3cd;
      color: #856404;
    }

    .badge.danger {
      background: #f8d7da;
      color: #721c24;
    }

    .badge.projection {
      background: #e3f2fd;
      color: #1565c0;
      font-size: 10px;
      margin-top: 4px;
    }

    /* ===== BARRE DE PROGRESSION ===== */
    .progress-bar {
      height: 8px;
      background: #e8e8e8;
      border-radius: 4px;
      overflow: hidden;
      margin-top: 6px;
    }

    .progress-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      width: 0;
    }

    .progress-fill.atteint {
      background: linear-gradient(90deg, #28a745, #20c997);
    }

    .progress-fill.en_cours {
      background: linear-gradient(90deg, #fd7e14, #ffc107);
    }

    .progress-fill.danger {
      background: linear-gradient(90deg, #dc3545, #e74c3c);
    }

    .progress-subtext {
      font-size: 12px;
      color: #999;
      margin-top: 4px;
      text-align: right;
    }

    /* ===== FOOTER ===== */
    .footer {
      text-align: center;
      padding: 20px;
      color: #999;
      font-size: 12px;
      background: #f9f9f9;
      border-radius: 12px;
      margin-top: 8px;
    }

    /* ===== LOGIN SCREEN ===== */
    .login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 120px);
      padding: 20px;
    }

    .login-card {
      background: white;
      border-radius: 16px;
      padding: 40px 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
      width: 100%;
      max-width: 400px;
    }

    .login-card h2 {
      color: #1a1a1a;
      margin-bottom: 24px;
      font-size: 20px;
    }

    .login-select {
      width: 100%;
      padding: 16px;
      border: 2px solid #e0e0e0;
      border-radius: 14px;
      font-size: 16px;
      background: #fafafa;
      margin-bottom: 20px;
      -webkit-appearance: none;
      appearance: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .login-select:focus {
      outline: none;
      border-color: #e60000;
      background: white;
      box-shadow: 0 0 0 3px rgba(230, 0, 0, 0.1);
    }

    .login-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #e60000, #b30000);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .login-btn:active {
      transform: scale(0.98);
    }

    .login-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    /* ===== LOADING SPINNER ===== */
    .loading-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 120px);
      gap: 20px;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #e8e8e8;
      border-top-color: #e60000;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      color: #666;
      font-size: 14px;
    }

    /* ===== BOUTON RETOUR ===== */
    .back-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #e60000, #b30000);
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(230, 0, 0, 0.3);
      display: none;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      z-index: 99;
    }

    .back-btn:active {
      transform: scale(0.9);
    }

    .back-btn.visible {
      display: flex;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      .header {
        padding: 20px 16px;
      }

      .header h1 {
        font-size: 18px;
      }

      .container {
        padding: 12px;
      }

      .card {
        padding: 20px 16px;
        margin-bottom: 12px;
      }

      .commission-amount {
        font-size: 44px;
      }

      .gauge-container {
        width: 140px;
        height: 140px;
      }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>MES COMMISSIONS</h1>
    <p id="headerSubtitle">Groupe Garcia - Boutiques SFR</p>
  </div>

  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <h2>Connexion</h2>
      <p style="color: #666; font-size: 14px; margin-bottom: 20px;">Entrez votre code personnel</p>
      <input type="text" id="inputCode" class="login-select" placeholder="Votre code personnel" autocomplete="off" autocapitalize="characters" style="text-transform: uppercase; text-align: center; font-weight: 600; font-size: 20px; letter-spacing: 2px;">
      <div id="loginError" style="color: #dc3545; font-size: 13px; margin-bottom: 12px; display: none;"></div>
      <button class="login-btn" id="connectBtn" onclick="voirCommissions()">CONNEXION</button>
    </div>
  </div>

  <div id="dashboard" class="container" style="display:none;"></div>

  <div id="loadingScreen" class="loading-screen">
    <div class="spinner"></div>
    <p class="loading-text">Chargement en cours...</p>
  </div>

  <button class="back-btn" id="backBtn" onclick="retourLogin()" title="Changer de collaborateur">&#x2190;</button>

  <script>
    const SHEET_ID = '1su6J88rzRF9hnZXwOsD8gkSDQpDl_XI1Ifjcoost6rY';

    const CODES_VENDEURS = {
      "HASSENE": "HASSENE1847",
      "JULIE TLR": "JULIE3291",
      "AXEL": "AXEL8903",
      "PAULINE": "PAULINE5274",
      "RACHEL": "RACHEL6138",
      "ILIAN": "ILIAN4562",
      "ANAIS": "ANAIS8356",
      "LUCAS": "LUCAS7395",
      "LOUANE": "LOUANE2648",
      "EMMY": "EMMY9173",
      "CHLOE R": "CHLOE8426",
      "WILL": "WILL3857",
      "EMILIE": "EMILIE6924",
      "NATHAN": "NATHAN1583",
      "MEHDY": "MEHDY7246",
      "ROMAIN GP": "ROMAIN5831",
      "VICTOR": "VICTOR6247",
      "HAVAL": "HAVAL3918"
    };

    const BOUTIQUES = {
      "ALR": "SFR Angers",
      "TLR": "SFR Amboise",
      "CLR": "SFR Châteaudun",
      "CHOLET": "SFR Cholet",
      "RLR": "SFR Romorantin",
      "VLR": "SFR Vendôme"
    };

    const PALIERS_VENDEUR = [
      { min: 0, max: 2000, pct: 0 },
      { min: 2000, max: 3000, pct: 0.02 },
      { min: 3000, max: 4000, pct: 0.03 },
      { min: 4000, max: 5000, pct: 0.05 },
      { min: 5000, max: 6000, pct: 0.06 },
      { min: 6000, max: 7000, pct: 0.07 },
      { min: 7000, max: 8000, pct: 0.08 },
      { min: 8000, max: 9000, pct: 0.09 },
      { min: 9000, max: Infinity, pct: 0.10 }
    ];

    const PALIERS_RPV = [
      { min: 0, max: 18000, pct: 0 },
      { min: 18000, max: 20000, pct: 0.01 },
      { min: 20000, max: 22000, pct: 0.012 },
      { min: 22000, max: 23000, pct: 0.024 },
      { min: 23000, max: 24000, pct: 0.026 },
      { min: 24000, max: 26000, pct: 0.028 },
      { min: 26000, max: Infinity, pct: 0.03 }
    ];

    (function initApp() {
      document.getElementById('inputCode').addEventListener('keyup', function(e) {
        if (e.key === 'Enter') voirCommissions();
        document.getElementById('loginError').style.display = 'none';
      });
      document.getElementById('inputCode').focus();
    })();

    var _jsonpCounter = 0;
    function fetchSheetData(sheetName) {
      return new Promise(function(resolve, reject) {
        var callbackName = '_sheetCallback_' + (++_jsonpCounter) + '_' + Date.now();
        var timeout = setTimeout(function() {
          delete window[callbackName];
          var s = document.getElementById(callbackName);
          if (s) s.remove();
          reject(new Error('Timeout: La feuille Google n\'a pas répondu après 15 secondes. Vérifiez que la feuille est publiée sur le web (Fichier > Partager > Publier sur le Web).'));
        }, 15000);

        window[callbackName] = function(response) {
          clearTimeout(timeout);
          delete window[callbackName];
          var s = document.getElementById(callbackName);
          if (s) s.remove();
          if (response.status && response.status !== 'ok') {
            reject(new Error('Erreur Google Sheets: ' + (response.message || 'Feuille non trouvée')));
          } else {
            resolve(response);
          }
        };

        // Utiliser google.visualization.Query.setResponse comme callback JSONP
        var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID
          + '/gviz/tq?tqx=responseHandler:' + callbackName
          + '&sheet=' + encodeURIComponent(sheetName);

        var script = document.createElement('script');
        script.id = callbackName;
        script.src = url;
        script.onerror = function() {
          clearTimeout(timeout);
          delete window[callbackName];
          script.remove();
          reject(new Error('Erreur réseau: impossible de charger les données. Vérifiez que la feuille est publiée sur le web.'));
        };
        document.head.appendChild(script);
      });
    }

    // Mapping des noms de colonnes Google Sheet vers noms courts du code
    var COL_MAP = {
      'Code boutique': 'codeBoutique',
      'Nom collaborateur': 'nom',
      'Rôle': 'role',
      'Marge réalisée (€)': 'margeRealisee',
      'Nb mobiles vendus': 'nbMobiles',
      'Nb garanties 3ème année': 'nbGaranties',
      'Nb SFR Cyber vendus': 'nbCyber',
      'Nb assurances vendues': 'nbAssurances',
      'Nb mobiles pour taux assurance': 'nbMobilesAssurance',
      'CA accessoires total (€)': 'caAccessoires',
      'Jour ouvré courant': 'jourOuvre',
      'Nb jours ouvrés total': 'nbJoursOuvres',
      'Jours travaillés (individuel)': 'joursTravailles',
      "Nom de l'item": 'nomItem',
      'Objectif': 'objectif',
      'Unité': 'unite',
      'Poids (% rému)': 'poids',
      'Mois en cours': 'moisEnCours',
      'Dernière MAJ': 'derniereMaj'
    };

    function parseSheetRows(response) {
      var rows = [];
      if (!response.table || !response.table.rows) return rows;
      response.table.rows.forEach(function(row) {
        var obj = {};
        response.table.cols.forEach(function(col, idx) {
          var val = row.c[idx];
          var key = COL_MAP[col.label] || col.label;
          var v = val ? val.v : null;
          // Convertir les dates Google en string lisible
          if (v && typeof v === 'string' && v.indexOf('Date(') === 0) {
            var parts = v.replace('Date(', '').replace(')', '').split(',');
            var d = new Date(parseInt(parts[0]), parseInt(parts[1]), parseInt(parts[2] || 1));
            var moisNoms = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
            if (key === 'derniereMaj') {
              v = d.toLocaleDateString('fr-FR');
            } else {
              v = moisNoms[d.getMonth()] + ' ' + d.getFullYear();
            }
          }
          obj[key] = v;
        });
        rows.push(obj);
      });
      return rows;
    }

    function voirCommissions() {
      const code = document.getElementById('inputCode').value.trim().toUpperCase();
      if (!code) {
        afficherErreurLogin("Veuillez saisir votre code personnel");
        return;
      }

      let vendeurNom = null;
      for (let nom in CODES_VENDEURS) {
        if (CODES_VENDEURS[nom].toUpperCase() === code) {
          vendeurNom = nom;
          break;
        }
      }

      if (!vendeurNom) {
        afficherErreurLogin("Code invalide. Veuillez réessayer.");
        return;
      }

      document.getElementById('connectBtn').disabled = true;
      document.getElementById('connectBtn').textContent = 'CHARGEMENT...';
      document.getElementById('loginError').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('loadingScreen').style.display = 'flex';
      document.getElementById('backBtn').classList.add('visible');

      chargerCommissionsData(vendeurNom);
    }

    function chargerCommissionsData(vendeurNom) {
      Promise.all([
        fetchSheetData('Données_Commissions'),
        fetchSheetData('Items_Mois'),
        fetchSheetData('Config')
      ])
        .then(function(responses) {
          const donnees = parseSheetRows(responses[0]);
          const itemsMois = parseSheetRows(responses[1]);
          const config = parseSheetRows(responses[2]);

          const vendeurRow = donnees.find(function(row) {
            return row.nom && row.nom.toUpperCase().includes(vendeurNom.toUpperCase());
          });

          if (!vendeurRow) {
            afficherErreurCalcul("Vendeur non trouvé dans la base de données");
            return;
          }

          const moisEnCours = config[0] ? config[0]['moisEnCours'] : 'Avril 2026';
          const derniereMaj = config[0] ? config[0]['derniereMaj'] : new Date().toLocaleDateString('fr-FR');

          const result = calculerCommissions(vendeurRow, itemsMois, moisEnCours, derniereMaj);
          afficherDashboard(result);
        })
        .catch(function(error) {
          console.error('Erreur:', error);
          afficherErreurCalcul(error.message || 'Erreur de chargement des données');
        });
    }

    function calculerCommissions(vendeurRow, itemsMois, moisEnCours, derniereMaj) {
      const nom = vendeurRow.nom || 'Inconnu';
      const role = vendeurRow.role || 'Vendeur';
      const codeBoutique = vendeurRow.codeBoutique || '';
      const boutique = BOUTIQUES[codeBoutique] || codeBoutique;

      const margeRealisee = parseFloat(vendeurRow.margeRealisee) || 0;
      const nbMobiles = parseFloat(vendeurRow.nbMobiles) || 0;
      const nbGaranties = parseFloat(vendeurRow.nbGaranties) || 0;
      const nbCyber = parseFloat(vendeurRow.nbCyber) || 0;
      const nbAssurances = parseFloat(vendeurRow.nbAssurances) || 0;
      const nbMobilesAssurance = parseFloat(vendeurRow.nbMobilesAssurance) || 0;
      const caAccessoires = parseFloat(vendeurRow.caAccessoires) || 0;
      const jourOuvre = parseFloat(vendeurRow.jourOuvre) || 0;
      const nbJoursOuvres = parseFloat(vendeurRow.nbJoursOuvres) || 0;
      const joursTravailles = parseFloat(vendeurRow.joursTravailles) || nbJoursOuvres;

      const paliers = role === 'RPV' ? PALIERS_RPV : PALIERS_VENDEUR;
      const joursTravaillesEcoules = Math.min(jourOuvre, joursTravailles);
      const coefProjection = joursTravailles > 0 ? joursTravailles / joursTravaillesEcoules : 1;
      const margeProjetee = Math.round(margeRealisee * coefProjection);
      const commissionRealisee = calculerCommissionMarge(margeRealisee, paliers);
      const commissionProjetee = calculerCommissionMarge(margeProjetee, paliers);
      const prorata = joursTravailles > 0 ? joursTravailles / nbJoursOuvres : 1;

      const items = [];
      const nbItemsTotal = 5;
      let nbItemsAtteints = 0;

      const mobiles = {
        nom: 'Mobiles',
        realise: Math.round(nbMobiles),
        unite: '',
        objectifBase: Math.round(itemsMois[0] ? parseFloat(itemsMois[0].objectif) || 0 : 0),
        poids: itemsMois[0] ? parseFloat(itemsMois[0].poids) || 0 : 0
      };
      mobiles.objectif = Math.round(mobiles.objectifBase * prorata);
      mobiles.projete = Math.round(mobiles.realise * coefProjection);
      mobiles.pctAtteinte = mobiles.objectif > 0 ? (mobiles.realise / mobiles.objectif) * 100 : 0;
      mobiles.statut = mobiles.pctAtteinte >= 100 ? 'atteint' : mobiles.pctAtteinte >= 75 ? 'en_cours' : 'danger';
      mobiles.projectionAtteint = mobiles.projete >= mobiles.objectif;
      if (mobiles.statut === 'atteint') nbItemsAtteints++;
      items.push(mobiles);

      const garantie = {
        nom: 'Garantie 3ème Année',
        realise: nbMobiles > 0 ? Math.round((nbGaranties / nbMobiles) * 100) : 0,
        unite: '%',
        objectif: Math.round(itemsMois[1] ? parseFloat(itemsMois[1].objectif) || 0 : 0),
        objectifBase: Math.round(itemsMois[1] ? parseFloat(itemsMois[1].objectif) || 0 : 0),
        poids: itemsMois[1] ? parseFloat(itemsMois[1].poids) || 0 : 0
      };
      garantie.projete = garantie.realise;
      garantie.pctAtteinte = garantie.objectif > 0 ? (garantie.realise / garantie.objectif) * 100 : 0;
      garantie.statut = garantie.pctAtteinte >= 100 ? 'atteint' : garantie.pctAtteinte >= 75 ? 'en_cours' : 'danger';
      garantie.projectionAtteint = garantie.projete >= garantie.objectif;
      if (garantie.statut === 'atteint') nbItemsAtteints++;
      items.push(garantie);

      const cyber = {
        nom: 'SFR Cyber',
        realise: Math.round(nbCyber),
        unite: '',
        objectifBase: Math.round(itemsMois[2] ? parseFloat(itemsMois[2].objectif) || 0 : 0),
        poids: itemsMois[2] ? parseFloat(itemsMois[2].poids) || 0 : 0
      };
      cyber.objectif = Math.round(cyber.objectifBase * prorata);
      cyber.projete = Math.round(cyber.realise * coefProjection);
      cyber.pctAtteinte = cyber.objectif > 0 ? (cyber.realise / cyber.objectif) * 100 : 0;
      cyber.statut = cyber.pctAtteinte >= 100 ? 'atteint' : cyber.pctAtteinte >= 75 ? 'en_cours' : 'danger';
      cyber.projectionAtteint = cyber.projete >= cyber.objectif;
      if (cyber.statut === 'atteint') nbItemsAtteints++;
      items.push(cyber);

      const assurance = {
        nom: 'Taux d\'Assurance',
        realise: nbMobilesAssurance > 0 ? Math.round((nbAssurances / nbMobilesAssurance) * 100) : 0,
        unite: '%',
        objectif: Math.round(itemsMois[3] ? parseFloat(itemsMois[3].objectif) || 0 : 0),
        objectifBase: Math.round(itemsMois[3] ? parseFloat(itemsMois[3].objectif) || 0 : 0),
        poids: itemsMois[3] ? parseFloat(itemsMois[3].poids) || 0 : 0
      };
      assurance.projete = assurance.realise;
      assurance.pctAtteinte = assurance.objectif > 0 ? (assurance.realise / assurance.objectif) * 100 : 0;
      assurance.statut = assurance.pctAtteinte >= 100 ? 'atteint' : assurance.pctAtteinte >= 75 ? 'en_cours' : 'danger';
      assurance.projectionAtteint = assurance.projete >= assurance.objectif;
      if (assurance.statut === 'atteint') nbItemsAtteints++;
      items.push(assurance);

      const accessoire = {
        nom: 'Taux d\'Accessoire',
        realise: nbMobiles > 0 ? parseFloat((caAccessoires / nbMobiles).toFixed(2)) : 0,
        unite: '€',
        objectif: parseFloat((itemsMois[4] ? parseFloat(itemsMois[4].objectif) || 0 : 0).toFixed(2)),
        objectifBase: parseFloat((itemsMois[4] ? parseFloat(itemsMois[4].objectif) || 0 : 0).toFixed(2)),
        poids: itemsMois[4] ? parseFloat(itemsMois[4].poids) || 0 : 0
      };
      accessoire.projete = accessoire.realise;
      accessoire.pctAtteinte = accessoire.objectif > 0 ? (accessoire.realise / accessoire.objectif) * 100 : 0;
      accessoire.statut = accessoire.pctAtteinte >= 100 ? 'atteint' : accessoire.pctAtteinte >= 75 ? 'en_cours' : 'danger';
      accessoire.projectionAtteint = accessoire.projete >= accessoire.objectif;
      if (accessoire.statut === 'atteint') nbItemsAtteints++;
      items.push(accessoire);

      const commissionModulee = Math.round(commissionProjetee * (nbItemsAtteints / nbItemsTotal));
      const palierActuel = trouverPalier(margeRealisee, paliers);
      const palierSuivant = trouverPalierSuivant(margeRealisee, paliers);
      const manquePourProchainPalier = palierSuivant ? Math.max(0, palierSuivant.min - margeRealisee) : 0;

      return {
        collab: { nom: nom, boutique: boutique, role: role },
        mois: moisEnCours,
        derniereMaj: derniereMaj,
        marge: {
          realisee: Math.round(margeRealisee),
          projetee: Math.round(margeProjetee),
          palierActuel: { min: palierActuel.min, max: palierActuel.max, pct: (palierActuel.pct * 100) + '%' },
          palierSuivant: palierSuivant ? { min: palierSuivant.min, max: palierSuivant.max, pct: (palierSuivant.pct * 100) + '%' } : null,
          manquePourProchainPalier: Math.round(manquePourProchainPalier)
        },
        commission: {
          realisee: Math.round(commissionRealisee),
          moduleeRealisee: Math.round(commissionRealisee),
          projete: Math.round(commissionModulee),
          nbItemsAtteints: nbItemsAtteints,
          nbItemsTotal: nbItemsTotal
        },
        total: {
          projete: Math.round(commissionModulee)
        },
        progression: {
          jourOuvre: Math.round(jourOuvre),
          joursTravailles: Math.round(joursTravailles),
          nbJoursOuvres: Math.round(nbJoursOuvres)
        },
        items: items
      };
    }

    function trouverPalier(marge, paliers) {
      for (let i = paliers.length - 1; i >= 0; i--) {
        if (marge >= paliers[i].min) {
          return paliers[i];
        }
      }
      return paliers[0];
    }

    function trouverPalierSuivant(marge, paliers) {
      for (let i = 0; i < paliers.length; i++) {
        if (marge < paliers[i].min) {
          return paliers[i];
        }
      }
      return null;
    }

    function calculerCommissionMarge(marge, paliers) {
      const palier = trouverPalier(marge, paliers);
      return marge * palier.pct;
    }

    function afficherDashboard(data) {
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('headerSubtitle').textContent =
        data.collab.nom + ' • ' + data.collab.boutique + ' • ' + data.mois;

      const dashboard = document.getElementById('dashboard');
      dashboard.style.display = 'block';
      dashboard.innerHTML = construireDashboardHTML(data);

      setTimeout(animerJauges, 100);
    }

    function construireDashboardHTML(data) {
      const c = data.commission;
      const m = data.marge;
      let html = '';

      const pctProgressionCommission = Math.min((data.total.projete / (data.total.projete * 1.3)) * 100, 100);
      const circumference = 2 * Math.PI * 68;

      html += `<div class="card"><div class="card-title"><span class="icon">💰</span> Commission projetée</div><div style="text-align: center;"><div class="commission-amount">${data.total.projete}€</div><div class="commission-label">Projection fin ${data.mois.split(' ')[0]}</div></div><div class="gauge-container"><svg width="100" height="100" viewBox="0 0 200 200"><circle class="gauge-circle gauge-bg" cx="100" cy="100" r="68"></circle><circle class="gauge-circle gauge-fill" cx="100" cy="100" r="68" data-percentage="${pctProgressionCommission}"></circle></svg><div class="gauge-text">${Math.round(pctProgressionCommission)}%</div></div><div class="commission-realise">Réalisé à date : <span class="amount">${c.moduleeRealisee}€</span><div style="font-size: 12px; color: #999; margin-top: 4px;">Jour ${data.progression.jourOuvre} / ${data.progression.joursTravailles || data.progression.nbJoursOuvres} travaillés${data.progression.joursTravailles && data.progression.joursTravailles < data.progression.nbJoursOuvres ? '<span style="font-size: 11px; color: #bbb;"> (sur ' + data.progression.nbJoursOuvres + ' ouvrés)</span>' : ''}</div></div></div>`;

      html += `<div class="card"><div class="card-title"><span class="icon">📊</span> Marge</div><div class="marge-row"><span class="marge-label">Réalisée</span><span class="marge-value">${m.realisee}€</span></div><div class="marge-row"><span class="marge-label">Projetée fin de mois</span><span class="marge-value">${m.projetee}€</span></div><div class="marge-row"><span class="marge-label">Palier actuel</span><span class="marge-value">${m.palierActuel.pct}</span><span class="marge-detail">${m.palierActuel.min}€ - ${m.palierActuel.max === Infinity ? '+' : m.palierActuel.max}€</span></div>${m.palierSuivant ? `<div class="palier-box"><strong>Prochain palier :</strong> ${m.palierSuivant.pct} à partir de ${m.palierSuivant.min}€<br><strong style="color: #666;">Il manque :</strong> ${m.manquePourProchainPalier}€</div>` : ''}</div>`;

      html += `<div class="card"><div class="card-title"><span class="icon">✅</span> Items du mois<span style="margin-left: auto; font-size: 13px; font-weight: 600;">${c.nbItemsAtteints}/${c.nbItemsTotal} atteints</span></div>`;

      data.items.forEach(function(item) {
        const pctBar = Math.min((item.pctAtteinte / 1.5) * 100, 100);
        const isRatio = item.nom.includes('Taux') || item.nom.includes('Garantie');
        const labelRealise = isRatio ? item.realise + item.unite : item.realise + ' ' + item.unite;
        const labelObjectif = isRatio ? item.objectif + item.unite : item.objectif + ' ' + item.unite;
        const labelProjete = isRatio ? item.projete + item.unite : item.projete + ' ' + item.unite;
        const isProratise = item.objectifBase && item.objectifBase !== item.objectif;

        html += `<div class="item-row"><div class="item-header"><span class="item-name">${item.nom}</span><span class="badge ${item.statut}">${item.statut === 'atteint' ? '✓ Atteint' : item.statut === 'en_cours' ? '◐ En cours' : '✗ Danger'}</span></div><div class="item-values"><span class="item-value">Réalisé: <strong>${labelRealise}</strong></span><span class="item-value">/ <strong>${labelObjectif}</strong>${isProratise ? '<span style="font-size: 11px; color: #bbb; text-decoration: line-through; margin-left: 4px;">' + item.objectifBase + '</span>' : ''}</span></div><div class="progress-bar"><div class="progress-fill ${item.statut}" data-width="${pctBar}"></div></div><div class="progress-subtext">En projection: <strong>${labelProjete}</strong>${item.projectionAtteint ? '<span class="badge projection">✓ Atteint en fin de mois</span>' : '<span class="badge projection" style="background: #fff3cd; color: #856404;">⚠ Non atteint en projection</span>'}</div></div>`;
      });

      html += `</div>`;
      html += `<div class="footer">Dernière mise à jour : ${data.derniereMaj}<br><span style="font-size: 11px; color: #bbb;">v2.0 Standalone - Groupe Garcia</span></div>`;

      return html;
    }

    function animerJauges() {
      document.querySelectorAll('.gauge-fill').forEach(function(circle) {
        const pct = parseFloat(circle.dataset.percentage) || 0;
        const circumference = 2 * Math.PI * 68;
        const offset = circumference - (pct / 100) * circumference;
        circle.style.strokeDashoffset = offset;
      });

      document.querySelectorAll('.progress-fill').forEach(function(bar) {
        const width = bar.dataset.width || '0';
        bar.style.width = width + '%';
      });
    }

    function afficherErreurLogin(msg) {
      const el = document.getElementById('loginError');
      el.textContent = msg;
      el.style.display = 'block';
      const input = document.getElementById('inputCode');
      input.style.borderColor = '#dc3545';
      setTimeout(function() { input.style.borderColor = '#e0e0e0'; }, 1500);
    }

    function afficherErreurCalcul(msg) {
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('backBtn').classList.remove('visible');
      afficherErreurLogin(msg);
      resetLoginBtn();
    }

    function resetLoginBtn() {
      document.getElementById('connectBtn').disabled = false;
      document.getElementById('connectBtn').textContent = 'CONNEXION';
    }

    function retourLogin() {
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('backBtn').classList.remove('visible');
      document.getElementById('headerSubtitle').textContent = 'Groupe Garcia - Boutiques SFR';
      document.getElementById('inputCode').value = '';
      document.getElementById('loginError').style.display = 'none';
      resetLoginBtn();
      document.getElementById('inputCode').focus();
    }
  </script>

</body>
</html>
