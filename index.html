<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Mes Commissions · SFR</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --sfr:#E2001A;--sfr2:#FF1A2E;--sfr-dark:#A8001A;
  --pro:#0F0F1E;--pro2:#1A1A30;--pro3:#252548;
  --white:#FFFFFF;--off:#F4F4F6;--border:#E4E4EA;
  --text:#0F0F1E;--muted:#666;--light:#AAA;
  --green:#00A651;--green-bg:#E6F7EE;--green-dark:#006633;
  --orange:#F5A623;--orange-bg:#FFF4E0;--orange-dark:#B87A00;
  --blue:#1565C0;--blue-bg:#E3F2FD;
  --safe-b:env(safe-area-inset-bottom,16px);
}
html,body{height:100%;background:var(--off);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;color:var(--text);overflow-x:hidden}

/* SCREENS */
.screen{display:none;min-height:100dvh;flex-direction:column}
.screen.active{display:flex}

/* ── LOGIN ── */
#login{background:var(--pro);align-items:stretch;justify-content:flex-end}
.login-top{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
.sfr-badge{width:80px;height:80px;background:var(--sfr);border-radius:20px;display:flex;align-items:center;justify-content:center;margin-bottom:1.5rem}
.sfr-badge span{font-size:22px;font-weight:900;color:white;letter-spacing:-1px}
.lt-title{font-size:28px;font-weight:800;color:white;text-align:center;letter-spacing:-.5px}
.lt-sub{font-size:13px;color:rgba(255,255,255,.4);text-align:center;margin-top:6px}
.login-bottom{background:white;border-radius:28px 28px 0 0;padding:2rem 1.5rem calc(1.5rem + var(--safe-b))}
.lbl{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:8px}
.code-inp{width:100%;padding:16px;border:2px solid var(--border);border-radius:14px;font-size:22px;font-weight:800;text-align:center;letter-spacing:4px;text-transform:uppercase;background:var(--off);color:var(--text);outline:none;transition:all .2s;font-family:inherit;margin-bottom:1.5rem}
.code-inp:focus{border-color:var(--sfr);background:white}
.btn-login{width:100%;padding:18px;background:var(--sfr);color:white;border:none;border-radius:14px;font-size:16px;font-weight:800;font-family:inherit;cursor:pointer;letter-spacing:.5px;transition:background .15s}
.btn-login:active{background:var(--sfr-dark)}
.btn-login:disabled{background:#CCC;cursor:not-allowed}
.login-err{margin-top:1rem;padding:12px;background:#FFF0F0;color:var(--sfr);border-radius:10px;font-size:13px;font-weight:600;text-align:center;display:none}

/* ── LOADING ── */
#loading{align-items:center;justify-content:center;gap:1rem}
.spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--sfr);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:14px;color:var(--muted)}

/* ── HEADER ── */
.header{background:var(--sfr);padding:52px 1.25rem 1rem;position:sticky;top:0;z-index:10}
.header-row{display:flex;justify-content:space-between;align-items:flex-start}
.h-name{font-size:22px;font-weight:800;color:white;letter-spacing:-.3px}
.h-boutique{font-size:12px;color:rgba(255,255,255,.65);margin-top:3px;font-weight:500}
.h-logout{background:rgba(255,255,255,.15);border:none;color:white;padding:7px 14px;border-radius:20px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer}
.h-pills{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.h-pill{background:rgba(255,255,255,.15);border-radius:20px;padding:4px 10px;font-size:11px;color:rgba(255,255,255,.85);font-weight:600}

/* ── BODY ── */
.body{flex:1;overflow-y:auto;padding:.75rem .75rem calc(1rem + var(--safe-b))}

/* ── SEC TITLE ── */
.sec{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:.75rem .25rem .4rem}

/* ── MARGE HERO ── */
.marge-hero{background:var(--pro);border-radius:16px;padding:1.25rem;margin-bottom:.75rem}
.mh-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.mh-block{background:var(--pro2);border-radius:12px;padding:1rem 1rem .9rem}
.mhb-label{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:6px}
.mhb-amount{font-size:30px;font-weight:800;color:white;letter-spacing:-1.5px;line-height:1}
.mhb-amount sup{font-size:14px;font-weight:400;opacity:.5;letter-spacing:0}
.mhb-sub{font-size:10px;color:rgba(255,255,255,.35);margin-top:5px}
.mh-block.proj{border:1.5px solid rgba(226,0,26,.35)}
.mh-block.proj .mhb-label{color:rgba(255,120,120,.6)}
.mh-block.proj .mhb-amount{color:#FF9090}

/* ── COMMISSION CARD ── */
.comm-card{background:white;border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:.75rem}
.comm-big{text-align:center;padding:1.5rem 1rem 1rem}
.cb-lbl{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.cb-amount{font-size:52px;font-weight:900;color:var(--sfr);line-height:1;margin:.5rem 0;letter-spacing:-2px}
.cb-amount sup{font-size:22px;font-weight:400;opacity:.6}
.cb-sub{font-size:13px;color:var(--muted)}
/* Jauge */
.gauge-wrap{position:relative;width:140px;height:140px;margin:.75rem auto}
.gauge-wrap svg{transform:rotate(-90deg);width:100%;height:100%}
.gauge-bg{fill:none;stroke:#E8E8E8;stroke-width:10}
.gauge-fill{fill:none;stroke:var(--sfr);stroke-width:10;stroke-linecap:round;stroke-dasharray:377;stroke-dashoffset:377;transition:stroke-dashoffset 1.5s ease-out}
.gauge-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.gc-pct{font-size:22px;font-weight:900;color:var(--sfr)}
.gc-lbl{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-top:2px}
/* Palier */
.palier-block{background:var(--off);border-top:1px solid var(--border);padding:1rem}
.pb-title{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem}
.pb-next{font-size:13px;color:var(--text);line-height:1.5}
.pb-next strong{color:var(--sfr)}
.pb-bar-bg{height:6px;background:var(--border);border-radius:10px;overflow:hidden;margin-top:.75rem}
.pb-bar-fill{height:100%;background:var(--sfr);border-radius:10px;transition:width 1s ease}

/* ── ITEMS ── */
.items-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:.75rem}
.ic{background:white;border:1px solid var(--border);border-radius:14px;padding:.9rem}
.ic-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
.ic-icon{font-size:20px;line-height:1}
.ic-badge{font-size:12px;font-weight:800;padding:3px 9px;border-radius:8px}
.b-great{background:#FEF3C7;color:#92400E}
.b-ok{background:var(--green-bg);color:var(--green-dark)}
.b-warn{background:var(--orange-bg);color:var(--orange-dark)}
.b-bad{background:#FFF0F0;color:var(--sfr-dark)}
.ic-name{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.2px;margin-bottom:.5rem}
.prog-bg{height:5px;background:var(--border);border-radius:10px;margin:.4rem 0;overflow:hidden}
.prog-fill{height:100%;border-radius:10px;transition:width .8s}
.pf-great{background:#F59E0B}
.pf-ok{background:var(--green)}
.pf-warn{background:var(--orange)}
.pf-bad{background:var(--sfr)}
.ic-vals{display:flex;flex-direction:column;gap:3px}
.iv{display:flex;justify-content:space-between;align-items:baseline}
.iv-l{font-size:10px;color:var(--light)}
.iv-r{font-size:13px;font-weight:700;color:var(--text)}
.iv-r.proj{color:var(--sfr);font-size:11px}

/* ── DÉTAIL COMMISSION ── */
.detail-card{background:white;border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:.75rem}
.det-row{display:flex;justify-content:space-between;align-items:center;padding:11px 1rem;border-bottom:1px solid var(--border)}
.det-row:last-child{border-bottom:none}
.dr-n{font-size:13px;color:var(--text)}
.dr-v{font-size:13px;font-weight:700;color:var(--text)}
.det-total{background:var(--pro);padding:13px 1rem;display:flex;justify-content:space-between;align-items:center}
.dt-n{font-size:12px;color:rgba(255,255,255,.5)}
.dt-v{font-size:20px;font-weight:900;color:white}
.det-proj{background:#FFF0F0;padding:11px 1rem;display:flex;justify-content:space-between;align-items:center;border-top:1px solid #FFD0D0}
.dp-n{font-size:12px;color:var(--sfr);font-weight:700}
.dp-v{font-size:16px;font-weight:900;color:var(--sfr)}

/* ── STATUT BANNER ── */
.statut{border-radius:14px;padding:12px 1rem;margin-bottom:.75rem;display:flex;align-items:center;gap:12px}
.s-great{background:linear-gradient(135deg,var(--green-dark),var(--green));color:white}
.s-ok{background:linear-gradient(135deg,#1565C0,#1976D2);color:white}
.s-warn{background:linear-gradient(135deg,#E65100,#F57C00);color:white}
.s-bad{background:linear-gradient(135deg,var(--sfr-dark),var(--sfr));color:white}
.st-icon{font-size:26px;flex-shrink:0}
.st-title{font-size:15px;font-weight:800}
.st-sub{font-size:11px;opacity:.8;margin-top:2px}

/* ── PRÉSENCE ── */
.pres{background:white;border:1px solid var(--border);border-radius:14px;padding:1rem;margin-bottom:.75rem}
.pres-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
.pres-lbl{font-size:13px;font-weight:700;color:var(--text)}
.pres-val{font-size:26px;font-weight:900;color:var(--pro)}
.pres-sub{font-size:11px;color:var(--muted);margin-bottom:.5rem}
.pres-bar-bg{height:5px;background:var(--border);border-radius:10px;overflow:hidden}
.pres-bar-fill{height:100%;background:var(--sfr);border-radius:10px}

/* ── REFRESH ── */
.refresh{text-align:center;padding:1rem;font-size:11px;color:var(--light);display:flex;align-items:center;justify-content:center;gap:6px}
.live{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 2s infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* ── ERREUR ── */
.err-card{background:white;border-radius:16px;padding:2rem;text-align:center;margin:1rem}
.err-icon{font-size:40px;margin-bottom:1rem}
.err-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:.5rem}
.err-msg{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:1.5rem}
.err-btn{padding:12px 24px;background:var(--sfr);color:white;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
</style>
</head>
<body>

<!-- ══════════ LOGIN ══════════ -->
<div id="login" class="screen active">
  <div class="login-top">
    <div class="sfr-badge"><span>SFR</span></div>
    <div class="lt-title">Mes Commissions</div>
    <div class="lt-sub">Groupe Garcia · Boutiques SFR</div>
  </div>
  <div class="login-bottom">
    <span class="lbl">Code personnel</span>
    <input class="code-inp" type="text" id="code-inp" placeholder="XXXXXXXX" maxlength="12" autocomplete="off" autocapitalize="characters" />
    <button class="btn-login" id="btn-login" onclick="doLogin()">CONNEXION</button>
    <div class="login-err" id="login-err">Code invalide. Réessayez.</div>
  </div>
</div>

<!-- ══════════ LOADING ══════════ -->
<div id="loading" class="screen">
  <div class="spinner"></div>
  <div class="loading-txt">Chargement de vos données…</div>
</div>

<!-- ══════════ DASHBOARD ══════════ -->
<div id="dash" class="screen">
  <div class="header">
    <div class="header-row">
      <div>
        <div class="h-name" id="h-name">—</div>
        <div class="h-boutique" id="h-boutique">—</div>
      </div>
      <button class="h-logout" onclick="doLogout()">← Retour</button>
    </div>
    <div class="h-pills">
      <span class="h-pill" id="h-mois">—</span>
      <span class="h-pill" id="h-jour">J— / —</span>
      <span class="h-pill" id="h-maj">—</span>
    </div>
  </div>
  <div class="body" id="dash-body"></div>
</div>

<script>
const SHEET_ID = '1su6J88rzRF9hnZXwOsD8gkSDQpDl_XI1Ifjcoost6rY';

const CODES = {
  "HASSENE":"HASSENE1847","JULIE TLR":"JULIE3291","AXEL":"AXEL8903",
  "PAULINE":"PAULINE5274","RACHEL":"RACHEL6138","ILIAN":"ILIAN4562",
  "ANAIS":"ANAIS8356","LUCAS":"LUCAS7395","LOUANE":"LOUANE2648",
  "EMMY":"EMMY9173","CHLOE R":"CHLOE8426","WILL":"WILL3857",
  "EMILIE":"EMILIE6924","NATHAN":"NATHAN1583","MEHDY":"MEHDY7246",
  "ROMAIN GP":"ROMAIN5831","VICTOR":"VICTOR6247","HAVAL":"HAVAL3918"
};

const BOUTIQUES_MAP = {
  "ALR":"SFR Angers","TLR":"SFR Amboise","CLR":"SFR Châteaudun",
  "CHOLET":"SFR Cholet","RLR":"SFR Romorantin","VLR":"SFR Vendôme"
};

const PALIERS_V = [
  {min:0,max:2000,pct:0},{min:2000,max:3000,pct:0.02},
  {min:3000,max:4000,pct:0.03},{min:4000,max:5000,pct:0.05},
  {min:5000,max:6000,pct:0.06},{min:6000,max:7000,pct:0.07},
  {min:7000,max:8000,pct:0.08},{min:8000,max:9000,pct:0.09},
  {min:9000,max:Infinity,pct:0.10}
];
const PALIERS_RPV = [
  {min:0,max:18000,pct:0},{min:18000,max:20000,pct:0.01},
  {min:20000,max:22000,pct:0.012},{min:22000,max:23000,pct:0.024},
  {min:23000,max:24000,pct:0.026},{min:24000,max:26000,pct:0.028},
  {min:26000,max:Infinity,pct:0.03}
];

const COL = {
  'Code boutique':'codeBoutique','Nom collaborateur':'nom','Rôle':'role',
  'Marge réalisée (€)':'margeRealisee','Nb mobiles vendus':'nbMobiles',
  'Nb garanties 3ème année':'nbGaranties','Nb SFR Cyber vendus':'nbCyber',
  'Nb assurances vendues':'nbAssurances','Nb mobiles pour taux assurance':'nbMobilesAssurance',
  'CA accessoires total (€)':'caAccessoires','Jour ouvré courant':'jourOuvre',
  'Nb jours ouvrés total':'nbJoursOuvres','Jours travaillés (individuel)':'joursTravailles',
  "Nom de l'item":'nomItem','Objectif':'objectif','Unité':'unite',
  'Poids (% rému)':'poids','Mois en cours':'moisEnCours','Dernière MAJ':'derniereMaj'
};

let _jc = 0;
function fetchSheet(sheet) {
  return new Promise((res, rej) => {
    const cb = '_sc_' + (++_jc) + '_' + Date.now();
    const to = setTimeout(() => { delete window[cb]; rej(new Error('Timeout')); }, 15000);
    window[cb] = r => {
      clearTimeout(to); delete window[cb];
      const s = document.getElementById(cb); if(s) s.remove();
      r.status && r.status !== 'ok' ? rej(new Error(r.message||'Erreur')) : res(r);
    };
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:${cb}&sheet=${encodeURIComponent(sheet)}`;
    const s = document.createElement('script');
    s.id = cb; s.src = url;
    s.onerror = () => { clearTimeout(to); delete window[cb]; s.remove(); rej(new Error('Réseau')); };
    document.head.appendChild(s);
  });
}

function parseRows(r) {
  const rows = [];
  if (!r.table || !r.table.rows) return rows;
  r.table.rows.forEach(row => {
    const obj = {};
    r.table.cols.forEach((col, i) => {
      let v = row.c[i] ? row.c[i].v : null;
      const key = COL[col.label] || col.label;
      if (v && typeof v === 'string' && v.startsWith('Date(')) {
        const p = v.replace('Date(','').replace(')','').split(',');
        const d = new Date(+p[0], +p[1], +(p[2]||1));
        const mois = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
        v = key === 'derniereMaj' ? d.toLocaleDateString('fr-FR') : mois[d.getMonth()] + ' ' + d.getFullYear();
      }
      obj[key] = v;
    });
    rows.push(obj);
  });
  return rows;
}

function calcComm(marge, paliers) {
  for (let i = paliers.length-1; i >= 0; i--) {
    if (marge >= paliers[i].min) return Math.round(marge * paliers[i].pct);
  }
  return 0;
}

function nextPalier(marge, paliers) {
  for (let p of paliers) {
    if (marge < p.max && p.pct > 0) {
      const reste = Math.round(p.max - marge);
      const gain = Math.round(p.max * p.pct);
      return { reste, gain, max: p.max, pct: Math.round(p.pct*100) };
    }
  }
  return null;
}

// ── AUTH ──
document.getElementById('code-inp').addEventListener('keyup', e => { if(e.key==='Enter') doLogin(); });

let currentVendeur = null;
function doLogin() {
  const code = document.getElementById('code-inp').value.trim().toUpperCase();
  const err = document.getElementById('login-err');
  let found = null;
  for (let nom in CODES) { if (CODES[nom].toUpperCase() === code) { found = nom; break; } }
  if (!found) { err.style.display='block'; return; }
  err.style.display='none';
  currentVendeur = found;
  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = 'CHARGEMENT...';
  show('loading');
  loadData(found);
}

function doLogout() {
  currentVendeur = null;
  document.getElementById('code-inp').value = '';
  document.getElementById('btn-login').disabled = false;
  document.getElementById('btn-login').textContent = 'CONNEXION';
  show('login');
}

function show(id) {
  ['login','loading','dash'].forEach(s => {
    document.getElementById(s).classList.remove('active');
    document.getElementById(s).style.display = '';
  });
  const el = document.getElementById(id);
  el.classList.add('active');
  el.style.display = 'flex';
}

// ── LOAD ──
function loadData(vendeurNom) {
  Promise.all([fetchSheet('Données_Commissions'), fetchSheet('Items_Mois'), fetchSheet('Config')])
    .then(([r1, r2, r3]) => {
      const donnees = parseRows(r1);
      const items   = parseRows(r2);
      const config  = parseRows(r3);
      renderDash(vendeurNom, donnees, items, config);
    })
    .catch(e => {
      show('dash');
      document.getElementById('dash-body').innerHTML = `
        <div class="err-card">
          <div class="err-icon">⚠️</div>
          <div class="err-title">Erreur de chargement</div>
          <div class="err-msg">${e.message}<br>Vérifiez que la feuille Google est bien publiée sur le web.</div>
          <button class="err-btn" onclick="doLogout()">Retour</button>
        </div>`;
    });
}

// ── RENDER ──
function fmt(n) { return Math.round(n).toLocaleString('fr-FR'); }
function pct(real, obj) { return obj > 0 ? Math.min(Math.round(real/obj*100), 200) : (real > 0 ? 100 : 0); }
function pctClass(p) { return p>=100?'b-great':p>=75?'b-ok':p>=50?'b-warn':'b-bad'; }
function fillClass(p) { return p>=100?'pf-great':p>=75?'pf-ok':p>=50?'pf-warn':'pf-bad'; }

function renderDash(nom, donnees, items, config) {
  // Trouver le vendeur
  const v = donnees.find(d => d.nom && d.nom.toUpperCase() === nom.toUpperCase());
  if (!v) {
    show('dash');
    document.getElementById('dash-body').innerHTML = `<div class="err-card"><div class="err-icon">🔍</div><div class="err-title">Données introuvables</div><div class="err-msg">Aucune donnée pour ${nom}. Contactez votre manager.</div><button class="err-btn" onclick="doLogout()">Retour</button></div>`;
    return;
  }

  const isRPV = (v.role || '').toLowerCase().includes('rpv') || (v.role || '').toLowerCase().includes('manager');
  const paliers = isRPV ? PALIERS_RPV : PALIERS_V;
  const boutique = BOUTIQUES_MAP[v.codeBoutique] || v.codeBoutique || '';
  const marge = parseFloat(v.margeRealisee) || 0;
  const jourOuvre = parseInt(v.jourOuvre) || 1;
  const nbJours = parseInt(v.nbJoursOuvres) || 22;
  const joursTrav = parseInt(v.joursTravailles) || nbJours;

  // Projection linéaire
  const coefProj = joursTrav > 0 ? jourOuvre / joursTrav : 0;
  const margeProj = coefProj > 0 ? Math.round(marge / coefProj) : marge;

  const commR = calcComm(marge, paliers);
  const commP = calcComm(margeProj, paliers);
  const palierAct = (() => { for(let i=paliers.length-1;i>=0;i--) if(marge>=paliers[i].min) return paliers[i]; return paliers[0]; })();
  const next = nextPalier(marge, paliers);

  // Config
  const cfg = config[0] || {};
  const moisLabel = cfg.moisEnCours || 'Mois en cours';
  const majDate = cfg.derniereMaj || '';

  // Items payplan
  const itemsVendeur = items.filter(it => it.nomItem);

  // Calcul des réalisés items
  const nbMob = parseFloat(v.nbMobiles) || 0;
  const nbG3A = parseFloat(v.nbGaranties) || 0;
  const nbCyber = parseFloat(v.nbCyber) || 0;
  const nbAssu = parseFloat(v.nbAssurances) || 0;
  const nbMobAssu = parseFloat(v.nbMobilesAssurance) || nbMob || 1;
  const caAcc = parseFloat(v.caAccessoires) || 0;
  const txAssu = nbMobAssu > 0 ? Math.round((nbAssu / nbMobAssu) * 100) : 0;
  const txG3A  = nbMob > 0 ? Math.round((nbG3A / nbMob) * 100) : 0;
  const accParMob = nbMob > 0 ? Math.round(caAcc / nbMob) : 0;

  const realMap = {
    'Mobiles': { real: nbMob, proj: coefProj>0 ? Math.round(nbMob/coefProj) : nbMob, icon:'📱' },
    'Garantie 3ème Année': { real: txG3A, proj: txG3A, icon:'🛡️' },
    'SFR Cyber': { real: nbCyber, proj: coefProj>0 ? Math.round(nbCyber/coefProj) : nbCyber, icon:'🔒' },
    "Taux d'Assurance": { real: txAssu, proj: txAssu, icon:'⚡' },
    "Taux d'Accessoire": { real: accParMob, proj: accParMob, icon:'🎧' },
  };

  // Statut global
  const pctsMoy = itemsVendeur.length > 0
    ? Math.round(itemsVendeur.map(it => {
        const r = realMap[it.nomItem]; const obj = parseFloat(it.objectif)||1;
        return r ? pct(r.real, obj) : 0;
      }).reduce((a,b)=>a+b,0) / itemsVendeur.length)
    : pct(marge, 3000);

  let stClass, stIcon, stTitle, stSub;
  if (pctsMoy>=100){stClass='s-great';stIcon='🏆';stTitle='Objectifs atteints !';stSub='Excellent mois, continue comme ça !'}
  else if(pctsMoy>=75){stClass='s-ok';stIcon='✅';stTitle='En bonne voie';stSub='Maintiens ce rythme jusqu\'à la fin du mois'}
  else if(pctsMoy>=40){stClass='s-warn';stIcon='⚡';stTitle='À accélérer';stSub='Il te reste du temps — serre les dents !'}
  else{stClass='s-bad';stIcon='🚨';stTitle='Décroché';stSub='Reprends contact avec ton manager'}

  // Jauge
  const jaugePct = Math.min(Math.round((marge / (isRPV ? 26000 : 9000)) * 100), 100);
  const jaugeDash = Math.round(377 * (1 - jaugePct/100));

  // Pct palier actuel
  const palierPct = palierAct.max === Infinity ? 100 :
    Math.round(((marge - palierAct.min) / (palierAct.max - palierAct.min)) * 100);

  // Header
  document.getElementById('h-name').textContent = nom;
  document.getElementById('h-boutique').textContent = boutique;
  document.getElementById('h-mois').textContent = moisLabel;
  document.getElementById('h-jour').textContent = `J${jourOuvre} / ${nbJours}`;
  document.getElementById('h-maj').textContent = majDate ? `MAJ ${majDate}` : 'Temps réel';

  // Items HTML
  const itemsHTML = itemsVendeur.map(it => {
    const key = it.nomItem;
    const r = realMap[key] || { real:0, proj:0, icon:'📊' };
    const obj = parseFloat(it.objectif) || 1;
    const unite = (it.unite || '').trim();
    const p = pct(r.real, obj);
    const fmtU = v => unite === '%' ? v+'%' : unite === '€' || unite.includes('€') ? v+'€' : ''+v;
    return `<div class="ic">
      <div class="ic-top">
        <span class="ic-icon">${r.icon||'📊'}</span>
        <span class="ic-badge ${pctClass(p)}">${p}%</span>
      </div>
      <div class="ic-name">${key}</div>
      <div class="prog-bg"><div class="prog-fill ${fillClass(p)}" style="width:${Math.min(p,100)}%"></div></div>
      <div class="ic-vals">
        <div class="iv"><span class="iv-l">Réalisé</span><span class="iv-r">${fmtU(r.real)}</span></div>
        <div class="iv"><span class="iv-l">Objectif</span><span class="iv-r" style="color:var(--muted)">${fmtU(obj)}</span></div>
        <div class="iv"><span class="iv-l">Proj.</span><span class="iv-r proj">${fmtU(r.proj)}</span></div>
      </div>
    </div>`;
  }).join('');

  // Détail commission
  const commLignes = [
    { n:`📱 Mobiles (${Math.round(nbMob)})`, v: Math.round(nbMob*30)+' €' },
    { n:`🛡️ G3A (${Math.round(nbG3A)} × 15€)`, v: Math.round(nbG3A*15)+' €' },
    { n:`🔒 SFR Cyber (${Math.round(nbCyber)} × 8€)`, v: Math.round(nbCyber*8)+' €' },
    { n:`⚡ Bonus assurance (${txAssu}%)`, v: (txAssu>=40?200:txAssu>=25?80:0)+' €' },
    { n:`🎧 Acc. marge (~40%)`, v: Math.round(caAcc*0.4)+' €' },
  ];

  document.getElementById('dash-body').innerHTML = `

    <div class="statut ${stClass}">
      <span class="st-icon">${stIcon}</span>
      <div><div class="st-title">${stTitle}</div><div class="st-sub">${stSub}</div></div>
    </div>

    <!-- Marge réelle + projetée -->
    <div class="marge-hero">
      <div class="mh-row">
        <div class="mh-block">
          <div class="mhb-label">Marge réalisée</div>
          <div class="mhb-amount">${fmt(marge)}<sup> €</sup></div>
          <div class="mhb-sub">J${jourOuvre} sur ${joursTrav}j travaillés</div>
        </div>
        <div class="mh-block proj">
          <div class="mhb-label">Projection fin mois</div>
          <div class="mhb-amount">${fmt(margeProj)}<sup> €</sup></div>
          <div class="mhb-sub">Si rythme maintenu</div>
        </div>
      </div>
    </div>

    <!-- Commission avec jauge -->
    <div class="comm-card">
      <div class="comm-big">
        <div class="cb-lbl">Commission sur marge réalisée</div>
        <div class="cb-amount">${fmt(commR)}<sup> €</sup></div>
        <div class="gauge-wrap">
          <svg viewBox="0 0 130 130">
            <circle class="gauge-bg" cx="65" cy="65" r="60"/>
            <circle class="gauge-fill" id="gauge-fill" cx="65" cy="65" r="60"/>
          </svg>
          <div class="gauge-center">
            <div class="gc-pct">${jaugePct}%</div>
            <div class="gc-lbl">du max</div>
          </div>
        </div>
        <div class="cb-sub">Palier actuel : <strong style="color:var(--sfr)">${Math.round(palierAct.pct*100)}%</strong> de la marge</div>
      </div>
      ${next ? `
      <div class="palier-block">
        <div class="pb-title">🎯 Prochain palier</div>
        <div class="pb-next">Encore <strong>${fmt(next.reste)} €</strong> de marge pour atteindre le palier <strong>${next.pct}%</strong> (commission jusqu'à <strong>${fmt(next.gain)} €</strong>)</div>
        <div class="pb-bar-bg"><div class="pb-bar-fill" style="width:${palierPct}%"></div></div>
      </div>` : `<div class="palier-block"><div class="pb-title">🏆 Palier maximum atteint</div><div class="pb-next">Tu es au <strong style="color:var(--sfr)">palier 10%</strong> — maximum de commission !</div></div>`}
    </div>

    <!-- Commission projetée -->
    <div style="background:#FFF0F0;border:1px solid #FFD0D0;border-radius:14px;padding:1rem;margin-bottom:.75rem;display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--sfr);margin-bottom:3px">Commission projetée fin de mois</div>
        <div style="font-size:12px;color:var(--muted)">Sur ${fmt(margeProj)} € de marge</div>
      </div>
      <div style="font-size:28px;font-weight:900;color:var(--sfr)">${fmt(commP)} €</div>
    </div>

    <!-- Présence -->
    <div class="pres">
      <div class="pres-top">
        <span class="pres-lbl">⏱️ Présence</span>
        <span class="pres-val">${joursTrav}j</span>
      </div>
      <div class="pres-sub">sur ${nbJours} jours ouvrables · objectifs proratisés à ${Math.round(joursTrav/nbJours*100)}%</div>
      <div class="pres-bar-bg"><div class="pres-bar-fill" style="width:${Math.round(joursTrav/nbJours*100)}%"></div></div>
    </div>

    <!-- 5 Items -->
    <div class="sec">Les 5 items payplan</div>
    <div class="items-grid">${itemsHTML || '<div style="grid-column:1/-1;padding:1rem;text-align:center;color:var(--muted);font-size:13px">Items en cours de chargement…</div>'}</div>

    <!-- Détail -->
    <div class="sec">Détail des commissions</div>
    <div class="detail-card">
      ${commLignes.map(l=>`<div class="det-row"><span class="dr-n">${l.n}</span><span class="dr-v">${l.v}</span></div>`).join('')}
      <div class="det-total"><span class="dt-n">Commission actuelle</span><span class="dt-v">${fmt(commR)} €</span></div>
      <div class="det-proj"><span class="dp-n">🎯 Projection fin de mois</span><span class="dp-v">${fmt(commP)} €</span></div>
    </div>

    <div class="refresh"><div class="live"></div>Données Google Sheet · ${new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</div>
  `;

  show('dash');

  // Animer la jauge
  setTimeout(() => {
    const g = document.getElementById('gauge-fill');
    if (g) g.style.strokeDashoffset = jaugeDash;
  }, 100);
}
</script>
</body>
</html>
